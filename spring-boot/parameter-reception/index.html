ata-v-06225672><a href="/categories/?category=Spring%20Boot" title="分类" data-v-06225672>Spring Boot</a></li></ul> <div class="info" data-v-06225672><div title="作者" class="author iconfont icon-touxiang" data-v-06225672><a href="https://www.youngkbt.cn" target="_blank" title="作者" class="beLink" data-v-06225672>Young Kbt </a></div> <div title="创建时间" class="date iconfont icon-riqi" data-v-06225672><a href="javascript:;" data-v-06225672>2022-12-12</a></div> <!----></div></div></div> <!----> <div class="content-wrapper"><div class="right-menu-wrapper"><div class="right-menu-margin"><div class="right-menu-title">目录</div> <div class="right-menu-content"></div></div></div> <h1><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAAAAXNSR0IArs4c6QAABH1JREFUSA3tVl1oHFUUPmdmd2ltklqbpJDiNnXFmgbFktho7YMPNiJSSZM0+CAYSkUELVhM6YuwIPpgoOKDqOBDC0XE2CQoNtQXBUFTTcCi+Wlh1V2TQExsUzcltd3M9Tt3ZjZzZ2fT+OJTL8yeM+eee757fmeJbq//KQL8X3DUSFOcfr7cRsRtxNQMWueeVzOkaITIGqQHNg5y8+jNW9ldM7A6nTpAjuolUikAwq7CE3WcM2RRDz+XGVgN3FptU/aUSlvq9Pa3iZ1+sgAqJyyAFqkipd9dqiwHF3P65YycLWc/6sqGrvoEoIp6DOFaX5h6+dnfjkWprwqsPk0dUGq5vySwDImC10KxFHgGL1SWoc92O3eVht09qdXNH11I2SsTsJYqMWzihqGMi+A+Garf3BAuuLI5oGlULyNfyB/HYNujwktOfRrMr5t77NmevqaUopx0grnKAyvVpmwUDB4x6FPXuGvYLTDwWsejwgtgkYKPqRJg8SV6xaiZ3ZTppGneS4yfH5/66fZSDHv+QZci/+h5c5UHtpy67JUqGppM0sh0Nc1dW6/N1W5Yoqat8/TU/VnadmdeW2PLLSyh0cvxBs3KbqTmwYPpxN4do/mzE8nEpvX/UMu2Wbp74zUAK5q6WkHns7V0eWkdPbPzd3rxkTGybadYySumVzhcaJFbs5UrEkQ/+CK8gF5dnh/6ciIZ73gwQ927L1IitoxKLXYP3SjYdOrHHfTZhRRlFyrorafPk20B3HPD1y2G3qKZME5Jcf3t/HUC13/8tSd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">Spring Boot - 请求参数接收<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p></p><div class="table-of-contents"><ul><li><a href="#支持的请求模式">支持的请求模式</a></li><li><a href="#说明">说明</a></li><li><a href="#get-请求">GET 请求</a><ul><li><a href="#基本类型参数注入-通用">基本类型参数注入（通用）</a></li><li><a href="#指定参数注入-通用">指定参数注入（通用）</a></li><li><a href="#占位符参数注入-通用">占位符参数注入（通用）</a></li><li><a href="#实体类参数注入-通用">实体类参数注入（通用）</a></li><li><a href="#实体类-list-集合">实体类 List 集合</a></li><li><a href="#基本类型-list-集合-通用">基本类型 List 集合（通用）</a></li><li><a href="#基本类型-map-类型-通用">基本类型 Map 类型（通用）</a></li><li><a href="#基本类型数组-通用">基本类型数组（通用）</a></li></ul></li><li><a href="#post-请求-json">POST 请求 - JSON</a><ul><li><a href="#基本类型参数注入">基本类型参数注入</a></li><li><a href="#实体类参数注入">实体类参数注入</a></li><li><a href="#实体类-list-集合">实体类 List 集合</a></li></ul></li><li><a href="#post-请求-form">POST 请求 - form</a></li><li><a href="#结束语">结束语</a></li></ul></div><p></p> <div class="custom-block note"><p class="custom-block-title">笔记</p> <p>一直没时间总结 Spring Controller 接收参数的多种方式，只记得常用的 GET、POST 接收，而一些 List、Map 参数的接收却经常忘记怎么接收，每次都只能百度，所以现在总结不同的接收请求参数方式。</p> <div class="custom-block right"><p>2022-12-12 @Young Kbt</p></div></div> <h2 id="支持的请求模式"><a href="#支持的请求模式" class="header-anchor">#</a> 支持的请求模式</h2> <p>GET 方式：主要用于简单查询，使用注解：<code>@GetMapping</code> 或者 <code>@RequestMapping(method = RequestMethod.GET)</code></p> <p>POST 方式：主要用于复杂查询或数据添加，使用注解：<code>@PostMapping</code> 或者 <code>@RequestMapping(method = RequestMethod.POST)</code></p> <p>HEAD、PUT、PATCH、DELETE、OPTIONS、TRACE 等方式不常用。</p> <h2 id="说明"><a href="#说明" class="header-anchor">#</a> 说明</h2> <ul><li>项目端口为 8085，在本地运行，所以是 <code>http://localhost:8085</code></li> <li>内容用到了 <code>@Slf4j</code> 日志输出，安装了 lombok 依赖即可使用</li> <li>推荐使用 <code>@GetMapping</code> 或者 <code>@PostPostMapping</code> 看起来明确的请求方式</li> <li><code>@RequestParam</code> 只能用于 URL 后面 ? 携带参数的链接，<code>@RequestBody</code> 只能用于 JSON 格式的链接</li> <li>标题有 <strong>通用</strong>，代表 GET 和 POST 请求使用方式都一样，所以 POST 请求内容不再描述</li> <li>其实通过 URL 后面 ? 携带参数的链接，POST 和 GET 都是获取方式通用，只是 POST 需要的是更安装的传输：RequestBody</li></ul> <h2 id="get-请求"><a href="#get-请求" class="header-anchor">#</a> GET 请求</h2> <h3 id="基本类型参数注入-通用"><a href="#基本类型参数注入-通用" class="header-anchor">#</a> 基本类型参数注入（通用）</h3> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token annotation punctuation">@RestController</span>
<span class="token annotation punctuation">@RequestMapping</span><span class="token punctuation">(</span><span class="token string">&quot;/test&quot;</span><span class="token punctuation">)</span>
<span class="token annotation punctuation">@Slf4j</span>
<span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">TestController</span> <span class="token punctuation">{</span>
    
    <span class="token annotation punctuation">@GetMapping</span><span class="token punctuation">(</span><span class="token string">&quot;/simpleGet&quot;</span><span class="token punctuation">)</span>
    <span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">simpleGet</span><span class="token punctuation">(</span><span class="token class-name">String</span> name<span class="token punctuation">,</span> <span class="token class-name">String</span> age<span class="token punctuation">)</span> <span class="token punctuation">{</span>
        log<span class="token punctuation">.</span><span class="token function">info</span><span class="token punctuation">(</span><span class="token string">&quot;接收的参数：{}, {}&quot;</span><span class="token punctuation">,</span> name<span class="token punctuation">,</span> age<span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br></div></div><p>请求连接：<code>http://localhost:8085/test/simpleGet?name=kele&amp;age=18</code>。</p> <p>日志输入：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token number">2022</span><span class="token operator">-</span><span class="token number">12</span><span class="token operator">-</span><span class="token number">12</span> <span class="token number">21</span><span class="token operator">:</span><span class="token number">55</span><span class="token operator">:</span><span class="token number">24.535</span>  <span class="token constant">INFO</span> <span class="token number">18888</span> <span class="token operator">--</span><span class="token operator">-</span> <span class="token punctuation">[</span>nio<span class="token operator">-</span><span class="token number">8085</span><span class="token operator">-</span>exec<span class="token operator">-</span><span class="token number">1</span><span class="token punctuation">]</span> <span class="token class-name"><span class="token namespace">com<span class="token punctuation">.</span>pxw<span class="token punctuation">.</span>mit<span class="token punctuation">.</span>controller<span class="token punctuation">.</span></span>TestController</span>    <span class="token operator">:</span> 接收的参数：kele<span class="token punctuation">,</span> <span class="token number">18</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h3 id="指定参数注入-通用"><a href="#指定参数注入-通用" class="header-anchor">#</a> 指定参数注入（通用）</h3> <p>如果前端传来的链接和参数名不一致时，则需要指定前端传来的参数，用到 <code>@RequestParam</code> 注解。</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token annotation punctuation">@RestController</span>
<span class="token annotation punctuation">@RequestMapping</span><span class="token punctuation">(</span><span class="token string">&quot;/test&quot;</span><span class="token punctuation">)</span>
<span class="token annotation punctuation">@Slf4j</span>
<span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">TestController</span> <span class="token punctuation">{</span>

    <span class="token annotation punctuation">@GetMapping</span><span class="token punctuation">(</span><span class="token string">&quot;/appointGet&quot;</span><span class="token punctuation">)</span>
    <span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">appointGet</span><span class="token punctuation">(</span><span class="token annotation punctuation">@RequestParam</span><span class="token punctuation">(</span><span class="token string">&quot;name1&quot;</span><span class="token punctuation">)</span> <span class="token class-name">String</span> name<span class="token punctuation">,</span> <span class="token annotation punctuation">@RequestParam</span><span class="token punctuation">(</span><span class="token string">&quot;age1&quot;</span><span class="token punctuation">)</span> <span class="token class-name">String</span> age<span class="token punctuation">)</span> <span class="token punctuation">{</span>
        log<span class="token punctuation">.</span><span class="token function">info</span><span class="token punctuation">(</span><span class="token string">&quot;接收的参数：{}, {}&quot;</span><span class="token punctuation">,</span> name<span class="token punctuation">,</span> age<span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br></div></div><p>请求连接：<code>http://localhost:8085/test/appointGet?name1=bingtang&amp;age1=17</code>。</p> <p>日志输出：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token number">2022</span><span class="token operator">-</span><span class="token number">12</span><span class="token operator">-</span><span class="token number">12</span> <span class="token number">22</span><span class="token operator">:</span><span class="token number">01</span><span class="token operator">:</span><span class="token number">03.398</span>  <span class="token constant">INFO</span> <span class="token number">4024</span> <span class="token operator">--</span><span class="token operator">-</span> <span class="token punctuation">[</span>nio<span class="token operator">-</span><span class="token number">8085</span><span class="token operator">-</span>exec<span class="token operator">-</span><span class="token number">2</span><span class="token punctuation">]</span> <span class="token class-name"><span class="token namespace">com<span class="token punctuation">.</span>pxw<span class="token punctuation">.</span>mit<span class="token punctuation">.</span>controller<span class="token punctuation">.</span></span>TestController</span>    <span class="token operator">:</span> 接收的参数：bingtang<span class="token punctuation">,</span> <span class="token number">17</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h3 id="占位符参数注入-通用"><a href="#占位符参数注入-通用" class="header-anchor">#</a> 占位符参数注入（通用）</h3> <p><code>@PathVariable</code> 映射 URL 绑定的 <strong>占位符</strong>。</p> <p>通过 <code>@PathVariable</code> 可以将 URL 中占位符参数绑定到控制器处理方法的入参中 URL 中的 {xxx}。</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token annotation punctuation">@RestController</span>
<span class="token annotation punctuation">@RequestMapping</span><span class="token punctuation">(</span><span class="token string">&quot;/test&quot;</span><span class="token punctuation">)</span>
<span class="token annotation punctuation">@Slf4j</span>
<span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">TestController</span> <span class="token punctuation">{</span>

    <span class="token annotation punctuation">@GetMapping</span><span class="token punctuation">(</span><span class="token string">&quot;/pathVariableGet/{name}/{age}&quot;</span><span class="token punctuation">)</span>
    <span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">pathVariableGet</span><span class="token punctuation">(</span><span class="token annotation punctuation">@PathVariable</span> <span class="token class-name">String</span> name<span class="token punctuation">,</span> <span class="token annotation punctuation">@PathVariable</span> <span class="token class-name">String</span> age<span class="token punctuation">)</span> <span class="token punctuation">{</span>
        log<span class="token punctuation">.</span><span class="token function">info</span><span class="token punctuation">(</span><span class="token string">&quot;接收的参数：{}, {}&quot;</span><span class="token punctuation">,</span> name<span class="token punctuation">,</span> age<span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>

tion">,</span> <span class="token class-name">User</span><span class="token punctuation">(</span>name<span class="token operator">=</span>xueli<span class="token punctuation">,</span> age<span class="token operator">=</span><span class="token number">17</span><span class="token punctuation">)</span><span class="token punctuation">]</span>

    log<span class="token punctuation">.</span><span class="token function">info</span><span class="token punctuation">(</span><span class="token string">&quot;接收的参数：{}&quot;</span><span class="token punctuation">,</span> name<span class="token punctuation">)</span><span class="token punctuation">;</span>
<span class="token punctuation">}</span>

<span class="token annotation punctuation">@PostMapping</span><span class="token punctuation">(</span><span class="token string">&quot;/mapSimplePost&quot;</span><span class="token punctuation">)</span>
<span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">mapSimplePost</span><span class="token punctuation">(</span><span class="token annotation punctuation">@RequestParam</span> <span class="token class-name">Map</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">String</span><span class="token punctuation">,</span> <span class="token class-name">String</span><span class="token punctuation">&gt;</span></span> map<span class="token punctuation">)</span> <span class="token punctuation">{</span>
    log<span class="token punctuation">.</span><span class="token function">info</span><span class="token punctuation">(</span><span class="token string">&quot;接收的参数：{}&quot;</span><span class="token punctuation">,</span> map<span class="token punctuation">)</span><span class="token punctuation">;</span>
<span class="token punctuation">}</span>

    log<span class="token punctuation">.</span><span class="token function">info</span><span class="token punctuation">(</span><span class="token string">&quot;接收的参数1：{}, {}&quot;</span><span class="token punctuation">,</span> name<span class="token punctuation">[</span><span class="token number">0</span><span class="token punctuation">]</span><span class="token punctuation">,</span> name<span class="token punctuation">[</span><span class="token number">1</span><span class="token punctuation">]</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
