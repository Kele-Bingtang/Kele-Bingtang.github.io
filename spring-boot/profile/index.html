<!----></section></li><li><section class="sidebar-group collapsable depth-0"><p class="sidebar-heading"><span>Spring Cloud</span> <span class="arrow right"></span></p> <!----></section></li></ul> </aside> <div><main class="page"><div class="theme-vdoing-wrapper "><div class="articleInfo-wrap" data-v-06225672><div class="articleInfo" data-v-06225672><ul class="breadcrumbs" data-v-06225672><li data-v-06225672><a href="/" title="首页" class="iconfont icon-home router-link-active" data-v-06225672></a></li> <li data-v-06225672><a href="/categories/?category=Spring%E7%94%9F%E6%80%81" title="分类" data-v-06225672>Spring生态</a></li><li data-v-06225672><a href="/categories/?category=Spring%20Boot" title="分类" data-v-06225672>Spring Boot</a></li></ul> <div class="info" data-v-06225672><div title="作者" class="author iconfont icon-touxiang" data-v-06225672><a href="https://www.youngkbt.cn" target="_blank" title="作者" class="beLink" data-v-06225672>Young Kbt </a></div> <div title="创建时间" class="date iconfont icon-riqi" data-v-06225672><a href="javascript:;" data-v-06225672>2023-10-29</a></div> <!----></div></div></div> <!----> <div class="content-wrapper"><div class="right-menu-wrapper"><div class="right-menu-margin"><div class="right-menu-title">目录</div> <div class="right-menu-content"></div></div></div> <h1><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAAAAXNSR0IArs4c6QAABH1JREFUSA3tVl1oHFUUPmdmd2ltklqbpJDiNnXFmgbFktho7YMPNiJSSZM0+CAYSkUELVhM6YuwIPpgoOKDqOBDC0XE2CQoNtQXBUFTTcCi+Wlh1V2TQExsUzcltd3M9Tt3ZjZzZ2fT+OJTL8yeM+eee757fmeJbq//KQL8X3DUSFOcfr7cRsRtxNQMWueeVzOkaITIGqQHNg5y8+jNW9ldM7A6nTpAjuolUikAwq7CE3WcM2RRDz+XGVgN3FptU/aUSlvq9Pa3iZ1+sgAqJyyAFqkipd9dqiwHF3P65YycLWc/6sqGrvoEoIp6DOFaX5h6+dnfjkWprwqsPk0dUGq5vySwDImC10KxFHgGL1SWoc92O3eVht09qdXNH11I2SsTsJYqMWzihqGMi+A+Garf3BAuuLI5oGlULyNfyB/HYNujwktOfRrMr5t77NmevqaUopx0grnKAyvVpmwUDB4x6FPXuGvYLTDwWsejwgtgkYKPqRJg8SV6xaiZ3ZTppGneS4yfH5/66fZSDHv+QZci/+h5c5UHtpy67JUqGppM0sh0Nc1dW6/N1W5Yoqat8/TU/VnadmdeW2PLLSyh0cvxBs3KbqTmwYPpxN4do/mzE8nEpvX/UMu2Wbp74zUAK5q6WkHns7V0eWkdPbPzd3rxkTGybadYySumVzhcaJFbs5UrEkQ/+CK8gF5dnh/6ciIZ73gwQ927L1IitoxKLXYP3SjYdOrHHfTZhRRlFyrorafPk20B3HPD1y2G3qKZME5Jcf3t/HUC13/8tSd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">Spring Boot - 多环境配置<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p></p><div class="table-of-contents"><ul><li><a href="#简介">简介</a></li><li><a href="#多-profile-文件方式">多 Profile 文件方式</a></li><li><a href="#环境配置">环境配置</a></li><li><a href="#profile-分组">Profile 分组</a></li><li><a href="#profile-注解">@Profile 注解</a></li><li><a href="#外部化配置">外部化配置</a><ul><li><a href="#配置优先级">配置优先级</a></li><li><a href="#外部配置">外部配置</a></li></ul></li></ul></div><p></p> <h2 id="简介"><a href="#简介" class="header-anchor">#</a> 简介</h2> <p>在实际的项目开发中，一个项目通常会存在多个环境，例如，开发环境、测试环境和生产环境等。不同环境的配置也不尽相同，例如开发环境使用的是开发数据库，测试环境使用的是测试数据库，而生产环境使用的是线上的正式数据库。</p> <p>Profile 为在不同环境下使用不同的配置提供了支持，我们可以通过激活、指定参数等方式快速切换环境。</p> <h2 id="多-profile-文件方式"><a href="#多-profile-文件方式" class="header-anchor">#</a> 多 Profile 文件方式</h2> <p>Spring Boot 的配置文件共有两种形式：<code>.properties</code> 文件和 <code>.yml</code> 文件，不管哪种形式，它们都能通过文件名的命名形式区分出不同的环境的配置，文件命名格式为：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code>application<span class="token operator">-</span><span class="token punctuation">{</span>profile<span class="token punctuation">}</span><span class="token punctuation">.</span>properties<span class="token operator">/</span>yml
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>其中，<code>{profile}</code> 一般为各个环境的名称或简称，例如 dev、test 和 prod 等等，这个根据自己的场景来定义。</p> <h2 id="环境配置"><a href="#环境配置" class="header-anchor">#</a> 环境配置</h2> <p>resources 下添加 4 个配置文件：</p> <ul><li>application.yml：主配置文件，任意时候都生效</li> <li>application-dev.yml：开发环境配置文件</li> <li>application-test.yml：测试环境配置文件</li> <li>application-prod.yml：生产环境配置文件</li></ul> <p>定义了这些文件，那么想使用 dev 环境的配置，则在主配置文件切换环境：</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">spring</span><span class="token punctuation">:</span>
  <span class="token key atrule">profiles</span><span class="token punctuation">:</span>
    <span class="token key atrule">active</span><span class="token punctuation">:</span> dev <span class="token comment"># 对应 {profile}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>则代表使用 <code>application-dev.yml</code> 的配置信息。</p> <p>值得注意的是：<code>application.yml</code> 主配置文件不管任何环境都会生效。</p> <p>当 <code>application-{profile}.yml</code> 文件和 <code>application.yml</code> 文件的配置项都相同的情况下，profile 优先级高于 application 的配置。</p> <p>也可以额外添加生效文件，而不是激活替换。比如：</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">spring</span><span class="token punctuation">:</span>
  <span class="token key atrule">profiles</span><span class="token punctuation">:</span>
    <span class="token key atrule">active</span><span class="token punctuation">:</span> dev
    <span class="token key atrule">include</span><span class="token punctuation">:</span> 
      <span class="token punctuation">-</span> test
      <span class="token punctuation">-</span> prod
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><h2 id="profile-分组"><a href="#profile-分组" class="header-anchor">#</a> Profile 分组</h2> <p>当我们想使用多个环境的配置文件时候，可以这样：</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">spring</span><span class="token punctuation">:</span>
  <span class="token key atrule">profiles</span><span class="token punctuation">:</span>
    <span class="token key atrule">active</span><span class="token punctuation">:</span> dev<span class="token punctuation">,</span>test
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>当然也可以进行分组：</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">spring</span><span class="token punctuation">:</span>
  <span class="token key atrule">profiles</span><span class="token punctuation">:</span>
    <span class="token key atrule">group</span><span class="token punctuation">:</span>
      <span class="token key atrule">youngkbt</span><span class="token punctuation">:</span> dev<span class="token punctuation">,</span>test
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p>然后激活 youngkbt 组</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">spring</span><span class="token punctuation">:</span>
  <span class="token key atrule">profiles</span><span class="token punctuation">:</span>
    <span class="token key atrule">active</span><span class="token punctuation">:</span> youngkbt
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>运行 jar 包的时候也可以覆盖配置文件对环境的配置：<code>java –jar xxx.jar --spring.profiles.active=dev</code>。</p> <h2 id="profile-注解"><a href="#profile-注解" class="header-anchor">#</a> @Profile 注解</h2> <p>当配置了环境变量，那么就对应的环境变量配置文件就会生效，这是针对变量而言，此外我们可以指定哪些组件在什么环境才允许被加载到 Spring 容器里。</p> <p>比如指定某个组件只有在 dev 环境才被加载到容器里，如：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token annotation punctuation">@Profile</span><span class="token punctuation">(</span><span class="token string">&quot;dev&quot;</span><span class="token punctuation">)</span>
<span class="token annotation punctuation">@RestController</span>
<span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">HelloController</span> <span class="token punctuation">{</span>

    <span class="token annotation punctuation">@GetMapping</span><span class="token punctuation">(</span><span class="token string">&quot;/hello&quot;</span><span class="token punctuation">)</span>
    <span class="token keyword">public</span> <span class="token class-name">String</span> <span class="token function">hello</span><span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
        <span class="token keyword">return</span> <span class="token string">&quot;Hello Spring Boot&quot;</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br></div></div><p>此时该容器在 dev 环境才会注入到容器里，也就是处于其他环境，访问 <code>/hello</code> 是失效的。</p> <h2 id="外部化配置"><a href="#外部化配置" class="header-anchor">#</a> 外部化配置</h2> <p><strong>场景</strong>：线上应用如何 <strong>快速修改配置</strong>，并应 <strong>用最新配置</strong>？</p> <ul><li>SpringBoot 使用 <strong>配置优先级</strong> + <strong>外部配置</strong>  简化配置更新、简化运维。</li> <li>只需要给 <code>jar</code> 应用所在的文件夹放一个 <code>application.yml</code> 最新配置文件，重启项目就能自动应用最新配置</li></ul> <h3 id="配置优先级"><a href="#配置优先级" class="header-anchor">#</a> 配置优先级</h3> <p>Spring Boot 允许将 <strong>配置外部化</strong>，以便可以在不同的环境中使用相同的应用程序代码。</p> <p>我们可以使用各种 <strong>外部配置源</strong>，包括 Java Properties 文件、YAML 文件、环境变量和命令行参数。</p> <p><code>@Value</code> 可以获取值，也可以用 <code>@ConfigurationProperties</code> 将所有属性绑定到 java object 中。</p> <p>以下是 SpringBoot 属性源加载顺序。<strong>后面的会覆盖前面的值</strong>。由低到高，高优先级配置覆盖低优先级：</p> <ol><li><strong>默认属性</strong>（通过 <code>SpringApplication.setDefaultProperties</code> 指定的）</li> <li><code>@PropertySource</code> 指定加载的配置（需要写在 <code>@Configuration</code> 类上才可生效）</li> <li>配置文件（application.properties/yml 等）</li> <li>RandomValuePropertySource 支持的 <code>random.*</code> 配置（如：<code>@Value(&quot;${random.int}&quot;)</code>）</li> <li>OS 环境变量</li> <li>Java 系统属性（<code>System.getProperties()</code>）</li> <li>JNDI 属性（来自 <code>java:comp/env</code>）</li> <li>ServletContext 初始化参数</li> <li>ServletConfig 初始化参数</li> <li>SPRING_APPLICATION_JSON 属性（内置在环境变量或系统属性中的 JSON）</li> <li><strong>命令行参数</strong></li> <li>测试属性。(<code>@SpringBootTest</code> 进行测试时指定的属性)</li> <li>测试类 <code>@TestPropertySource</code> 注解</li> <li>Devtools 设置的全局属性。(<code>$HOME/.config/spring-boot</code>)</li></ol> <p>结论：配置可以写到很多位置，常见的优先级顺序：命令行 &gt; 配置文件 &gt; springapplication 配置。</p> <p>Spring Boot 读取 application.yml 配置文件位置也是有优先级的：</p> <p><strong>配置文件优先级</strong> 如下：(后面覆盖前面)</p> <ol><li><strong>jar 包内</strong> 的 <code>application.properties/yml</code></li> <li><strong>jar 包内</strong> 的 <code>application-{profile}.properties/yml</code></li> <li><strong>jar 包外</strong> 的 <code>application.properties/yml</code></li> <li><strong>jar 包外</strong> 的 <code>application-{profile}.properties/yml</code></li></ol> <p>建议用一种格式的配置文件。如果 <code>.properties</code> 和 <code>.yml</code> 同时存在，则 <code>.properties</code> 优先。</p> <p>结论：包外 &gt; 包内。同级情况：profile配置 &gt; application 配置。</p> <p>所有参数均可由命令行传入，使用 <code>--参数项=参数值</code>，将会被添加到环境变量中，并优先于 <strong>配置文件</strong>。</p> <p>比如 <code>java -jar app.jar --name=&quot;Spring&quot;</code>，可以使用 <code>@Value(&quot;${name}&quot;)</code> 获取。</p> <p>演示场景：</p> <ul><li>包内：application.properties 的 <code>server.port=8000</code></li> <li>包内：application-dev.properties 的 <code>server.port=9000</code></li> <li>包外：application.properties 的 <code>server.port=8001</code></li> <li>包外： application-dev.properties 的 <code>server.port=9001</code></li></ul> <p>启动端口：命令行 &gt; <code>9001</code> &gt; <code>8001</code> &gt; <code>9000</code> &gt; <code>8000</code></p> <h3 id="外部配置"><a href="#外部配置" class="header-anchor">#</a> 外部配置</h3> <p>SpringBoot 应用启动时会自动寻找 <code>application.properties</code> 和 <code>application.yml</code> 位置，进行加载。顺序如下：</p> <p>当前路径（jar 包根目录下）的配置文件优先级大于项目 resource 下</p> <ul><li>在项目所在的位置下 config 目录下的 application.yml 大于项目所在的位置的 application.yml</li> <li>项目 resource 下 config 目录下的 application.yml 大于项目 resource 下的 application.yml</li></ul> <p>总结：</p> <ul><li>命令行 &gt; 包外 config 直接子目录 &gt; 包外 config 目录 &gt; 包外根目录 &gt; 包内目录</li> <li>同级比较：
<ul><li>profile 配置 &gt; 默认配置</li> <li>properties 配置 &gt; yaml 配置</li></ul></li></ul> <p>规律：最外层的最优先。</p> <ul><li>命令行 &gt; 所有</li> <li>包外 &gt; 包内</li> <li>config 目录 &gt; 根目录</li> <li>profile &gt; application</li></ul> <p>配置不同就都生效（互补），配置相同高优先级覆盖低优先级。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Kele-Bingtang/Kele-Bingtang.github.io/edit/master/docs/32.Spring生态/30.Spring Boot/16.Spring Boot - 多环境配置.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=Spring%20Boot" title="标签">#Spring Boot</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2023/10/30, 00:57:24</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/spring-boot/aware/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">Spring Boot - Aware</div></a> <a href="/spring-boot/scheduling/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">Spring Boot - 定时任务</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
