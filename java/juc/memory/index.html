<li><a href="#如何保证可见性">如何保证可见性</a></li><li><a href="#如何保证有序性">如何保证有序性</a></li><li><a href="#synchronized-能保证有序性吗">synchronized 能保证有序性吗？</a></li><li><a href="#double-checked-locking-问题">double-checked locking 问题</a></li><li><a href="#double-checked-locking-解决">double-checked locking 解决</a></li></ul></li><li><a href="#happens-before">happens-before</a><ul><li><a href="#规则">规则</a></li><li><a href="#总结">总结</a></li></ul></li><li><a href="#习题">习题</a><ul><li><a href="#balking-模式习题">balking 模式习题</a></li><li><a href="#线程安全单例习题">线程安全单例习题</a></li></ul></li></ul></div><p></p> <div class="custom-block note"><p class="custom-block-title">笔记</p> <p>前面的共享模式讲解的 Monitor 主要关注的是访问共享变量时，保证临界区代码的原子性。</p> <p>这一章我们进一步深入学习共享变量在多线程间的「可见性」问题与多条指令执行时的「有序性」问题。</p> <div class="custom-block right"><p>2022-5-12 @YoungKbt</p></div></div> <h2 id="java-内存模型"><a href="#java-内存模型" class="header-anchor">#</a> Java 内存模型</h2> <h3 id="什么是jmm"><a href="#什么是jmm" class="header-anchor">#</a> 什么是JMM</h3> <p>JMM 即 Java Memory Model，它定义了主存、工作内存抽象概念，底层对应着 CPU 寄存器、缓存、硬件内存、CPU 指令优化等。</p> <p>因为在不同的硬件生产商和不同的操作系统下，内存的访问逻辑有一定的差异，结果就是当你的代码在某个系统环境下运行良好，并且线程安全，但是换了个系统就出现各种问题。Java 内存模型，就是为了屏蔽系统和硬件的差异，让一套代码在不同平台下能到达相同的访问结果。JMM 从 Java5 开始的 JSR-133 发布后，已经成熟和完善起来。</p> <p>JMM 规定了内存主要划分为 <strong>主内存</strong> 和 <strong>工作内存</strong> 两种。此处的主内存和工作内存跟 JVM 内存划分（堆、 栈、方法区）是在不同的层次上进行的，如果非要对应起来，主内存对应的是 Java 堆中的对象实例部分，工作内存对应的是栈中的部分区域，从更底层的来说，主内存对应的是硬件的物理内存，工作内存对应的是寄存器和高速缓存。</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/juc/20220524165552.png" alt="JUC-00000031"></p> <p>JVM 在设计时候考虑到，如果 Java 线程每次读取和写入变量都直接操作主内存，对性能影响比较大，所以每条线程拥有各自的工作内存，工作内存中的变量是主内存中的一份拷贝，线程对变量的读取和写入，直接在工作内存中操作，而不能直接去操作主内存中的变量。但是这样就会出现一个问题，当一个线程修改了自己工作内存中变量，对其他线程是不可见的，会导致线程不安全的问题。因此 JMM 制定了一套标准来保证开发者在编写多线程程序的时候，能够控制什么时候内存会被同步给其他线程。</p> <h3 id="jmm-的内存模型"><a href="#jmm-的内存模型" class="header-anchor">#</a> JMM 的内存模型</h3> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/juc/20220524163416.png" alt="00000032"></p> <p>线程 A 感知不到线程 B 操作了值的变化。如何能够保证线程间可以同步感知这个问题呢？只需要使用 volatile 关键字即可。volatile 保证线程间变量的可见性，简单地说就是当线程 A 对变量 X 进行了修改后，在线程 A 后面执行的其他线程能看到变量 X 的变动，更详细地说是要符合以下两个规则：</p> <ul><li>线程对变量进行修改之后，要立刻回写到主内存</li> <li>线程对变量读取的时候，要从主内存中读，而不是缓存</li></ul> <p>各线程的工作内存间彼此独立，互不可见，在线程启动的时候，虚拟机为每个内存分配一块工作内存，不仅包含了线程内部定义的局部变量，也包含了线程所需要使用的共享变量（非线程内构造的对象）的副本，即为了提高执行效率。</p> <p><strong>内存交互操作</strong></p> <p>内存交互操作有 8 种，虚拟机实现必须保证每一个操作都是原子的，不可在分的（对于 double 和 long 类型的变量来说，load、store、read 和 write 操作在某些平台上允许例外）</p> <ul><li>lock（锁定）：作用于主内存的变量，把一个变量标识为线程独占状态</li> <li>unlock（解锁）：作用于主内存的变量，它把一个处于锁定状态的变量释放出来，释放后的变量才可以被其他线程锁定</li> <li>read（读取）：作用于主内存变量，它把一个变量的值从主内存传输到线程的工作内存中，以便随后的 load 动作使用</li> <li>load（载入）：作用于工作内存的变量，它把 read 操作从主存中变量放入工作内存中</li> <li>use（使用）：作用于工作内存中的变量，它把工作内存中的变量传输给执行引擎，每当虚拟机遇到一个需要使用到变量的值，就会使用到这个指令</li> <li>assign（赋值）：作用于工作内存中的变量，它把一个从执行引擎中接受到的值放入工作内存的变量副本中</li> <li>store（存储）：作用于主内存中的变量，它把一个从工作内存中一个变量的值传送到主内存中，以便后续的 write 使用</li> <li>write（写入）：作用于主内存中的变量，它把 store 操作从工作内存中得到的变量的值放入主内 存的变量中</li></ul> <p><strong>JMM 对这八种指令的使用，制定了如下规则：</strong></p> <ul><li>不允许 read 和 load、store 和 write 操作之一单独出现。即：使用了 read 必须 load，使用了 store 必须 write</li> <li>不允许线程丢弃他最近的 assign 操作，即工作变量的数据改变了之后，必须告知主存</li> <li>不允许一个线程将没有 assign 的数据从工作内存同步回主内存</li> <li>一个新的变量必须在主内存中诞生，不允许工作内存直接使用一个未被初始化的变量。就是对变量实施 use、store 操作之前，必须经过 assign 和 load 操作</li> <li>一个变量同一时间只有一个线程能对其进行 lock。多次 lock 后，必须执行相同次数的 unlock 才能解锁</li> <li>如果对一个变量进行 lock 操作，会清空所有工作内存中此变量的值，在执行引擎使用这个变量前， 必须重新 load 或 assign 操作初始化变量的值</li> <li>如果一个变量没有被 lock，就不能对其进行 unlock 操作。也不能 unlock 一个被其他线程锁住的变量</li> <li>对一个变量进行 unlock 操作之前，必须把此变量同步回主内存</li></ul> <p>JMM 对这八种操作规则和对 volatile 的一些特殊规则就能确定哪里操作是线程安全，哪些操作是线程不安全的了。但是这些规则实在复杂，很难在实践中直接分析。所以一般我们也不会通过上述规则进行分析。更多的时候，使用 Java 的 happen-before 规则来进行分析。</p> <p>happens-before 字面翻译过来就是先行发生。</p> <blockquote><p>A happens-before B 就是 A 先行发生于 B？</p></blockquote> <p>不准确！在 Java 内存模型中，happens-before 应该翻译成：前一个操作的结果可以被后续的操作获取。讲白点就是前面一个操作把变量 a 赋值为 1，那后面一个操作肯定能知道 a 已经变成了 1。</p> <p>我们再来看看为什么需要这几条规则？</p> <p>因为我们现在电脑都是多 CPU，并且都有缓存，导致多线程直接的可见性问题。</p> <p>所以为了解决多线程的可见性问题，就搞出了 happens-before 原则，让线程之间遵守这些原则。编译器还会优化我们的语句，所以等于是给了编译器优化的约束。不能让它优化的不知道东南西北了！</p> <p>JMM 体现在以下几个方面：</p> <ul><li>原子性 - 保证指令不会受到线程上下文切换的影响</li> <li>可见性 - 保证指令不会受 CPU 缓存的影响</li> <li>有序性 - 保证指令不会受 CPU 指令并行优化的影响</li></ul> <p>volatile 就是 JMM 的一个同步机制类。</p> <p>volitile 是 Java 虚拟机提供的轻量级的同步机制，三大特性：</p> <ul><li><p>保证可见性</p></li> <li><p>不保证原子性</p></li> <li><p>禁止指令重排</p></li></ul> <h2 id="volatile-可见性"><a href="#volatile-可见性" class="header-anchor">#</a> volatile 可见性</h2> <h3 id="退不出的循环"><a href="#退不出的循环" class="header-anchor">#</a> 退不出的循环</h3> <p>先来看一个现象，main 线程对 run 变量的修改对于 t 线程不可见，导致了 t 线程无法停止：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">static</span> <span class="token keyword">void</span> <span class="token function">main</span><span class="token punctuation">(</span><span class="token class-name">String</span><span class="token punctuation">[</span><span class="token punctuation">]</span> args<span class="token punctuation">)</span> <span class="token punctuation">{</span>
    <span class="token keyword">static</span> <span class="token keyword">boolean</span> run <span class="token operator">=</span> <span class="token boolean">true</span><span class="token punctuation">;</span>
    <span class="token keyword">public</span> <span class="token keyword">static</span> <span class="token keyword">void</span> <span class="token function">main</span><span class="token punctuation">(</span><span class="token class-name">String</span><span class="token punctuation">[</span><span class="token punctuation">]</span> args<span class="token punctuation">)</span> <span class="token keyword">throws</span> <span class="token class-name">InterruptedException</span> <span class="token punctuation">{</span>
        
        <span class="token class-name">Thread</span> t <span class="token operator">=</span> <span class="token keyword">new</span> <span class="token class-name">Thread</span><span class="token punctuation">(</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token operator">-&gt;</span><span class="token punctuation">{</span>
            <span class="token keyword">while</span><span class="token punctuation">(</span>run<span class="token punctuation">)</span><span class="token punctuation">{</span>
                <span class="token comment">// ....</span>
            <span class="token punctuation">}</span>
        <span class="token punctuation">}</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        
        t<span class="token punctuation">.</span><span class="token function">start</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        <span class="token function">sleep</span><span class="token punctuation">(</span><span class="token number">1</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        run <span class="token operator">=</span> <span class="token boolean">false</span><span class="token punctuation">;</span> <span class="token comment">// 线程 t 不会如预想的停下来</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br></div></div><p>我们发现，即使修改 run 为 false，但是 <code>while(run)</code> 内部依然一直运行，没有停止，这是为什么呢？</p> <p>分析一下：</p> <p>初始状态，t 线程刚开始从主内存读取了 run 的值到工作内存，主内存是所有线程共享的内存，而工作内存是线程私有的。</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/juc/20220512213746.png" alt="image-20220512213716308"></p> <p>因为 t 线程要频繁从主内存中读取 run 的值，JIT 编译器会将 run 的值缓存至自己工作内存中的高速缓存中（<strong>热点存储</strong>），减少对主存中 run 的访问，提高效率。</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/juc/20220512213849.png" alt="image-20220512213848385"></p> <p>1 秒之后，main 线程修改了 run 的值，并同步至主存，而 t 是从自己工作内存中的高速缓存中读取这个变量的值，结果永远是旧值。</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/juc/20220512214030.png" alt="image-20220512214029041"></p> <h3 id="解决方法"><a href="#解决方法" class="header-anchor">#</a> 解决方法</h3> <p>使用 volatile（易变关键字）。</p> <p>它可以用来修饰成员变量和静态成员变量，他可以避免线程从自己的工作缓存中查找变量的值，必须到主存中获取它的值，线程操作 volatile 变量都是直接操作主主存。</p> <div class="language-java line-numbers-mode"><div class="highlight-lines"><br><div class="highlighted"> </div><br><br><br><br><br><br><br><br><br><br><br><br><br><br></div><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">static</span> <span class="token keyword">void</span> <span class="token function">main</span><span class="token punctuation">(</span><span class="token class-name">String</span><span class="token punctuation">[</span><span class="token punctuation">]</span> args<span class="token punctuation">)</span> <span class="token punctuation">{</span>
    <span class="token keyword">volatile</span> <span class="token keyword">static</span> <span class="token keyword">boolean</span> run <span class="token operator">=</span> <span class="token boolean">true</span><span class="token punctuation">;</span>
    <span class="token keyword">public</span> <span class="token keyword">static</span> <span class="token keyword">void</span> <span class="token function">main</span><span class="token punctuation">(</span><span class="token class-name">String</span><span class="token punctuation">[</span><span class="token punctuation">]</span> args<span class="token punctuation">)</span> <span class="token keyword">throws</span> <span class="token class-name">InterruptedException</span> <span class="token punctuation">{</span>
        
        <span class="token class-name">Thread</span> t <span class="token operator">=</span> <span class="token keyword">new</span> <span class="token class-name">Thread</span><span class="token punctuation">(</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token operator">-&gt;</span><span class="token punctuation">{</span>
            <span class="token keyword">while</span><span class="token punctuation">(</span>run<span class="token punctuation">)</span><span class="token punctuation">{</span>
                <span class="token comment">// ....</span>
            <span class="token punctuation">}</span>
        <span class="token punctuation">}</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        
        t<span class="token punctuation">.</span><span class="token function">start</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        <span class="token function">sleep</span><span class="token punctuation">(</span><span class="token number">1</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        run <span class="token operator">=</span> <span class="token boolean">false</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre><div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br></div></div><h3 id="可见性-vs-原子性"><a href="#可见性-vs-原子性" class="header-anchor">#</a> 可见性 vs 原子性</h3> <p>前面例子体现的实际就是可见性，它保证的是在多个线程之间，一个线程对 volatile 变量的修改对另一个线程可见，不能保证原子性，仅用在 <strong>一个线程写，多个线程读</strong> 的情况：上例从字节码理解是这样的：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code>getstatic run <span class="token comment">// 线程 t 获取 run true </span>
getstatic run <span class="token comment">// 线程 t 获取 run true </span>
getstatic run <span class="token comment">// 线程 t 获取 run true </span>
getstatic run <span class="token comment">// 线程 t 获取 run true </span>
putstatic run <span class="token comment">// 线程 main 修改 run 为 false， 仅此一次</span>
getstatic run <span class="token comment">// 线程 t 获取 run false</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><p>比较一下之前我们将线程安全时举的例子：两个线程一个 i++ 一个 i--，只能保证看到最新值，不能解决指令交错，如下：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token comment">// 假设 i 的初始值为 0 </span>
getstatic i <span class="token comment">// 线程 2 获取静态变量i的值 线程内 i = 0 </span>
    
getstatic i <span class="token comment">// 线程 1 获取静态变量i的值 线程内 i = 0 </span>
iconst_1 <span class="token comment">// 线程 1 准备常量 1 </span>
iadd <span class="token comment">// 线程 1 自增 线程内 i = 1 </span>
putstatic i <span class="token comment">// 线程 1 将修改后的值存入静态变量 i 静态变量 i = 1 </span>
    
iconst_1 <span class="token comment">// 线程 2 准备常量 1 </span>
isub <span class="token comment">// 线程 2 自减线程内 i = -1 </span>
putstatic i <span class="token comment">// 线程 2 将修改后的值存入静态变量 i 静态变量 i = -1</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br></div></div><p>注意：synchronized 语句块既可以保证代码块的原子性，也同时保证代码块内变量的可见性。但缺点是 synchronized 是属于重量级操作，性能相对更低。如下：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">static</span> <span class="token keyword">void</span> <span class="token function">main</span><span class="token punctuation">(</span><span class="token class-name">String</span><span class="token punctuation">[</span><span class="token punctuation">]</span> args<span class="token punctuation">)</span> <span class="token punctuation">{</span>
    <span class="token keyword">static</span> <span class="token keyword">boolean</span> run <span class="token operator">=</span> <span class="token boolean">true</span><span class="token punctuation">;</span>
    <span class="token keyword">static</span> <span class="token class-name">Object</span> lock <span class="token operator">=</span> <span class="token keyword">new</span> <span class="token class-name">Object</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token keyword">public</span> <span class="token keyword">static</span> <span class="token keyword">void</span> <span class="token function">main</span><span class="token punctuation">(</span><span class="token class-name">String</span><span class="token punctuation">[</span><span class="token punctuation">]</span> args<span class="token punctuation">)</span> <span class="token keyword">throws</span> <span class="token class-name">InterruptedException</span> <span class="token punctuation">{</span>
        
        <span class="token class-name">Thread</span> t <span class="token operator">=</span> <span class="token keyword">new</span> <span class="token class-name">Thread</span><span class="token punctuation">(</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token operator">-&gt;</span><span class="token punctuation">{</span>
            <span class="token keyword">synchronized</span><span class="token punctuation">(</span>lock<span class="token punctuation">)</span> <span class="token punctuation">{</span>
                <span class="token keyword">while</span><span class="token punctuation">(</span>run<span class="token punctuation">)</span><span class="token punctuation">{</span>
                    <span class="token comment">// ....</span>
                <span class="token punctuation">}</span>
            <span class="token punctuation">}</span>

        <span class="token punctuation">}</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        
        t<span class="token punctuation">.</span><span class="token function">start</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        <span class="token function">sleep</span><span class="token punctuation">(</span><span class="token number">1</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        <span class="token keyword">synchronized</span><span class="token punctuation">(</span>lock<span class="token punctuation">)</span> <span class="token punctuation">{</span>
            run <span class="token operator">=</span> <span class="token boolean">false</span><span class="token punctuation">;</span>
        <span class="token punctuation">}</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br></div></div><p>所以更加建议使用 volatile 关键字。</p> <p>如果代码的死循环中加入 <code>System.out.println()</code>，会发现即使不加 volatile 修饰符，线程 t 也能正确看到对 run 变量的修改了，这是因为 <code>System.out.println()</code> 内部使用了 synchronized。</p> <h2 id="volatile-两阶段终止模式"><a href="#volatile-两阶段终止模式" class="header-anchor">#</a> volatile 两阶段终止模式</h2> <p>在一个线程 T1 中如何「优雅」终止线程 T2？这里的「优雅」指的是给 T2 一个料理后事的机会。</p> <p>在前面 <a href="/java/juc/java/#两阶段终止模式">JUC - java线程</a> 我们利用 interrupt 方法来实现两阶段终止模式，现在利用停止标记 + volatile 来实现。</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token comment">// 停止标记用 volatile 是为了保证该变量在多个线程之间的可见性</span>
<span class="token comment">// 我们的例子中，即主线程把它修改为 true 对 t1 线程可见</span>
<span class="token keyword">class</span> <span class="token class-name">TPTVolatile</span> <span class="token punctuation">{</span>
    <span class="token keyword">private</span> <span class="token class-name">Thread</span> thread<span class="token punctuation">;</span>
    <span class="token keyword">private</span> <span class="token keyword">volatile</span> <span class="token keyword">boolean</span> stop <span class="token operator">=</span> <span class="token boolean">false</span><span class="token punctuation">;</span>

    <span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">start</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">{</span>

        thread <span class="token operator">=</span> <span class="token keyword">new</span> <span class="token class-name">Thread</span><span class="token punctuation">(</span><span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token operator">-&gt;</span> <span class="token punctuation">{</span>
            <span class="token keyword">while</span><span class="token punctuation">(</span><span class="token boolean">true</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
                <span class="token class-name">Thread</span> current <span class="token operator">=</span> <span class="token class-name">Thread</span><span class="token punctuation">.</span><span class="token function">currentThread</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
                <span class="token keyword">if</span><span class="token punctuation">(</span>stop<span class="token punctuation">)</span> <span class="token punctuation">{</span>
                    log<span class="token punctuation">.</span><span class="token function">debug</span><span class="token punctuation">(</span><span class="token string">&quot;料理后事&quot;</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
                    <span class="token keyword">break</span><span class="token punctuation">;</span>
                <span class="token punctuation">}</span>
                <span class="token keyword">try</span> <span class="token punctuation">{</span>
                    <span class="token class-name">Thread</span><span class="token punctuation">.</span><span class="token function">sleep</span><span class="token punctuation">(</span><span class="token number">1000</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
                    log<span class="token punctuation">.</span><span class="token function">debug</span><span class="token punctuation">(</span><span class="token string">&quot;将结果保存&quot;</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
                <span class="token punctuation">}</span> <span class="token keyword">catch</span> <span class="token punctuation">(</span><span class="token class-name">InterruptedException</span> e<span class="token punctuation">)</span> <span class="token punctuation">{</span>
                <span class="token punctuation">}</span>
                <span class="token comment">// 执行监控操作</span>
                log<span class="token punctuation">.</span><span class="token function">debug</span><span class="token punctuation">(</span><span class="token string">&quot;执行监控记录&quot;</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
            <span class="token punctuation">}</span>
        <span class="token punctuation">}</span><span class="token punctuation">,</span><span class="token string">&quot;监控线程&quot;</span><span class="token punctuation">)</span><span class="token punctuation">;</span>

        thread<span class="token punctuation">.</span><span class="token function">start</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
    <span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">stop</span><span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
        stop <span class="token operator">=</span> <span class="token boolean">true</span><span class="token punctuation">;</span>
        <span class="token comment">// 这里 interrupt 打断的是 17 行睡眠，否则等睡眠 1s 才能重新进入 while 循环</span>
        thread<span class="token punctuation">.</span><span class="token function">interrupt</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
<span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">Test</span> <span class="token punctuation">{</span>
    <span class="token keyword">public</span> <span class="token keyword">static</span> <span class="token keyword">void</span> <span class="token function">main</span><span class="token punctuation">(</span><span class="token class-name">String</span><span class="token punctuation">[</span><span class="token punctuation">]</span> args<span class="token punctuation">)</span> <span class="token punctuation">{</span>
        <span class="token class-name">TPTVolatile</span> t <span class="token operator">=</span> <span class="token keyword">new</span> <span class="token class-name">TPTVolatile</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        t<span class="token punctuation">.</span><span class="token function">start</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        <span class="token class-name">Thread</span><span class="token punctuation">.</span><span class="token function">sleep</span><span class="token punctuation">(</span><span class="token number">3500</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        log<span class="token punctuation">.</span><span class="token function">debug</span><span class="token punctuation">(</span><span class="token string">&quot;stop&quot;</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        t<span class="token punctuation">.</span><span class="token function">stop</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br><span class="line-number">27</span><br><span class="line-number">28</span><br><span class="line-number">29</span><br><span class="line-number">30</span><br><span class="line-number">31</span><br><span class="line-number">32</span><br><span class="line-number">33</span><br><span class="line-number">34</span><br><span class="line-number">35</span><br><span class="line-number">36</span><br><span class="line-number">37</span><br><span class="line-number">38</span><br><span class="line-number">39</span><br><span class="line-number">40</span><br><span class="line-number">41</span><br><span class="line-number">42</span><br></div></div><p>结果</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token number">11</span><span class="token operator">:</span><span class="token number">54</span><span class="token operator">:</span><span class="token number">52.003</span> <span class="token class-name"><span class="token namespace">c<span class="token punctuation">.</span></span>TPTVolatile</span> <span class="token punctuation">[</span>监控线程<span class="token punctuation">]</span> <span class="token operator">-</span> 将结果保存
<span class="token number">11</span><span class="token operator">:</span><span class="token number">54</span><span class="token operator">:</span><span class="token number">53.006</span> <span class="token class-name"><span class="token namespace">c<span class="token punctuation">.</span></span>TPTVolatile</span> <span class="token punctuation">[</span>监控线程<span class="token punctuation">]</span> <span class="token operator">-</span> 将结果保存
<span class="token number">11</span><span class="token operator">:</span><span class="token number">54</span><span class="token operator">:</span><span class="token number">54.007</span> <span class="token class-name"><span class="token namespace">c<span class="token punctuation">.</span></span>TPTVolatile</span> <span class="token punctuation">[</span>监控线程<span class="token punctuation">]</span> <span class="token operator">-</span> 将结果保存
<span class="token number">11</span><span class="token operator">:</span><span class="token number">54</span><span class="token operator">:</span><span class="token number">54.502</span> <span class="token class-name"><span class="token namespace">c<span class="token punctuation">.</span></span>TestTwoPhaseTermination</span> <span class="token punctuation">[</span>main<span class="token punctuation">]</span> <span class="token operator">-</span> stop 
<span class="token number">11</span><span class="token operator">:</span><span class="token number">54</span><span class="token operator">:</span><span class="token number">54.502</span> <span class="token class-name"><span class="token namespace">c<span class="token punctuation">.</span></span>TPTVolatile</span> <span class="token punctuation">[</span>监控线程<span class="token punctuation">]</span> <span class="token operator">-</span> 料理后事
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><h2 id="同步模式之-balking"><a href="#同步模式之-balking" class="header-anchor">#</a> 同步模式之 Balking</h2> <h3 id="定义"><a href="#定义" class="header-anchor">#</a> 定义</h3> <p>Balking（犹豫）模式用在一个线程发现另一个线程或本线程已经做了某一件相同的事，那么本线程就无需再做了，直接结束返回。</p> <h3 id="实现"><a href="#实现" class="header-anchor">#</a> 实现</h3> <p>例如：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">MonitorService</span> <span class="token punctuation">{</span>
    <span class="token comment">// 用来表示是否已经有线程已经在执行启动了</span>
    <span class="token keyword">private</span> <span class="token keyword">volatile</span> <span class="token keyword">boolean</span> starting<span class="token punctuation">;</span>
    <span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">start</span><span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
        log<span class="token punctuation">.</span><span class="token function">info</span><span class="token punctuation">(</span><span class="token string">&quot;该监控线程已启动?({})&quot;</span><span class="token punctuation">,</span> starting<span class="token punctuation">)</span><span class="token punctuation">;</span>
        <span class="token comment">// 不加锁，可能多个线程进入 if 里，同时得出 starting 为 false，同时修改 starting 为 true</span>
        <span class="token keyword">synchronized</span> <span class="token punctuation">(</span><span class="token keyword">this</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
            <span class="token keyword">if</span> <span class="token punctuation">(</span>starting<span class="token punctuation">)</span> <span class="token punctuation">{</span>
                <span class="token keyword">return</span><span class="token punctuation">;</span>
            <span class="token punctuation">}</span>
            starting <span class="token operator">=</span> <span class="token boolean">true</span><span class="token punctuation">;</span>
        <span class="token punctuation">}</span>

        <span class="token comment">// 真正启动监控线程...</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br></div></div><p>当前端页面多次点击按钮调用 start 时，输出：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token punctuation">[</span>http<span class="token operator">-</span>nio<span class="token operator">-</span><span class="token number">8080</span><span class="token operator">-</span>exec<span class="token operator">-</span><span class="token number">1</span><span class="token punctuation">]</span> <span class="token class-name"><span class="token namespace">cn<span class="token punctuation">.</span>itcast<span class="token punctuation">.</span>monitor<span class="token punctuation">.</span>service<span class="token punctuation">.</span></span>MonitorService</span> <span class="token operator">-</span> 该监控线程已启动<span class="token operator">?</span><span class="token punctuation">(</span><span class="token boolean">false</span><span class="token punctuation">)</span>
<span class="token punctuation">[</span>http<span class="token operator">-</span>nio<span class="token operator">-</span><span class="token number">8080</span><span class="token operator">-</span>exec<span class="token operator">-</span><span class="token number">1</span><span class="token punctuation">]</span> <span class="token class-name"><span class="token namespace">cn<span class="token punctuation">.</span>itcast<span class="token punctuation">.</span>monitor<span class="token punctuation">.</span>service<span class="token punctuation">.</span></span>MonitorService</span> <span class="token operator">-</span> 监控线程已启动<span class="token punctuation">.</span><span class="token punctuation">.</span><span class="token punctuation">.</span>
<span class="token punctuation">[</span>http<span class="token operator">-</span>nio<span class="token operator">-</span><span class="token number">8080</span><span class="token operator">-</span>exec<span class="token operator">-</span><span class="token number">2</span><span class="token punctuation">]</span> <span class="token class-name"><span class="token namespace">cn<span class="token punctuation">.</span>itcast<span class="token punctuation">.</span>monitor<span class="token punctuation">.</span>service<span class="token punctuation">.</span></span>MonitorService</span> <span class="token operator">-</span> 该监控线程已启动<span class="token operator">?</span><span class="token punctuation">(</span><span class="token boolean">true</span><span class="token punctuation">)</span>
<span class="token punctuation">[</span>http<span class="token operator">-</span>nio<span class="token operator">-</span><span class="token number">8080</span><span class="token operator">-</span>exec<span class="token operator">-</span><span class="token number">3</span><span class="token punctuation">]</span> <span class="token class-name"><span class="token namespace">cn<span class="token punctuation">.</span>itcast<span class="token punctuation">.</span>monitor<span class="token punctuation">.</span>service<span class="token punctuation">.</span></span>MonitorService</span> <span class="token operator">-</span> 该监控线程已启动<span class="token operator">?</span><span class="token punctuation">(</span><span class="token boolean">true</span><span class="token punctuation">)</span>
<span class="token punctuation">[</span>http<span class="token operator">-</span>nio<span class="token operator">-</span><span class="token number">8080</span><span class="token operator">-</span>exec<span class="token operator">-</span><span class="token number">4</span><span class="token punctuation">]</span> <span class="token class-name"><span class="token namespace">cn<span class="token punctuation">.</span>itcast<span class="token punctuation">.</span>monitor<span class="token punctuation">.</span>service<span class="token punctuation">.</span></span>MonitorService</span> <span class="token operator">-</span> 该监控线程已启动<span class="token operator">?</span><span class="token punctuation">(</span><span class="token boolean">true</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>它还经常用来实现线程安全的单例</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">final</span> <span class="token keyword">class</span> <span class="token class-name">Singleton</span> <span class="token punctuation">{</span>
    <span class="token keyword">private</span> <span class="token class-name">Singleton</span><span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
    <span class="token punctuation">}</span>
    <span class="token keyword">private</span> <span class="token keyword">static</span> <span class="token class-name">Singleton</span> <span class="token constant">INSTANCE</span> <span class="token operator">=</span> <span class="token keyword">null</span><span class="token punctuation">;</span>
    
    <span class="token keyword">public</span> <span class="token keyword">static</span> <span class="token keyword">synchronized</span> <span class="token class-name">Singleton</span> <span class="token function">getInstance</span><span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
        <span class="token keyword">if</span> <span class="token punctuation">(</span><span class="token constant">INSTANCE</span> <span class="token operator">!=</span> <span class="token keyword">null</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
            <span class="token keyword">return</span> <span class="token constant">INSTANCE</span><span class="token punctuation">;</span>
        <span class="token punctuation">}</span>
        <span class="token constant">INSTANCE</span> <span class="token operator">=</span> <span class="token keyword">new</span> <span class="token class-name">Singleton</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        <span class="token keyword">return</span> <span class="token constant">INSTANCE</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br></div></div><p>对比一下保护性暂停模式：保护性暂停模式用在一个线程等待另一个线程的执行结果，当条件不满足时线程等待。</p> <h2 id="volatile-有序性"><a href="#volatile-有序性" class="header-anchor">#</a> volatile 有序性</h2> <p>JVM 会在不影响正确性的前提下，可以调整语句的执行顺序，思考下面一段代码：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">static</span> <span class="token keyword">void</span> <span class="token function">main</span><span class="token punctuation">(</span><span class="token class-name">String</span><span class="token punctuation">[</span><span class="token punctuation">]</span> args<span class="token punctuation">)</span> <span class="token punctuation">{</span>
    <span class="token keyword">static</span> <span class="token keyword">int</span> i<span class="token punctuation">;</span>
    <span class="token keyword">static</span> <span class="token keyword">int</span> j<span class="token punctuation">;</span>
    <span class="token comment">// 在某个线程内执行如下赋值操作</span>
    i <span class="token operator">=</span> <span class="token number">1</span><span class="token punctuation">;</span> 
    j <span class="token operator">=</span> <span class="token number">2</span><span class="token punctuation">;</span> 
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br></div></div><p>可以看到，至于是先执行 i 还是先执行 j，对最终的结果不会产生影响。所以，上面代码真正执行时，JVM 执行后既可以是</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code>i <span class="token operator">=</span> <span class="token number">1</span><span class="token punctuation">;</span>
j <span class="token operator">=</span> <span class="token number">2</span><span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>也可以是</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code>j <span class="token operator">=</span> <span class="token number">2</span><span class="token punctuation">;</span>
i <span class="token operator">=</span> <span class="token number">1</span><span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>这种特性称之为『指令重排』，上面代码在单线程没有任何影响，但是在多线程下『指令重排』会影响正确性。为什么要有重排指令这项优化呢？从 CPU 执行指令的原理来理解一下吧。</p> <h3 id="鱼罐头的故事"><a href="#鱼罐头的故事" class="header-anchor">#</a> 鱼罐头的故事</h3> <p>加工一条鱼需要 50 分钟，只能一条鱼、一条鱼顺序加工。</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/juc/20220512232734.png" alt="image-20220512232733367"></p> <p>怎么优化时间呢？可以将每个鱼罐头的加工流程细分为 5 个步骤：</p> <ul><li>去鳞清洗 10 分钟</li> <li>蒸煮沥水 10 分钟</li> <li>加注汤料 10 分钟</li> <li>杀菌出锅 10 分钟</li> <li>真空封罐 10 分钟</li></ul> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/juc/20220512232850.png" alt="image-20220512232849871"></p> <p>首先工人无法做同一条鱼的第一步，还做这条鱼的第二步，因为第二步蒸煮沥水必须先完成第一步去鳞清洗（针对同一条鱼）。</p> <p>但是工人可以在做第一条鱼的第一步时，做第二条鱼的第二步，第三条鱼的第三步，第四条鱼的第四步，第五条鱼的第五步。</p> <p>这样即使只有一个工人，最理想的情况是：他能够在 10 分钟内同时做好这 5 件事，因为对第一条鱼的真空装罐，不会影响对第二条鱼的杀菌出锅，依此类推。</p> <h3 id="指令重排序优化"><a href="#指令重排序优化" class="header-anchor">#</a> 指令重排序优化</h3> <p>事实上，现代处理器会设计为一个时钟周期完成一条执行时间最长的 CPU 指令。为什么这么做呢？可以想到指令还可以再划分成一个个更小的阶段，例如，每条指令都可以分 5 个阶段：取指令 - 指令译码 - 执行指令 - 内存访问 - 数据写回。</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/juc/20220512233426.png" alt="image-20220512233425666"></p> <blockquote><p>术语参考：</p> <ul><li>instruction fetch (IF)</li> <li>instruction decode (ID)</li> <li>execute (EX)</li> <li>memory access (MEM)</li> <li>register write back (WB)</li></ul></blockquote> <p>在不改变程序结果的前提下，这些指令的各个阶段可以通过重排序和组合来实现指令级并行，这一技术在 80 年代中叶到 90 年代中叶占据了计算架构的重要地位。</p> <blockquote><p>分阶段，分工是提升效率的关键！</p></blockquote> <p>指令重排的前提是，重排指令不能影响结果，例如：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">test</span><span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
    <span class="token comment">// 可以重排的例子</span>
    <span class="token keyword">int</span> a <span class="token operator">=</span> <span class="token number">10</span><span class="token punctuation">;</span> <span class="token comment">// 指令 1</span>
    <span class="token keyword">int</span> b <span class="token operator">=</span> <span class="token number">20</span><span class="token punctuation">;</span> <span class="token comment">// 指令 2</span>
    <span class="token class-name">System</span><span class="token punctuation">.</span>out<span class="token punctuation">.</span><span class="token function">println</span><span class="token punctuation">(</span> a <span class="token operator">+</span> b <span class="token punctuation">)</span><span class="token punctuation">;</span>
    
    <span class="token comment">// 不能重排的例子</span>
    <span class="token keyword">int</span> a <span class="token operator">=</span> <span class="token number">10</span><span class="token punctuation">;</span> <span class="token comment">// 指令 1</span>
    <span class="token keyword">int</span> b <span class="token operator">=</span> a <span class="token operator">-</span> <span class="token number">5</span><span class="token punctuation">;</span> <span class="token comment">// 指令 2</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br></div></div><h3 id="支持流水线的处理器"><a href="#支持流水线的处理器" class="header-anchor">#</a> 支持流水线的处理器</h3> <ul><li><p>Clock Cycle Time：主频的概念大家接触的比较多，而 CPU 的 Clock Cycle Time（时钟周期时间），等于主频的倒数，意思是 CPU 能够识别的最小时间单位，比如说 4G 主频的 CPU 的 Clock Cycle Time 就是 0.25 ns，作为对比，我们墙上挂钟的 Cycle Time 是 1s</p></li> <li><p>CPI：有的指令需要更多的时钟周期时间，所以引出了 CPI （Cycles Per Instruction）指令平均时钟周期数</p></li> <li><p>IPC：IPC（Instruction Per Clock Cycle） 即 CPI 的倒数，表示每个时钟周期能够运行的指令数</p></li> <li><p><code>程序 CPU 执行时间 = 指令数 * CPI * Clock Cycle Time</code></p></li></ul> <p>现代 CPU 支持 <strong>多级指令流水线</strong>，例如支持同时执行取指令 - 指令译码 - 执行指令 - 内存访问 - 数据写回的处理器，就可以称之为 <strong>五级指令流水线</strong>。这时 CPU 可以在一个时钟周期内，同时运行五条指令的不同阶段（相当于一条执行时间最长的复杂指令），IPC = 1，本质上，流水线技术并不能缩短单条指令的执行时间，但它变相地提高了指令地吞吐率。</p> <blockquote><p>奔腾四（Pentium 4）支持高达 35 级流水线，但由于功耗太高被废弃。</p></blockquote> <p>如下图，CPU 虽然无法同时执行一条指令的所有步骤，但是可以执行一条指令的某个步骤，同时其他指令的其他步骤（所以理论上能同时执行五个步骤（五个指令的一个步骤加起来等于五个步骤）。</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/juc/20220512233652.png" alt="image-20220512233651719"></p> <h3 id="诡异的结果"><a href="#诡异的结果" class="header-anchor">#</a> 诡异的结果</h3> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">Test</span> <span class="token punctuation">{</span>
    <span class="token keyword">int</span> num <span class="token operator">=</span> <span class="token number">0</span><span class="token punctuation">;</span>
    <span class="token keyword">boolean</span> ready <span class="token operator">=</span> <span class="token boolean">false</span><span class="token punctuation">;</span>
    <span class="token comment">// 线程 1 执行此方法</span>
    <span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">actor1</span><span class="token punctuation">(</span><span class="token class-name">I_Result</span> r<span class="token punctuation">)</span> <span class="token punctuation">{</span>
        <span class="token keyword">if</span><span class="token punctuation">(</span>ready<span class="token punctuation">)</span> <span class="token punctuation">{</span>
            r<span class="token punctuation">.</span>r1 <span class="token operator">=</span> num <span class="token operator">+</span> num<span class="token punctuation">;</span>
        <span class="token punctuation">}</span> <span class="token keyword">else</span> <span class="token punctuation">{</span>
            r<span class="token punctuation">.</span>r1 <span class="token operator">=</span> <span class="token number">1</span><span class="token punctuation">;</span>
        <span class="token punctuation">}</span>
    <span class="token punctuation">}</span>
    <span class="token comment">// 线程 2 执行此方法</span>
    <span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">actor2</span><span class="token punctuation">(</span><span class="token class-name">I_Result</span> r<span class="token punctuation">)</span> <span class="token punctuation">{</span> 
        num <span class="token operator">=</span> <span class="token number">2</span><span class="token punctuation">;</span>
        ready <span class="token operator">=</span> <span class="token boolean">true</span><span class="token punctuation">;</span> 
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br></div></div><p>I_Result 是一个对象，有一个属性 r1 用来保存结果，问可能的结果有几种？</p> <ul><li>情况 1：线程 1 先执行，这时 <code>ready = false</code>，所以进入 else 分支结果为 1</li> <li>情况 2：线程 2 先执行 num = 2，但没来得及执行 ready = true，线程 1 执行，还是进入 else 分支，结果为 1</li> <li>情况 3：线程 2 执行到 <code>ready = true</code>，线程 1 执行，这回进入 if 分支，结果为 4（因为 num 已经执行过了）</li></ul> <p>还有一个诡异的结果：</p> <ul><li>线程 2 执行 <code>ready = true</code>，切换到线程 1，进入 if 分支，相加为 0，再切回线程 2 执行 num = 2</li></ul> <p>代码变成了：</p> <div class="language-java line-numbers-mode"><div class="highlight-lines"><br><br><br><br><br><br><br><br><br><br><br><br><br><div class="highlighted"> </div><div class="highlighted"> </div><br><br><br></div><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">Test</span> <span class="token punctuation">{</span>
    <span class="token keyword">int</span> num <span class="token operator">=</span> <span class="token number">0</span><span class="token punctuation">;</span>
    <span class="token keyword">boolean</span> ready <span class="token operator">=</span> <span class="token boolean">false</span><span class="token punctuation">;</span>
    <span class="token comment">// 线程1 执行此方法</span>
    <span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">actor1</span><span class="token punctuation">(</span><span class="token class-name">I_Result</span> r<span class="token punctuation">)</span> <span class="token punctuation">{</span>
        <span class="token keyword">if</span><span class="token punctuation">(</span>ready<span class="token punctuation">)</span> <span class="token punctuation">{</span>
            r<span class="token punctuation">.</span>r1 <span class="token operator">=</span> num <span class="token operator">+</span> num<span class="token punctuation">;</span>
        <span class="token punctuation">}</span> <span class="token keyword">else</span> <span class="token punctuation">{</span>
            r<span class="token punctuation">.</span>r1 <span class="token operator">=</span> <span class="token number">1</span><span class="token punctuation">;</span>
        <span class="token punctuation">}</span>
    <span class="token punctuation">}</span>
    <span class="token comment">// 线程2 执行此方法</span>
    <span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">actor2</span><span class="token punctuation">(</span><span class="token class-name">I_Result</span> r<span class="token punctuation">)</span> <span class="token punctuation">{</span> 
        ready <span class="token operator">=</span> <span class="token boolean">true</span><span class="token punctuation">;</span> 
        num <span class="token operator">=</span> <span class="token number">2</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre><div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br></div></div><p>13 和 14 行代码发生交换，这种现象叫做指令重排，是 JIT 编译器在运行时的一些优化。</p> <blockquote><p>如何验证呢？</p></blockquote> <p>这个现象需要通过大量测试才能复现，借助 Java 并发压测工具 jcstress，官方地址：<code>https://wiki.openjdk.java.net/display/CodeTools/jcstress</code></p> <p>首先在命令窗口执行如下代码，就能创建一个并发压测的 Maven 项目：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>mvn archetype:generate <span class="token parameter variable">-DinteractiveMode</span><span class="token operator">=</span>false <span class="token parameter variable">-DarchetypeGroupId</span><span class="token operator">=</span>org.openjdk.jcstress -
<span class="token assign-left variable">DarchetypeArtifactId</span><span class="token operator">=</span>jcstress-java-test-archetype <span class="token parameter variable">-DarchetypeVersion</span><span class="token operator">=</span><span class="token number">0.5</span> <span class="token parameter variable">-DgroupId</span><span class="token operator">=</span>cn.itcast -
<span class="token assign-left variable">DartifactId</span><span class="token operator">=</span>ordering <span class="token parameter variable">-Dversion</span><span class="token operator">=</span><span class="token number">1.0</span> 
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>创建 Maven 项目成功，提供如下测试类：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token annotation punctuation">@JCStressTest</span>
<span class="token annotation punctuation">@Outcome</span><span class="token punctuation">(</span>id <span class="token operator">=</span> <span class="token punctuation">{</span><span class="token string">&quot;1&quot;</span><span class="token punctuation">,</span> <span class="token string">&quot;4&quot;</span><span class="token punctuation">}</span><span class="token punctuation">,</span> expect <span class="token operator">=</span> <span class="token class-name">Expect</span><span class="token punctuation">.</span><span class="token constant">ACCEPTABLE</span><span class="token punctuation">,</span> desc <span class="token operator">=</span> <span class="token string">&quot;ok&quot;</span><span class="token punctuation">)</span>
<span class="token annotation punctuation">@Outcome</span><span class="token punctuation">(</span>id <span class="token operator">=</span> <span class="token string">&quot;0&quot;</span><span class="token punctuation">,</span> expect <span class="token operator">=</span> <span class="token class-name">Expect</span><span class="token punctuation">.</span><span class="token constant">ACCEPTABLE_INTERESTING</span><span class="token punctuation">,</span> desc <span class="token operator">=</span> <span class="token string">&quot;!!!!&quot;</span><span class="token punctuation">)</span>
<span class="token annotation punctuation">@State</span>
<span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">ConcurrencyTest</span> <span class="token punctuation">{</span>
    <span class="token keyword">int</span> num <span class="token operator">=</span> <span class="token number">0</span><span class="token punctuation">;</span>
    <span class="token keyword">boolean</span> ready <span class="token operator">=</span> <span class="token boolean">false</span><span class="token punctuation">;</span>
    <span class="token annotation punctuation">@Actor</span>
    <span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">actor1</span><span class="token punctuation">(</span><span class="token class-name">I_Result</span> r<span class="token punctuation">)</span> <span class="token punctuation">{</span>
        <span class="token keyword">if</span><span class="token punctuation">(</span>ready<span class="token punctuation">)</span> <span class="token punctuation">{</span>
            r<span class="token punctuation">.</span>r1 <span class="token operator">=</span> num <span class="token operator">+</span> num<span class="token punctuation">;</span>
        <span class="token punctuation">}</span> <span class="token keyword">else</span> <span class="token punctuation">{</span>
            r<span class="token punctuation">.</span>r1 <span class="token operator">=</span> <span class="token number">1</span><span class="token punctuation">;</span>
        <span class="token punctuation">}</span>
    <span class="token punctuation">}</span>
    <span class="token annotation punctuation">@Actor</span>
    <span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">actor2</span><span class="token punctuation">(</span><span class="token class-name">I_Result</span> r<span class="token punctuation">)</span> <span class="token punctuation">{</span>
        num <span class="token operator">=</span> <span class="token number">2</span><span class="token punctuation">;</span>
        ready <span class="token operator">=</span> <span class="token boolean">true</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br></div></div><p>我们将上面测试类打包成 jar 包并运行</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>mvn clean <span class="token function">install</span> 
<span class="token function">java</span> <span class="token parameter variable">-jar</span> target/jcstress.jar 
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>会输出我们感兴趣的结果，摘录其中一次结果：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token operator">*</span><span class="token operator">*</span><span class="token operator">*</span> <span class="token constant">INTERESTING</span> tests 
	<span class="token class-name">Some</span> interesting behaviors <span class="token class-name"><span class="token namespace">observed<span class="token punctuation">.</span></span> This</span> is <span class="token keyword">for</span> the plain curiosity<span class="token punctuation">.</span> 
	<span class="token number">2</span> matching test results<span class="token punctuation">.</span> 
		<span class="token punctuation">[</span><span class="token constant">OK</span><span class="token punctuation">]</span> <span class="token class-name"><span class="token namespace">test<span class="token punctuation">.</span></span>ConcurrencyTest</span> 
	<span class="token punctuation">(</span><span class="token constant">JVM</span> args<span class="token operator">:</span> <span class="token punctuation">[</span><span class="token operator">-</span><span class="token constant">XX</span><span class="token operator">:</span><span class="token operator">-</span><span class="token class-name">TieredCompilation</span><span class="token punctuation">]</span><span class="token punctuation">)</span> 
	<span class="token class-name">Observed</span> state       <span class="token class-name">Occurrences</span>                      <span class="token class-name">Expectation</span>      <span class="token class-name">Interpretation</span> 
				<span class="token number">0</span>           <span class="token number">1</span><span class="token punctuation">,</span><span class="token number">729</span>              <span class="token constant">ACCEPTABLE_INTERESTING</span>      <span class="token operator">!</span><span class="token operator">!</span><span class="token operator">!</span><span class="token operator">!</span> 
				<span class="token number">1</span>           <span class="token number">42</span><span class="token punctuation">,</span><span class="token number">617</span><span class="token punctuation">,</span><span class="token number">915</span>                     <span class="token constant">ACCEPTABLE</span>      ok 
				<span class="token number">4</span>           <span class="token number">5</span><span class="token punctuation">,</span><span class="token number">146</span><span class="token punctuation">,</span><span class="token number">627</span>                      <span class="token constant">ACCEPTABLE</span>      ok 
		<span class="token punctuation">[</span><span class="token constant">OK</span><span class="token punctuation">]</span> <span class="token class-name"><span class="token namespace">test<span class="token punctuation">.</span></span>ConcurrencyTest</span> 
	<span class="token punctuation">(</span><span class="token constant">JVM</span> args<span class="token operator">:</span> <span class="token punctuation">[</span><span class="token punctuation">]</span><span class="token punctuation">)</span> 
	<span class="token class-name">Observed</span> state       <span class="token class-name">Occurrences</span>                      <span class="token class-name">Expectation</span>      <span class="token class-name">Interpretation</span> 
				<span class="token number">0</span>           <span class="token number">1</span><span class="token punctuation">,</span><span class="token number">652</span>              <span class="token constant">ACCEPTABLE_INTERESTING</span>      <span class="token operator">!</span><span class="token operator">!</span><span class="token operator">!</span><span class="token operator">!</span> 
				<span class="token number">1</span>           <span class="token number">46</span><span class="token punctuation">,</span><span class="token number">460</span><span class="token punctuation">,</span><span class="token number">657</span>                     <span class="token constant">ACCEPTABLE</span>      ok 
				<span class="token number">4</span>           <span class="token number">4</span><span class="token punctuation">,</span><span class="token number">571</span><span class="token punctuation">,</span><span class="token number">072</span>                      <span class="token constant">ACCEPTABLE</span>      ok 
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br></div></div><p>可以看到，出现结果为 0 的情况有 638 次，虽然次数相对很少，但毕竟是出现了。</p> <h3 id="解决方法-2"><a href="#解决方法-2" class="header-anchor">#</a> 解决方法</h3> <p>volatile 修饰的变量，可以禁用指令重排。</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token annotation punctuation">@JCStressTest</span>
<span class="token annotation punctuation">@Outcome</span><span class="token punctuation">(</span>id <span class="token operator">=</span> <span class="token punctuation">{</span><span class="token string">&quot;1&quot;</span><span class="token punctuation">,</span> <span class="token string">&quot;4&quot;</span><span class="token punctuation">}</span><span class="token punctuation">,</span> expect <span class="token operator">=</span> <span class="token class-name">Expect</span><span class="token punctuation">.</span><span class="token constant">ACCEPTABLE</span><span class="token punctuation">,</span> desc <span class="token operator">=</span> <span class="token string">&quot;ok&quot;</span><span class="token punctuation">)</span>
<span class="token annotation punctuation">@Outcome</span><span class="token punctuation">(</span>id <span class="token operator">=</span> <span class="token string">&quot;0&quot;</span><span class="token punctuation">,</span> expect <span class="token operator">=</span> <span class="token class-name">Expect</span><span class="token punctuation">.</span><span class="token constant">ACCEPTABLE_INTERESTING</span><span class="token punctuation">,</span> desc <span class="token operator">=</span> <span class="token string">&quot;!!!!&quot;</span><span class="token punctuation">)</span>
<span class="token annotation punctuation">@State</span>
<span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">ConcurrencyTest</span> <span class="token punctuation">{</span>
    <span class="token keyword">int</span> num <span class="token operator">=</span> <span class="token number">0</span><span class="token punctuation">;</span>
    <span class="token keyword">volatile</span> <span class="token keyword">boolean</span> ready <span class="token operator">=</span> <span class="token boolean">false</span><span class="token punctuation">;</span>
    <span class="token annotation punctuation">@Actor</span>
    <span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">actor1</span><span class="token punctuation">(</span><span class="token class-name">I_Result</span> r<span class="token punctuation">)</span> <span class="token punctuation">{</span>
        <span class="token keyword">if</span><span class="token punctuation">(</span>ready<span class="token punctuation">)</span> <span class="token punctuation">{</span>
            r<span class="token punctuation">.</span>r1 <span class="token operator">=</span> num <span class="token operator">+</span> num<span class="token punctuation">;</span>
        <span class="token punctuation">}</span> <span class="token keyword">else</span> <span class="token punctuation">{</span>
            r<span class="token punctuation">.</span>r1 <span class="token operator">=</span> <span class="token number">1</span><span class="token punctuation">;</span>
        <span class="token punctuation">}</span>
    <span class="token punctuation">}</span>
    <span class="token annotation punctuation">@Actor</span>
    <span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">actor2</span><span class="token punctuation">(</span><span class="token class-name">I_Result</span> r<span class="token punctuation">)</span> <span class="token punctuation">{</span>
        num <span class="token operator">=</span> <span class="token number">2</span><span class="token punctuation">;</span>
        ready <span class="token operator">=</span> <span class="token boolean">true</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br></div></div><p>结果为：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token operator">*</span><span class="token operator">*</span><span class="token operator">*</span> <span class="token constant">INTERESTING</span> tests 
 <span class="token class-name">Some</span> interesting behaviors <span class="token class-name"><span class="token namespace">observed<span class="token punctuation">.</span></span> This</span> is <span class="token keyword">for</span> the plain curiosity<span class="token punctuation">.</span> 
 <span class="token number">0</span> matching test results<span class="token punctuation">.</span> 
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>可以看到，没有 0 出现了。</p> <blockquote><p>为什么 volatile 不修饰 num，而是修饰 ready 呢？</p></blockquote> <p>volatile 修饰变量的前面所有代码禁用指令重排，即 19 行代码之前的代码都不会发送指令重排。</p> <p>如果仅修饰 num，则 num 后面的代码还是会发送指令重排（ready），所以 volatile 修饰变量的前面代码禁用指令重排。</p> <h2 id="原理之-volatile"><a href="#原理之-volatile" class="header-anchor">#</a> 原理之 volatile</h2> <p>volatile 的底层实现原理是内存屏障，Memory Barrier（Memory Fence）。</p> <ul><li>对 volatile 变量的 <strong>写指令后</strong> 会加入写屏障</li> <li>对 volatile 变量的 <strong>读指令前</strong> 会加入读屏障</li></ul> <h3 id="如何保证可见性"><a href="#如何保证可见性" class="header-anchor">#</a> 如何保证可见性</h3> <p>写屏障（sfence）保证在该屏障之前的代码，对共享变量的改动，都同步到主存当中。</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">actor2</span><span class="token punctuation">(</span><span class="token class-name">I_Result</span> r<span class="token punctuation">)</span> <span class="token punctuation">{</span>
 num <span class="token operator">=</span> <span class="token number">2</span><span class="token punctuation">;</span>
 ready <span class="token operator">=</span> <span class="token boolean">true</span><span class="token punctuation">;</span> <span class="token comment">// ready 是 volatile 赋值带写屏障</span>
 <span class="token comment">// 写屏障</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>ready 是 volatile 修饰，则第 3 行形成写屏障，所以写屏障 <strong>之前的所有代码</strong>，包括写屏障所在的代码：<code>ready = true</code> 和 <code>num = 2</code> 都同步到主存当中。</p> <p>而读屏障（lfence）保证在该屏障之后，对共享变量的读取，加载的是主存中最新数据。</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">actor1</span><span class="token punctuation">(</span><span class="token class-name">I_Result</span> r<span class="token punctuation">)</span> <span class="token punctuation">{</span>
    <span class="token comment">// 读屏障</span>
    <span class="token comment">// ready 是 volatile 读取值带读屏障</span>
    <span class="token keyword">if</span><span class="token punctuation">(</span>ready<span class="token punctuation">)</span> <span class="token punctuation">{</span>
        r<span class="token punctuation">.</span>r1 <span class="token operator">=</span> num <span class="token operator">+</span> num<span class="token punctuation">;</span>
    <span class="token punctuation">}</span> <span class="token keyword">else</span> <span class="token punctuation">{</span>
        r<span class="token punctuation">.</span>r1 <span class="token operator">=</span> <span class="token number">1</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br></div></div><p>ready 是 volatile 修饰，则第 4 行形成读屏障，所以读屏障 <strong>之后的所有代码</strong>，包括读屏障所在的代码，即第 4 行到第 7 行都同步到主存当中。</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/juc/20220513002546.png" alt="image-20220513002545205"></p> <h3 id="如何保证有序性"><a href="#如何保证有序性" class="header-anchor">#</a> 如何保证有序性</h3> <p>写屏障会确保指令重排序时，不会将写屏障 <strong>之前的代码</strong> 排在写屏障之后。</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">actor2</span><span class="token punctuation">(</span><span class="token class-name">I_Result</span> r<span class="token punctuation">)</span> <span class="token punctuation">{</span>
    num <span class="token operator">=</span> <span class="token number">2</span><span class="token punctuation">;</span>
    ready <span class="token operator">=</span> <span class="token boolean">true</span><span class="token punctuation">;</span> <span class="token comment">// ready 是 volatile 赋值带写屏障</span>
    <span class="token comment">// 写屏障</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>ready 是 volatile 修饰，则第 3 行形成写屏障，所以写屏障 <strong>之前的所有代码</strong>，包括写屏障所在的代码：<code>ready = true</code> 和 <code>num = 2</code> 都不会发生指令重排序。</p> <p>读屏障会确保指令重排序时，不会将读屏障 <strong>之后的代码</strong> 排在读屏障之前。</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">void</span> <span class="token function">actor1</span><span class="token punctuation">(</span><span class="token class-name">I_Result</span> r<span class="token punctuation">)</span> <span class="token punctuation">{</span>
    <span class="token comment">// 读屏障</span>
    <span class="token comment">// ready 是 volatile 读取值带读屏障</span>
    <span class="token keyword">if</span><span class="token punctuation">(</span>ready<span class="token punctuation">)</span> <span class="token punctuation">{</span>
        r<span class="token punctuation">.</span>r1 <span class="token operator">=</span> num <span class="token operator">+</span> num<span class="token punctuation">;</span>
    <span class="token punctuation">}</span> <span class="token keyword">else</span> <span class="token punctuation">{</span>
        r<span class="token punctuation">.</span>r1 <span class="token operator">=</span> <span class="token number">1</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
