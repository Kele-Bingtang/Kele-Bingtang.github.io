u/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">HashMap<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h2 id="hashmap-引入"><a href="#hashmap-引入" class="header-anchor">#</a> HashMap 引入</h2> <p>问题：建立学生学号和学生姓名间的键值映射，并通过 Key 对 Value 进行操作，应该如何实现数据的存储和操作呢？</p> <p>Map 接口专门处理键值映射数据的存储，可以根据键实现对值的操作。 最常用的实现类是 HashMap。</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">static</span> <span class="token keyword">void</span> <span class="token function">main</span><span class="token punctuation">(</span><span class="token class-name">String</span><span class="token punctuation">[</span><span class="token punctuation">]</span> args<span class="token punctuation">)</span> <span class="token punctuation">{</span>
    <span class="token class-name">Map</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">String</span><span class="token punctuation">,</span><span class="token class-name">String</span><span class="token punctuation">&gt;</span></span> map <span class="token operator">=</span> <span class="token keyword">new</span> <span class="token class-name">HashMap</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">String</span><span class="token punctuation">,</span><span class="token class-name">String</span><span class="token punctuation">&gt;</span></span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
    map<span class="token punctuation">.</span><span class="token function">put</span><span class="token punctuation">(</span><span class="token string">&quot;004&quot;</span><span class="token punctuation">,</span><span class="token string">&quot;李清照&quot;</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
    map<span class="token punctuation">.</span><span class="token function">put</span><span class="token punctuation">(</span><span class="token string">&quot;001&quot;</span><span class="token punctuation">,</span><span class="token string">&quot;李白&quot;</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
    map<span class="token punctuation">.</span><span class="token function">put</span><span class="token punctuation">(</span><span class="token string">&quot;003&quot;</span><span class="token punctuation">,</span><span class="token string">&quot;王羲之&quot;</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
    map<span class="token punctuation">.</span><span class="token function">put</span><span class="token punctuation">(</span><span class="token string">&quot;002&quot;</span><span class="token punctuation">,</span><span class="token string">&quot;杜甫&quot;</span><span class="token punctuation">)</span><span class="token punctuation">;</span>

    <span class="token class-name">System</span><span class="token punctuation">.</span>out<span class="token punctuation">.</span><span class="token function">println</span><span class="token punctuation">(</span>map<span class="token punctuation">.</span><span class="token function">get</span><span class="token punctuation">(</span><span class="token string">&quot;003&quot;</span><span class="token punctuation">)</span><span class="token punctuation">)</span><span class="token punctuation">;</span>

    <span class="token comment">//获取所有key 值</span>
    <span class="token class-name">Set</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">String</span><span class="token punctuation">&gt;</span></span> keySet <span class="token operator">=</span> map<span class="token punctuation">.</span><span class="token function">keySet</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token keyword">for</span> <span class="token punctuation">(</span><span class="token class-name">String</span> s <span class="token operator">:</span> keySet<span class="token punctuation">)</span><span class="token punctuation">{</span>
        <span class="token class-name">String</span> s1 <span class="token operator">=</span> map<span class="token punctuation">.</span><span class="token function">get</span><span class="token punctuation">(</span>s<span class="token punctuation">)</span><span class="token punctuation">;</span>
        <span class="token class-name">System</span><span class="token punctuation">.</span>out<span class="token punctuation">.</span><span class="token function">println</span><span class="token punctuation">(</span>s<span class="token operator">+</span><span class="token string">&quot;    &quot;</span><span class="token operator">+</span>s1<span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>

    <span class="token comment">//获取所有值</span>
    <span class="token class-name">Collection</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">String</span><span class="token punctuation">&gt;</span></span> values <span class="token operator">=</span> map<span class="token punctuation">.</span><span class="token function">values</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token keyword">for</span> <span class="token punctuation">(</span><span class="token class-name">String</span> s <span class="token operator">:</span> values<span class="token punctuation">)</span><span class="token punctuation">{</span>
        <span class="token class-name">System</span><span class="token punctuation">.</span>out<span class="token punctuation">.</span><span class="token function">println</span><span class="token punctuation">(</span>s<span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
    
    <span class="token comment">//entrySet() 获取值</span>
    <span class="token class-name">Set</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">Map<span class="token punctuation">.</span>Entry</span><span class="token punctuation">&lt;</span><span class="token class-name">String</span><span class="token punctuation">,</span> <span class="token class-name">String</span><span class="token punctuation">&gt;</span><span class="token punctuation">&gt;</span></span> entrySet <span class="token operator">=</span> map<span class="token punctuation">.</span><span class="token function">entrySet</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token keyword">for</span> <span class="token punctuation">(</span><span class="token class-name">Map<span class="token punctuation">.</span>Entry</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">String</span><span class="token punctuation">,</span> <span class="token class-name">String</span><span class="token punctuation">&gt;</span></span> m <span class="token operator">:</span> entrySet<span class="token punctuation">)</span><span class="token punctuation">{</span>
        <span class="token class-name">String</span> key <span class="token operator">=</span> m<span class="token punctuation">.</span><span class="token function">getKey</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        <span class="token class-name">String</span> value <span class="token operator">=</span> m<span class="token punctuation">.</span><span class="token function">getValue</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        <span class="token class-name">System</span><span class="token punctuation">.</span>out<span class="token punctuation">.</span><span class="token function">println</span><span class="token punctuation">(</span>key<span class="token operator">+</span><span class="token string">&quot;,&quot;</span><span class="token operator">+</span>value<span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br><span class="line-number">27</span><br><span class="line-number">28</span><br><span class="line-number">29</span><br><span class="line-number">30</span><br></div></div><h2 id="hashma数据结构"><a href="#hashma数据结构" class="header-anchor">#</a> HashMa数据结构</h2> <p>HashMap 是基于哈希表的 Map 接口实现的，它存储的是内容是键值对映射。此类不保证映射的顺序，假定哈希函数将元素适当的分布在各桶之间，可为基本操作（get 和 put）提供稳定的性能。</p> <p>在 API 中给出了相应的定义：</p> <p>又到了最激动人心的源码分析环节**😄**</p> <p><img src="https://cdn.staticaly.com/gh/Kele-Bingtang/static@master/img/Java%E9%9B%86%E5%90%88/20220618215026.png" alt="image-20220618215026095"></p> <blockquote><p>第一段</p></blockquote> <p>哈希表基于 Map 接口的实现，这个实现提供了 Map 所有的操作，并且提供了 Key 和 Value，可以为 null，(HashMap 和 HashTable 大致上是一样的，除了 HashMap 是异步的，和允许 Key 和 Value 为 null，而 HashTable 不允许 Value 为 null)</p> <p>这个类不确定 Map 中元素的位置，特别要提的是，这个类也不确定元素的位置随着时间会不会保持不变。</p> <blockquote><p>第二段</p></blockquote> <p>假设哈希函数将元素合适的分到了每个桶（其实就是指的数组中位置上的链表）中，则这个实现为基本的操作（get、put）提供了稳定的性能，迭代这个集合视图需要的时间跟 HashMap 实例（Key-Value 映射的数量）的容量（在桶中）成正比，因此，如果迭代的性能很重要的话，就不要将初始容量设置的太高或者  loadfactor 设置的太低，（这里的桶，相当于在数组中每个位置上放一个桶装元素）</p> <blockquote><p>第三段</p></blockquote> <p>HashMap 的实例有两个参数影响性能，初始化容量（initialCapacity）和 loadFactor 加载因子，在哈希表中这个容量是桶的数量（也就是数组的长度），一个初始化容量仅仅是在哈希表被创建时容量，在容量自动增长之前加载因子是衡量哈希表被允许达到的多少的。当 Entry 的数量在哈希表中超过了加载因子乘以当前的容量，那么哈希表被修改（内部的数据结构会被重新建立）所以哈希表有大约两倍的桶的数量。</p> <blockquote><p>第四段</p></blockquote> <p>通常来讲，默认的加载因子（0.75）能够在时间和空间上提供一个好的平衡，更高的值会减少空间上的开支但是会增加查询花费的时间（体现在 HashMap 类中 get、put 方法上），当设置初始化容量时，应该考虑到 Map 中会存放 Entry 的数量和加载因子，以便最少次数的进行 rehash 操作，如果初始容量大于最大条目数除以加载因子，则不会发生 rehash 操作。</p> <blockquote><p>第五段</p></blockquote> <p>如果很多映射关系要存储在 HashMap 实例中，则相对于按需执行自动的 rehash 操作以增大表的容量来说，使用足够大的初始容量创建它将使得映射关系能更有效地存储。</p> <h3 id="hashmap在jdk1-8以前数据结构和存储原理"><a href="#hashmap在jdk1-8以前数据结构和存储原理" class="header-anchor">#</a> HashMap在JDK1.8以前数据结构和存储原理</h3> <blockquote><p>链表散列</p></blockquote> <p>首先我们要知道什么是链表散列？通过数组和链表结合在一起使用，就叫做链表散列。这其实就是 HashMap 存储的原理图。</p> <p><img src="https://cdn.staticaly.com/gh/Kele-Bingtang/static@master/img/Java%E9%9B%86%E5%90%88/20220618215037.png" alt="image-20220618215036428"></p> <blockquote><p>HashMap 的数据结构和存储原理</p></blockquote> <p>HashMap 的数据结构就是用的链表散列。那 HashMap 底层是怎么样使用这个数据结构进行数据存取的呢？分成两个部分：</p> <p>第一步：HashMap 内部有一个 Entry 的内部类，其中有四个属性，我们要存储一个值，则需要一个 key 和一个 value 存到 Map 中，就会先将 key 和 value 保存在这个 Entry 类创建的对象中，Entry 本质是一个 KV 映射。</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">static</span> <span class="token keyword">class</span> <span class="token class-name">Entry</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">K</span><span class="token punctuation">,</span><span class="token class-name">V</span><span class="token punctuation">&gt;</span></span> <span class="token keyword">implements</span> <span class="token class-name">Map<span class="token punctuation">.</span>Entry</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">K</span><span class="token punctuation">,</span><span class="token class-name">V</span><span class="token punctuation">&gt;</span></span> <span class="token punctuation">{</span>
    <span class="token keyword">final</span> <span class="token class-name">K</span> key<span class="token punctuation">;</span> <span class="token comment">// 就是我们说的 Map 的 key</span>
    <span class="token class-name">V</span> value<span class="token punctuation">;</span> <span class="token comment">// value 值，这两个都不陌生</span>
    <span class="token class-name">Entry</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">K</span><span class="token punctuation">,</span><span class="token class-name">V</span><span class="token punctuation">&gt;</span></span> next<span class="token punctuation">;</span><span class="token comment">// 指向下一个 Entry 对象</span>
    <span class="token keyword">int</span> hash<span class="token punctuation">;</span><span class="token comment">// 通过 key 算过来的 hashcode 值。</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><p>Entry 的物理模型图：</p> <p><img src="https://cdn.staticaly.com/gh/Kele-Bingtang/static@master/img/Java%E9%9B%86%E5%90%88/20220618215042.png" alt="image-20220618215042044"></p> <p>第二步：构造好了 Entry 对象，然后将该对象放入数组中，如何存放就是这 HashMap 的精华所在了。</p> <p>大概的一个存放过程是：通过 Entry 对象中的 hash 值来确定将该对象存放在数组中的哪个位置上，如果在这个位置上还有其他元素，则通过链表来存储这个元素。</p> <p><img src="https://cdn.staticaly.com/gh/Kele-Bingtang/static@master/img/Java%E9%9B%86%E5%90%88/20220618215049.png" alt="image-20220618215049016"></p> <p>Hash 存放元素的过程</p> <p>通过 key、value 封装成一个 Entry 对象，然后通过 key 的值来计算该 Entry 的 hash 值，通过 Entry 的 hash 值和数组的长度 length 来计算出 Entry 放在数组中的哪个位置上面。</p> <p>每次存放都是将 Entry 放在第一个位置。在这个过程中，就是通过 hash 值来确定将该对象存放在数组中的哪个位置上。</p> <h3 id="jdk1-8后hashmap的数据结构"><a href="#jdk1-8后hashmap的数据结构" class="header-anchor">#</a> JDK1.8后HashMap的数据结构</h3> <p>JDK1.8 版本后把 Entry 类改 为Node 类，重要属性依然是 Key、Value、哈希值、指向下一个元素地址，而 Entry 类则存的是红黑树的信息。</p> <p><img src="https://cdn.staticaly.com/gh/Kele-Bingtang/static@master/img/Java%E9%9B%86%E5%90%88/20220618215059.png" alt="image-20220618215058985"></p> <p>上图很形象的展示了 HashMap 的数据结构（数组 + 链表 + 红黑树），桶中的结构可能是链表，也可能是红黑树，红黑树的引入是为了提高效率。</p> <p><img src="https://cdn.staticaly.com/gh/Kele-Bingtang/static@master/img/Java%E9%9B%86%E5%90%88/20220618215104.png" alt="image-20220618215103211"></p> <h2 id="简单模拟"><a href="#简单模拟" class="header-anchor">#</a> 简单模拟</h2> <ul><li>当 HashMap 为 <code>[{12,&quot;aa&quot;},{7,&quot;bb&quot;},{19,&quot;cc&quot;},{12,&quot;dd&quot;},{14,&quot;ee&quot;},{20,&quot;ff&quot;}]</code>，内部调用了 <code>hasCode</code> 方法计算数组元素的哈希值</li> <li>假设数组元素的哈希值就是 HashMap 的 key，接下来通过一个算法计算在数组元素存放的位置，假设位置为 <code>[1,6,2,1,3,1]</code></li> <li>接下来把 Key、Value、哈希值封装为 <code>Entry</code> 类，并且拥有一个指向下一个元素的地址空间</li> <li>根据位置把封装的 <code>Entry</code> 类存入底层数组（数组的一个个元素就是 Entry 类）</li> <li>存放过程，使用 <code>equals</code> 进行判断，发现后面的 <code>{12,&quot;dd&quot;}</code> 的位置和 <code>{12,&quot;aa&quot;}</code> 的位置重复，且 key 相同，则把新的 value（aa）替换旧的 value（bb）</li> <li>最后发现 <code>{20,&quot;ff&quot;}</code> 的位置和 <code>{12,&quot;dd&quot;}</code> 重复，但是 key 不同，则进行处理
<ul><li>JDK1.7 版本前：头插法，即把新数据 <code>{20,&quot;ff&quot;}</code> 的地址先放入底层数组，然后该数据的指向下一个元素地址的「指针」指向旧数据 <code>{12,&quot;dd&quot;}</code> 的地址（旧数据会先取出来备份）</li> <li>JDK1.8 版本后：尾插法，即直接在旧数据 <code>{12,&quot;dd&quot;}</code> 后追加新数据 <code>{20,&quot;ff&quot;}</code>，就是把旧数据的指向下一个元素地址的「指针」指向新数据的地址</li></ul></li></ul> <h2 id="hashmap的属性"><a href="#hashmap的属性" class="header-anchor">#</a> HashMap的属性</h2> <p>HashMap 的实例有两个参数影响其性能。</p> <ul><li><p>初始容量：哈希表中桶的数量</p></li> <li><p>加载因子：哈希表在其容量自动增加之前可以达到多满的一种尺度</p></li></ul> <p>当哈希表中条目数超出了 <mark>当前容量 * 加载因子</mark>（其实就是 HashMap 的实际容量）时，则对该哈希表进行 rehash 操作，将哈希表扩充至两倍的桶数。</p> <p>Java 中默认初始容量为 16，加载因子为 0.75。</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">static</span> <span class="token keyword">final</span> <span class="token keyword">int</span> DEFAULT_INITIAL_CAPACITY <span class="token operator">=</span> <span class="token number">1</span> <span class="token operator">&lt;&lt;</span> <span class="token number">4</span><span class="token punctuation">;</span> <span class="token comment">// aka 16</span>
<span class="token keyword">static</span> <span class="token keyword">final</span> <span class="token keyword">float</span> DEFAULT_LOAD_FACTOR <span class="token operator">=</span> <span class="token number">0.75f</span><span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><blockquote><p>loadFactor 加载因子</p></blockquote> <p>定义：loadFactor 译为加载因子、装载因子。装载因子用来衡量 HashMap 满的程度。loadFactor 的默认值为 0.75f。计算 HashMap 的实时装载因子的方法为：<code>size / capacity</code>，而不是占用桶的数量去除以 capacity。</p> <p>loadFactor 加载因子是控制数组存放数据的疏密程度，loadFactor 越趋近于 1，那么数组中存放的数据（Entry）也就越多，也就越密，也就是会让链表的长度增加，loadFactor 越小，也就是趋近于 0，那么数组中存放的数据也就越稀，也就是可能数组中每个位置上就放一个元素。</p> <p>那有人说，就把 loadFactor 变为 1 最好吗，存的数据很多，但是这样会有一个问题，就是我们在通过 key 拿到我们的 value 时，是先通过 key 的 hashcode 值，找到对应数组中的位置，如果该位置中有很多元素，则需要通过 equals 来依次比较链表中的元素，拿到我们的 value 值，这样花费的性能就很高，如果能让数组上的每个位置尽量只有一个元素最好，我们就能直接得到 value 值了，所以有人又会说，那把 loadFactor 变得很小不就好了，但是如果变得太小，在数组中的位置就会太稀，也就是分散的太开，浪费很多空间，这样也不好，所以在 HashMap 中 loadFactor 的初始值就是 0.75，一般情况下不需要更改它。</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">static</span> <span class="token keyword">final</span> <span class="token keyword">float</span> DEFAULT_LOAD_FACTOR <span class="token operator">=</span> <span class="token number">0.75f</span><span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><blockquote><p>桶</p></blockquote> <p>根据前面画的 HashMap 存储的数据结构图，你这样想，数组中每一个位置上都放有一个桶，每个桶里就是装一个链表，链表中可以有很多个元素（Entry），这就是桶的意思。也就相当于把元素都放在桶中，所以一个桶等于数组某个下标 + 衍生的链表。</p> <blockquote><p>capacity</p></blockquote> <p>capacity 译为容量代表的数组的容量，也就是数组的长度，同时也是 HashMap 中桶的个数。默认值是 16。</p> <p>一般第一次扩容时会扩容到 64，之后是 2 的倍数。总之，容量都是 2 的幂。</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">static</span> <span class="token keyword">final</span> <span class="token keyword">int</span> DEFAULT_INITIAL_CAPACITY <span class="token operator">=</span> <span class="token number">1</span> <span class="token operator">&lt;&lt;</span> <span class="token number">4</span><span class="token punctuation">;</span> <span class="token comment">// aka 16</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><blockquote><p>size 的含义</p></blockquote> <p>size 就是在该 HashMap 的实例中实际存储的元素的个数，而不是数组的整个长度。</p> <blockquote><p>threshold 的作用</p></blockquote> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">int</span> threshold<span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><code>threshold = capacity * loadFactor</code>，当 <code>size &gt;= threshold</code> 的时候，那么就要考虑对数组的扩增了，也就是说，这个的意思就是衡量数组是否需要扩增的一个标准。</p> <p>注意这里说的是考虑，因为实际上要扩增数组，除了这个 <code>size &gt;= threshold</code> 条件外，还需要另外一个条件。</p> <p>什么时候会扩增数组的大小？在 put 一个元素时先 <code>size &gt;= threshold</code> 并且还要在对应数组位置上有元素，这才能扩增数组。</p> <p>我们通过一张 HashMap 的数据结构图来分析：</p> <p><img src="https://cdn.staticaly.com/gh/Kele-Bingtang/static@master/img/Java%E9%9B%86%E5%90%88/20220618215110.png" alt="image-20220618215109452"></p> <h2 id="hashmap的源码分析"><a href="#hashmap的源码分析" class="header-anchor">#</a> HashMap的源码分析</h2> <h3 id="hashmap的层次关系与继承结构"><a href="#hashmap的层次关系与继承结构" class="header-anchor">#</a> HashMap的层次关系与继承结构</h3> <p>HashMap 继承结构</p> <p><img src="https://cdn.staticaly.com/gh/Kele-Bingtang/static@master/img/Java%E9%9B%86%E5%90%88/20220618215115.png" alt="image-20220618215114348"></p> <p>上面就继承了一个 AbstractMap，也就是用来减轻实现 Map 接口的编写负担。</p> <p>实现接口</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">HashMap</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">K</span><span class="token punctuation">,</span><span class="token class-name">V</span><span class="token punctuation">&gt;</span></span> <span class="token keyword">extends</span> <span class="token class-name">AbstractMap</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">K</span><span class="token punctuation">,</span><span class="token class-name">V</span><span class="token punctuation">&gt;</span></span>
<span class="token keyword">implements</span> <span class="token class-name">Map</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">K</span><span class="token punctuation">,</span><span class="token class-name">V</span><span class="token punctuation">&gt;</span></span><span class="token punctuation">,</span> <span class="token class-name">Cloneable</span><span class="token punctuation">,</span> <span class="token class-name">Serializable</span> <span class="token punctuation">{</span>
    
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><ul><li>Map&lt;K,V&gt;：在 AbstractMap 抽象类中已经实现过的接口，这里又实现，实际上是多余的。但每个集合都有这样的错误，也没过大影响</li> <li>Cloneable：能够使用 <code>Clone()</code> 方法，在 HashMap 中，实现的是浅层次拷贝，即对拷贝对象的改变会影响 被拷贝的对象</li> <li>Serializable：能够使之序列化，即可以将 HashMap 对象保存至本地，之后可以恢复状态</li></ul> <h3 id="jdk7的hashmap源码"><a href="#jdk7的hashmap源码" class="header-anchor">#</a> JDK7的HashMap源码</h3> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">HashMap</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">K</span><span class="token punctuation">,</span><span class="token class-name">V</span><span class="token punctuation">&gt;</span></span><span class="token punctuation">{</span>

                oldTab<span class="token punctuation">[</span>j<span class="token punctuation">]</span> <span class="token operator">=</span> <span class="token keyword">null</span><span class="token punctuation">;</span>
                <span class="token keyword">if</span> <span class="token punctuation">(</span>e<span class="token punctuation">.</span>next <span class="token operator">==</span> <span class="token keyword">null</span><span class="token punctuation">)</span>
                    newTab<span class="token punctuation">[</span>e<span class="token punctuation">.</span>hash <span class="token operator">&amp;</span> <span class="token punctuation">(</span>newCap <span class="token operator">-</span> <span class="token number">1</span><span class="token punctuation">)</span><span class="token punctuation">]</span> <span class="token operator">=</span> e<span class="token punctuation">;</span>

mber">152</span><br><span class="line-number">153</span><br><span class="line-number">154</span><br><span class="line-number">155</span><br><span class="line-number">156</span><br><span class="line-number">157</span><br><span class="line-number">158</span><br><span class="line-number">159</span><br><span class="line-number">160</span><br><span class="line-number">161</span><br><span class="line-number">162</span><br><span class="line-number">163</span><br><span class="line-number">164</span><br><span class="line-number">165</span><br><span class="line-number">166</span><br><span class="line-number">167</span><br><span class="line-number">168</span><br><span class="line-number">169</span><br><span class="line-number">170</span><br><span class="line-number">171</span><br><span class="line-number">172</span><br><span class="line-number">173</span><br><span class="line-number">174</span><br><span class="line-number">175</span><br></div></div><p>get 和 push 原理类似，push 的时候经过 hash 值与数组长度的位运算确定数组下标，（h &amp; (length - 1)），那么 get 的时候也是通过这个算法获取下标，然后就能获取该位置的数据（只有一个）或者链表（有多个数据形成链表），如果是前者，直接返回需要的 value，如果是后者，首先需要进行 hash 值的比较，相等则再比较 Key，还相等则返回 Value。不相等则继续遍历下去直到找到 hash 值和 Key 值相等的 Value。</p> <h4 id="版本区别"><a href="#版本区别" class="header-anchor">#</a> 版本区别</h4> <ul><li><p>JDK1.8 版本后创建 HashMap 并不会初始化数组，而是在 put 的时候，进行判断，从而初始化数组长度为 16。减少内存</p></li> <li><p>JDK1.8 版本把 Entry 类改为 Node 类，重要属性依然是 key、value、哈希值、指向下一个元素地址</p></li> <li><p>JDK1.8 版本把头插法改为尾插法，因为尾插法在多线程产生环链问题</p></li> <li><p>JDK1.8 版本把由数组 + 链表结构变为数组 + 链表 + 红黑树，当链表长度大于 8 时，会将链表转换为红黑树，当链表长度小于 6 时，会将红黑树转换为链表</p></li> <li><p>红黑树的类为 <code>TreeNode</code>，链表为 <code>Node</code> 类，后者是前者的父类，也就说 Node 可能是链表结构，也可能是红黑树结构</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">static</span> <span class="token keyword">final</span> <span class="token keyword">class</span> <span class="token class-name">TreeNode</span><span class="token generics"><span class="token punctuation">&lt;</span><span c <span class="token keyword">static</span> <span class="token keyword">class</span> <span class="token class-name">Node</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">K</span><span class="token punctuation">,</span><span class="token class-name">V</span><span class="token punctuation">&gt;</span></span> <span class="token keyword">implements</span> <span class="token class-name">Map<span class="token punctuation">.</span>Entry</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token class-name">K</span><span class="token punctuation">,</span><span class="token class-name">V</span><span class="token punctuation">&gt;</span></span> <span class="token punctuation">{</span><span class="token punctuation">}</span> <span class="token comment">//  LinkedHashMap 的 Entry 的父类，链表，所以也是红黑树的父类</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div></li></ul> <h4 id="源码总结"><a href="#源码总结" class="header-anchor">#</a> 源码总结</h4> <ol><li>HashMap 刚创建时，table 是 null，节省空间，当添加第一个元素时，table 容量调整为 16</li> <li>当元素个数大于阈值（16 * 0.75 = 12）时，会进行扩容，扩容后的大小为原来的两倍，目的是减少调整元素的个数</li> <li>JDK1.8 当每个链表长度 &gt; 8 ，并且数组元素个数 ≥ 64 时，会调整成红黑树，目的是提高效率</li> <li>JDK1.8 当链表长度 &lt; 6 时 调整成链表</li> <li>JDK1.8 以前，链表时头插入，之后为尾插入</li></ol> <h3 id="jdk7头插法产生环链问题"><a href="#jdk7头插法产生环链问题" class="header-anchor">#</a> JDK7头插法产生环链问题</h3> <p>多线程操作，同时去扩容，当一个线程已经操作完毕了，将原来的顺序反过来了；另一个线程再开始执行扩容代码，此时就会出现环链。</p> <p>如原来内容是 3 -&gt; 2 -&gt; 1，线程一扩容先把 3 拿出，再把 2 拿出放到 3 的前面，形成 2 -&gt; 3，此时线程 2 执行 put 操作开启扩容，将 3 拿出来，形成了 3 -&gt; 2 -&gt; 3，这就是环链，卡住了，可能导致 IDEA 等工具都无法运行（无响应）。</p> <p>因为环链问题，JDK 8 就优化成了 <strong>尾插法</strong>，修复了环链这个问题。但在并发环境中仍是不安全的。</p> <h2 id="经典面试题"><a href="#经典面试题" class="header-anchor">#</a> 经典面试题</h2> <ol><li><p>装填因子，负载因子，加载因子为什么 0.75，而不是 1（装填因子类似于折扣，初始数组长度为 16，但是不是长度满了才扩容，而是到了 <code>16 * 0.75 = 12</code> 时，进行扩容）</p> <ul><li><p>装填因子设置为 1：空间利用率得到了满足，但是容易发生碰撞，产生链表，查询效率低</p></li> <li><p>装填因子设置为 0.75：碰撞的概率低，扩容，产生链表的几率低，查询效率高，空间利用率低</p></li></ul></li> <li><p>主数组的长度为什么是 2^n</p> <ul><li>计算哈希值，代码为 <code>h &amp; (length - 1)</code>，等效 <code>h % (length - 1)</code> 操作，但是 &amp; 等效求余的前提是 length 必须是 2 的整数倍，因为 2 的整数幂 - 1 的二进制比较特殊，就是一串 11111，可以等价于求余</li> <li>防止哈希冲突，位置冲突，因为通过哈希值计算位置的时候，不是 2 的整数倍容易位置一样</li></ul></li></ol> <h2 id="总结"><a href="#总结" class="header-anchor">#</a> 总结</h2> <blockquote><p>关于数组扩容</p></blockquote> <p>从 putVal 源代码中我们可以知道，当插入一个元素的时候 size 就加 1，若 size 大于 threshold 的时候，就会进行扩容。假设我们的 capacity 大小为 32，loadFator 为 0.75，则 threshold 为 24 = 32 * 0.75。</p> <p>此时，插入了 25 个元素，并且插入的这 25 个元素都在同一个桶中，桶中的数据结构为红黑树，则还 有 31 个桶是空的，也会进行扩容处理，其实，此时，还有 31 个桶是空的，好像似乎不需要进行扩容处理，但是是需要扩容处理的，因为此时我们的 capacity 大小可能不适当。我们前面知道，扩容处理会遍历所有的元素，时间复杂度很高；前面我们还知道，经过一次扩容处理后，元素会更加均匀的分布在各个桶中，会提升访问效率。所以，说尽量避免进行扩容处理，也就意味着，遍历元素所带来的坏处大于元素在桶中均匀分布所带来的好处。</p> <blockquote><p>总结</p></blockquote> <ol><li>要知道 HashMap 在 JDK1.8 以前是一个链表散列这样一个数据结构，而在 JDK1.8 以后是一个数组加链表加红黑树的数据结构</li> <li>通过源码的学习，HashMap 是一个能快速通过 key 获取到 value 值得一个集合，原因是内部使用的是 hash 查找值得方法</li></ol></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Kele-Bingtang/Kele-Bingtang.github.io/edit/master/docs/10.Java/05.Java集合 - Collection/06.HashMap.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <!----> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2022/07/23, 01:19:36</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/java/se/collection/List-summary/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">List总结</div></a> <a href="/java/se/collection/set/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">set</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
