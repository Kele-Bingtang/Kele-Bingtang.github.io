？如何解决？</p> <blockquote><p>字节跳动</p></blockquote> <p>三面：JVM 如何调优、参数怎么调？</p> <blockquote><p>拼多多</p></blockquote> <p>从 SQL、JVM、架构、数据库四个方面讲讲优化思路。</p> <blockquote><p>京东</p></blockquote> <p>JVM 诊断调优工具用过哪些？</p> <p>每秒几十万并发的秒杀系统为什么会频繁发生 GC？</p> <p>日均百万级交易系统如何优化 JVM？</p> <p>线上生产系统 OOM 如何监控及定位与解决？</p> <p>高并发系统如何基于 G1 垃圾回收器优化性能？</p> <h2 id="背景说明"><a href="#背景说明" class="header-anchor">#</a> 背景说明</h2> <blockquote><p><strong>生产环境中的问题</strong></p></blockquote> <ul><li>生产环境发生了内存溢出该如何处理？</li> <li>生产环境应该给服务器分配多少内存合适？</li> <li>如何对垃圾回收器的性能进行调优？</li> <li>生产环境 CPU 负载飙高该如何处理？</li> <li>生产环境应该给应用分配多少线程合适？</li> <li>不加 log，如何确定请求是否执行了某一行代码？</li> <li>不加 log，如何实时查看某个方法的入参与返回值？</li></ul> <blockquote><p><strong>为什么要调优</strong></p></blockquote> <ul><li>防止出现 OOM</li> <li>解决 OOM</li> <li>减少 Full GC 出现的频率</li></ul> <blockquote><p><strong>不同阶段的考虑</strong></p></blockquote> <ul><li>上线前</li> <li>项目运行阶段</li> <li>线上出现 OOM</li></ul> <h2 id="调优概述"><a href="#调优概述" class="header-anchor">#</a> 调优概述</h2> <blockquote><p><strong>监控的依据</strong></p></blockquote> <ul><li>运行日志</li> <li>异常堆栈</li> <li>GC 日志</li> <li>线程快照</li> <li>堆转储快照</li></ul> <blockquote><p><strong>调优的大方向</strong></p></blockquote> <ul><li>合理地编写代码</li> <li>充分并合理的使用硬件资源</li> <li>合理地进行 JVM 调优</li></ul> <h2 id="性能优化的步骤"><a href="#性能优化的步骤" class="header-anchor">#</a> 性能优化的步骤</h2> <blockquote><p><strong>第 1 步（发现问题）：性能监控</strong></p></blockquote> <p>一种以非强行或者入侵方式 <strong>收集或查看</strong> 应用运营性能数据的活动。</p> <p>监控通常是指一种在生产、质量评估或者开发环境下实施的带有 <strong>预防或主动性</strong> 的活动。</p> <p>当应用相关干系人提出性能问题却 <strong>没有提供足够多的线索时</strong>，首先我们需要进行性能监控，随后是性能分析。</p> <p>性能监控内容如下：</p> <ul><li>GC 频繁</li> <li>cpu load 过高</li> <li>OOM</li> <li>内存泄露</li> <li>死锁</li> <li>程序响应时间较长</li></ul> <blockquote><p><strong>第 2 步（排查问题）：性能分析</strong></p></blockquote> <p>一种以 <strong>侵入方式</strong> 收集运行性能数据的活动，它会影响应用的吞吐量或响应性。</p> <p>性能分析是针对性能问题的答复结果，关注的范围通常比性能监控更加集中。</p> <p>性能分析很少在生产环境下进行，通常是在质量评估、<strong>系统测试或者开发环境下进行</strong>，是性能监控之后的步骤。</p> <p>性能分析内容如下：</p> <ul><li>打印 GC 日志，通过 GCviewer 或者 <code>http://gceasy.io</code> 来分析异常信息</li> <li>灵活运用命令行工具、jstack、jmap、jinfo 等</li> <li>dump 出堆文件，使用内存分析工具分析文件</li> <li>使用阿里 Arthas、jconsole、JVisualVM 来实时查看 JVM 状态</li> <li>jstack 查看堆栈信息</li></ul> <blockquote><p><strong>第 3 步（解决问题）：性能调优</strong></p></blockquote> <p>一种为改善应用响应性或香吐量而更改参数、源代码、属性配置的活动，性能调优是在性能监控、性能分析之后的活动。</p> <p>性能调优内容如下：</p> <ul><li>适当增加内存，根据业务背景选择垃圾回收器</li> <li>优化代码，控制内存使用</li> <li>增加机器，分散节点压力</li> <li>合理设置线程池线程数量</li> <li>使用中间件提高程序效率，比如缓存、消息队列等</li> <li>其他 ......</li></ul> <h2 id="性能评价-测试指标"><a href="#性能评价-测试指标" class="header-anchor">#</a> 性能评价/测试指标</h2> <blockquote><p><strong>停顿时间（或响应时间）</strong></p></blockquote> <p>响应时间：提交请求和返回该请求的响应之间使用的时间，一般比较关注平均响应时间。常用操作的响应时间列表：</p> <table><thead><tr><th style="text-align:left;">操作</th> <th style="text-align:left;">响应时间</th></tr></thead> <tbody><tr><td style="text-align:left;">打开一个站点</td> <td style="text-align:left;">几秒</td></tr> <tr><td style="text-align:left;">数据库查询一条记录（有索引）</td> <td style="text-align:left;">十几毫秒</td></tr> <tr><td style="text-align:left;">机械磁盘一次寻址定位</td> <td style="text-align:left;">4 毫秒</td></tr> <tr><td style="text-align:left;">从机械磁盘顺序读取 1M 数据</td> <td style="text-align:left;">2 毫秒</td></tr> <tr><td style="text-align:left;">从 SSD 磁盘顺序读取 1M 数据</td> <td style="text-align:left;">0.3 毫秒</td></tr> <tr><td style="text-align:left;">从远程分布式换成 Redis 读取一个数据</td> <td style="text-align:left;">0.5 毫秒</td></tr> <tr><td style="text-align:left;">从内存读取 1M 数据</td> <td style="text-align:left;">十几微妙</td></tr> <tr><td style="text-align:left;">Java 程序本地方法调用</td> <td style="text-align:left;">几微妙</td></tr> <tr><td style="text-align:left;">网络传输 2Kb 数据</td> <td style="text-align:left;">1 微妙</td></tr></tbody></table> <p>在垃圾回收环节中：</p> <ul><li>暂停时间：执行垃圾收集时，程序的工作线程被暂停的时间</li> <li><code>-XX:MaxGCPauseMillis</code> 参数可以设置暂停时间</li></ul> <blockquote><p><strong>吞吐量</strong></p></blockquote> <ul><li>对单位时间内完成的工作量（请求）的量度</li> <li>在 GC 中：运行用户代码的时间占总运行时间的比例（总运行时间：程序的运行时间 + 内存回收的时间）</li> <li>吞吐量为 <code>1 - 1 / (1 + n)</code>，其中 <code>-XX::GCTimeRatio=n</code></li></ul> <blockquote><p><strong>并发数</strong></p></blockquote> <p>同一时刻，对服务器有实际交互的请求数。</p> <blockquote><p><strong>内存占用</strong></p></blockquote> <p>Java 堆区所占的内存大小。</p> <blockquote><p><strong>相互间的关系</strong></p></blockquote> <p>以高速公路通行状况为例：</p> <ul><li>吞吐量：每天通过高速公路收费站的车辆的数据（也可以理解为收费站收取的高速费）</li> <li>并发数：高速公路上正在行驶的车辆的数目</li> <li>响应时间：车速</li></ul></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Kele-Bingtang/Kele-Bingtang.github.io/edit/master/docs/10.Java/20.Java底层 - JVM/43.JVM - 调优概述.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=Java" title="标签">#Java</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2022/05/06, 11:47:55</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/java/jvm/on-class-loader/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">JVM - 再谈类的加载器</div></a> <a href="/java/jvm/monitoring-diagnostic-command/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">JVM - 监控及诊断工具命令行</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
