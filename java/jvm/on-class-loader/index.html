<a href="#双亲委派模型">双亲委派模型</a><ul><li><a href="#定义与本质">定义与本质</a></li><li><a href="#优势与劣势">优势与劣势</a></li><li><a href="#破坏双亲委派机制">破坏双亲委派机制</a></li><li><a href="#热替换的实现">热替换的实现</a></li></ul></li><li><a href="#沙箱安全机制">沙箱安全机制</a><ul><li><a href="#jdk-1-0时期">JDK 1.0时期</a></li><li><a href="#jdk-1-1时期">JDK 1.1时期</a></li><li><a href="#jdk-1-2时期">JDK 1.2时期</a></li><li><a href="#jdk-1-6时期">JDK 1.6时期</a></li></ul></li><li><a href="#自定义类的加载器">自定义类的加载器</a><ul><li><a href="#实现方式">实现方式</a></li></ul></li><li><a href="#java-9-新特性">Java 9 新特性</a></li></ul></div><p></p> <h2 id="概述"><a href="#概述" class="header-anchor">#</a> 概述</h2> <p>类加载器是 JVM 执行类加载机制的前提。</p> <blockquote><p>ClassLoader 的作用</p></blockquote> <p>ClassLoader 是 Java 的核心组件，所有的 Class 都是由 ClassLoader 进行加载的，ClassLoader 负责通过各种方式将 Class 信息的二进制数据流读入 JVM 内部，转换为一个与目标类对应的 <code>java.lang.Class</code> 对象实例。然后交给 Java 虚拟机尽心链接、初始化等操作。因此，ClassLoader 在整个装载阶段，只能影响到类的加载，而无法通过 ClassLoader 去改变类的链接和初始化行为。至于它是否可以运行，则由 Execution Engine 决定。</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Java/20220130203046.jpg" alt="中篇_第4章：类的加载器"></p> <p>类加载器最早出现在 Java 1.0 版本中，那个时候只是单纯地为了满足 Java Applet 应用而被研发出来，但如今类加载器却在 OSGI、字节码加解密领域大放异彩。这主要归功于 Java 虚拟机的设计者们当初在设计类加载器的时候，并没有考虑将它绑定在 JVM 内部，这样做的好处就是能够更加灵活和动态地执行类加载操作。</p> <h3 id="大厂面试题"><a href="#大厂面试题" class="header-anchor">#</a> 大厂面试题</h3> <blockquote><p>蚂蚁金服</p></blockquote> <p>深入分析 ClassLoader，双亲委派机制。</p> <p>类加载器的双亲委派模型是什么？</p> <p>一面：双亲委派机制及使用原因。</p> <blockquote><p>百度</p></blockquote> <p>都有哪些类加载器，这些类加载器都加载哪些文件？</p> <p>手写一个类加载器 Demo。</p> <p>Class 的 <code>forName(&quot;java.lang.String&quot;)</code> 和 Class 的 <code>getClassLoader()</code> 的 <code>loadClass(&quot;java.lang.String&quot;)</code>有什么区别？</p> <blockquote><p>腾讯</p></blockquote> <p>什么是双亲委派模型？</p> <p>类加载器有哪些？</p> <blockquote><p>小米</p></blockquote> <p>双亲委派模型介绍一下。</p> <blockquote><p>滴滴</p></blockquote> <p>简单说说你了解的类加载器。</p> <p>一面：讲一下双亲委派模型，以及其优点。</p> <blockquote><p>字节跳动</p></blockquote> <p>什么是类加载器，类加载器有哪些？</p> <blockquote><p>京东</p></blockquote> <p>类加载器的双亲委派模型是什么？</p> <p>双亲委派机制可以打破吗？为什么？</p> <h3 id="类加载的分类"><a href="#类加载的分类" class="header-anchor">#</a> 类加载的分类</h3> <p><strong>类的加载分类：显式加载 vs 隐式加载</strong></p> <p>Class 文件的显式加载与隐式加载的方式是指 JVM 加载 Class 文件到内存的方式。</p> <ul><li>显式加载：指的是在代码中通过调用 ClassLoader 加载 Class 对象，如直接使用 <code>Class.forName(name)</code> 或 <code>this.getClass().getClassLoader().loadClass()</code> 加载 Class 对象</li> <li>隐式加载：不直接在代码中调用 ClassLoader 的方法加载 Class 对象，而是通过虚拟机自动加载到内存中，如在加载某个类的 Class 文件时，该类的 Class 文件中引用了另外一个类的对象，此时额外引用的类将通过 JVM 自动加载到内存中</li></ul> <p>在日常开发中以上两种方式一般会混合使用。</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">UserTest</span> <span class="token punctuation">{</span>
    <span class="token keyword">public</span> <span class="token keyword">static</span> <span class="token keyword">void</span> <span class="token function">main</span><span class="token punctuation">(</span><span class="token class-name">String</span><span class="token punctuation">[</span><span class="token punctuation">]</span> args<span class="token punctuation">)</span> <span class="token punctuation">{</span>
        <span class="token class-name">User</span> user <span class="token operator">=</span> <span class="token keyword">new</span> <span class="token class-name">User</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span> <span class="token comment">// 隐式加载</span>

        <span class="token keyword">try</span> <span class="token punctuation">{</span>
            <span class="token class-name">Class</span> clazz <span class="token operator">=</span> <span class="token class-name">Class</span><span class="token punctuation">.</span><span class="token function">forName</span><span class="token punctuation">(</span><span class="token string">&quot;com.kele.java.User&quot;</span><span class="token punctuation">)</span><span class="token punctuation">;</span> <span class="token comment">// 显式加载</span>
            <span class="token class-name">ClassLoader</span><span class="token punctuation">.</span><span class="token function">getSystemClassLoader</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">.</span><span class="token function">loadClass</span><span class="token punctuation">(</span><span class="token string">&quot;com.kele.java.User&quot;</span><span class="token punctuation">)</span><span class="token punctuation">;</span>  <span class="token comment">// 显式加载</span>
        <span class="token punctuation">}</span> <span class="token keyword">catch</span> <span class="token punctuation">(</span><span class="token class-name">ClassNotFoundException</span> e<span class="token punctuation">)</span> <span class="token punctuation">{</span>
            e<span class="token punctuation">.</span><span class="token function">printStackTrace</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
        <span class="token punctuation">}</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
<span class="token keyword">class</span> <span class="token class-name">User</span> <span class="token punctuation">{</span>
    <span class="token keyword">private</span> <span class="token keyword">int</span> id<span class="token punctuation">;</span>

    <span class="token annotation punctuation">@Override</span>
    <span class="token keyword">public</span> <span class="token class-name">String</span> <span class="token function">toString</span><span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
        <span class="token keyword">return</span> <span class="token string">&quot;User{&quot;</span> <span class="token operator">+</span>
                <span class="token string">&quot;id=&quot;</span> <span class="token operator">+</span> id <span class="token operator">+</span>
                <span class="token char">'}'</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br></div></div><h3 id="类加载器的必要性"><a href="#类加载器的必要性" class="header-anchor">#</a> 类加载器的必要性</h3> <p>一般情况下，Java 开发人员并不需要在程序中显式地使用类加载器，但是了解类加载器的加载机制却显得至关重要。从以下几个方面说：</p> <ul><li>避免在开发中遇到 <code>java.lang.ClassNotFoundException</code> 异常或 <code>java.lang.NoClassDeFoundError</code> 异常时手足无措。只有了解类加载器的加载机制才能够在出现异常的时候快速地根据错误异常日志定位问题和解决问题</li> <li>需要支持类的动态加载或需要对编译后的字节码文件进行加解密操作时，就需要与类加载器打交道了</li> <li>开发人员可以在程序中编写自定义类加载器来重新定义类的加载规则，以便实现一些自定义的处理逻辑</li></ul> <h3 id="命名空间"><a href="#命名空间" class="header-anchor">#</a> 命名空间</h3> <blockquote><p>何为类的唯一性？</p></blockquote> <p>对于任意一个类，<strong>都需要由加载它的类加载器和这个类本身一同确认其在 Java 虚拟机中的唯一性</strong>。每一个类加载器，都拥有一个独立的类名称空间：<strong>比较两个类是否相等，只有在这两个类是由同一个类加载器加载的前提下才有意义</strong>。否则，即使这两个类源自同一个 Class 文件，被同一个虚拟机加载，只要加载他们的类加载器不同，那这两个类就必定不相等。</p> <blockquote><p>命名空间</p></blockquote> <ol><li>每个类加载器都有自己的命名空间，命名空间由该加载器所有的父加载器所加载的类组成</li> <li>在同一命名空间中，不会出现类的完整名字（包括类的包名）相同的两个类</li> <li>在不同的命名空间中，有可能会出现类的完整名字(包括类的包名)相同的两个类</li></ol> <p><strong>在大型应用中，我们往往借助这一特性，来运行同一个类的不同版本。</strong></p> <blockquote><p>代码示例</p></blockquote> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">UserClassLoader</span> <span class="token keyword">extends</span> <span class="token class-name">ClassLoader</span> <span class="token punctuation">{</span>
    <span class="token keyword">private</span> <span class="token class-name">String</span> rootDir<span class="token punctuation">;</span>

    <span class="token keyword">public</span> <span class="token class-name">UserClassLoader</span><span class="token punctuation">(</span><span class="token class-name">String</span> rootDir<span class="token punctuation">)</span> <span class="token punctuation">{</span>
        <span class="token keyword">this</span><span class="token punctuation">.</span>rootDir <span class="token operator">=</span> rootDir<span class="token punctuation">;</span>
    <span class="token punctuation">}</span>

    <span class="token comment">/**
     * 编写 findClass 方法的逻辑

    <span class="token keyword">protected</span> <span class="token class-name">Class</span><span class="token generics"><span class="token punctuation">&lt;</span><span class="token operator">?</span><span class="token punctuation">&gt;</span></span> <span class="token function">findClass</span><span class="token punctuation">(</span><span class="token class-name">String</span> name<span class="token punctuation">)</span> <span class="token keyword">throws</span> <span class="token class-name">ClassNotFoundException</span> <span class="token punctuation">{</span>

            <span class="token keyword">throw</span> <span class="token keyword">new</span> <span class="token class-name">ClassNotFoundException</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>

            <span class="token keyword">byte</span><span class="token punctuation">[</span><span class="token punctuation">]</span> buffer <span class="token operator">=</span> <span class="token keyword">new</span> <span class="token keyword">byte</span><span class="token punctuation">[</span><span class="token number">1024</span><span class="token punctuation">]</span><span class="token punctuation">;</span>

                baos<span class="token punctuation">.</span><span class="token function">write</span><span class="token punctuation">(</span>buffer<span class="token punctuation">,</span> <span class="token number">0</span><span class="token punctuation">,</span> len<span class="token punctuation">)</span><span class="token punctuation">;</span>

        <span class="token punctuation">}</span> <span class="token keyword">catch</span> <span class="token punctuation">(</span><span class="token class-name">IOException</span> e<span class="token punctuation">)</span> <span class="token punctuation">{</span>
            e<span class="token punctuation">.</span><span class="token function">printStackTrace</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>

        <span class="token keyword">return</span> <span class="token keyword">null</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>

="line-number">51</span><br><span class="line-number">52</span><br><span class="line-number">53</span><br><span class="line-number">54</span><br><span class="line-number">55</span><br><span class="line-number">56</span><br><span class="line-number">57</span><br><span class="line-number">58</span><br><span class="line-number">59</span><br><span class="line-number">60</span><br><span class="line-number">61</span><br><span class="line-number">62</span><br><span class="line-number">63</span><br><span class="line-number">64</span><br><span class="line-number">65</span><br><span class="line-number">66</span><br><span class="line-number">67</span><br><span class="line-number">68</span><br><span class="line-number">69</span><br><span class="line-number">70</span><br><span class="line-number">71</span><br><span class="line-number">72</span><br><span class="line-number">73</span><br><span class="line-number">74</span><br><span class="line-number">75</span><br><span class="line-number">76</span><br><span class="line-number">77</span><br></div></div><p>主要看 55 到 73 行的代码，new 了两个类加载器，虽然加载了同一个 Class 文件，但是生成的类模板确实不一样的。</p> <p>输出结果：</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token boolean">false</span>

<span class="token class-name"><span class="token namespace">sun<span class="token punctuation">.</span>misc<span class="token punctuation">.</span></span>Launcher</span>$<span class="token class-name">AppClassLoader</span><span class="token annotation punctuation">@18b4aac2</span>
<span class="token class-name"><span class="token namespace">sun<span class="token punctuation">.</span>misc<span class="token punctuation">.</span></span>Launcher</span>$<span class="token class-name">AppClassLoader</span><span class="token annotation punctuation">@18b4aac2</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><h3 id="类加载机制的基本特征"><a href="#类加载机制的基本特征" class="header-anchor">#</a> 类加载机制的基本特征</h3> <p>通常类加载机制有三个基本特征：</p> <ul><li>双亲委派模型：但不是所有类加载都遵守这个模型，有的时候，启动类加载器所加载的类型，是可能要加载用户代码的，比如 JDK 内部的 <code>ServiceProvider/ServiceLoader</code> 机制，用户可以在标准 API 框架上，提供自己的实现，JDK 也需要提供些默认的参考实现。例如，Java 中 JNDI、JDBC、文件系统、Cipher 等很多方面，都是利用的这种机制，这种情况就不会用双亲委派模型去加载，而是利用所谓的上下文加载器</li> <li>可见性：子类加载器可以访问父加载器加载的类型，但是反过来是不允许的。不然，因为缺少必要的隔离，我们就没有办法利用类加载器去实现容器的逻辑</li> <li>单一性：由于父加载器的类型对于子加载器是可见的，所以父加载器中加载过的类型，就不会在子加载器中重复加载。但是注意，类加载器「邻居」间，同一类型仍然可以被加载多次，因为相互并不可见（即 new 多个构造器可以加载同一个 Class 文件）</li></ul> <h2 id="类的加载器分类"><a href="#类的加载器分类" class="header-anchor">#</a> 类的加载器分类</h2> <p>JVM 支持两种类型的类加载器，分别为引导类加载器（Bootstrap ClassLoader）和自定义类加载器（User-Defined ClassLoader）。</p> <p>从概念上来讲，自定义类加载器一般指的是程序中由开发人员自定义的一类类加载器，但是 Java 虚拟机规范却没有这么定义，而是将所有派生于抽象类 ClassLoader 的类加载器都划分为自定义类加载器。无论类加载器的类型如何划分，在程序中我们最常见的类加载器结构主要是如下情况：</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Java/20220130211534.png" alt="image-20220130211533603"></p> <ul><li>除了顶层的启动类加载器外，其余的类加载器都应当有自己的「父类」加载器</li> <li>不同类加载器看似是继承（Inheritance）关系，实际上是包含关系。在下层加载器中，包含着上层加载器的引用</li></ul> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">class</span> <span class="token class-name">ClassLoader</span> <span class="token punctuation">{</span>
    <span class="token class-name">ClassLoader</span> parent<span class="token punctuation">;</span> 

    <span class="token keyword">public</span> <span class="token class-name">ClassLoader</span><span class="token punctuation">(</span><span class="token class-name">ClassLoader</span> parent<span class="token punctuation">)</span> <span class="token punctuation">{</span>
        <span class="token keyword">this</span><span class="token punctuation">.</span>parent <span class="token operator">=</span> parent<span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>

<span class="token keyword">class</span> <span class="token class-name">ParentClassLoader</span> <span class="token keyword">extends</span> <span class="token class-name">ClassLoader</span> <span class="token punctuation">{</span>

    <span class="token keyword">public</span> <span class="token keyword">static</span> <span class="token keyword">void</span> <span class="token function">main</span><span class="token punctuation">(</span><span class="token class-name">String</span><span class="token punctuation">[</span><span class="token punctuation">]</span> args<span class="token punctuation">)</span> <span class="token punctuation">{</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br></div></div><p>部分输出结果如图：</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Java/20220130212359.png" alt="image-20220130212358140"></p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Java/20220130212706.png" alt="image-20220130212705503"></p> <p>启动类加载器使用 C++ 编写的？是的。</p> <ul><li>C/C++：指针函数 &amp; 函数指针、C++ 支持多继承、更加高效</li> <li>Java ：由 C++ 演变而来，C++ 的 -- 版，单继承</li></ul> <h3 id="扩展类加载器"><a href="#扩展类加载器" class="header-anchor">#</a> 扩展类加载器</h3> <p>扩展类加载器（Extension ClassLoader）</p> <ul><li>Java 语言编写，由 <code>sun.misc.Launcher$ExtClassLoader</code> 实现</li> <li>继承于 ClassLoader 类（间接）</li> <li>父类加载器为启动类加载器</li> <li>从 <code>java.ext.dirs</code> 系统属性所指定的目录中加载类库，或从 JDK 的安装目录的 <code>jre/lib/ext</code> 子目录下加载类库。如果用户创建的 JAR 放在此目录下，也会自动由扩展类加载器加载</li></ul> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Java/20220130212933.png" alt="image-20220130212932073"></p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">ClassLoaderTest</span> <span class="token punctuation">{</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br></div></div><h3 id="系统类加载器"><a href="#系统类加载器" class="header-anchor">#</a> 系统类加载器</h3> <p>应用程序类加载器（系统类加载器，AppClassLoader）。</p> <ul><li>Java 语言编写，由 <code>sun.misc.Launcher$AppClassLoader</code> 实现</li> <li>继承于 ClassLoader 类（间接）</li> <li>父类加载器为扩展类加载器</li> <li>它负责加载环境变量 classpath 或系统属性 <code>java.class.path</code> 指定路径下的类库</li> <li><strong>应用程序中的类加载器默认是系统类加载器</strong></li> <li>它是用户自定义类加载器的默认父加载器</li> <li>通过 ClassLoader 的 <code>getSystemClassLoader()</code> 方法可以获取到该类加载器</li></ul> <p>这是最常用的类加载器，我们自定义的类都是由该类加载器进行加载。</p> <h3 id="用户自定义类加载器"><a href="#用户自定义类加载器" class="header-anchor">#</a> 用户自定义类加载器</h3> <ul><li>在 Java 的日常应用程序开发中，类的加载几乎是由上述 3 种类加载器相互配合执行的。在必要时，我们还可以自定义类加载器，来定制类的加载方式</li> <li>体现 Java 语言强大生命力和巨大魅力的关键因素之一便是，Java 开发者可以自定义类加载器来实现类库的动态加载，加载源可以是本地的 JAR 包，也可以是网络上的远程资源</li> <li><strong>通过类加载器可以实现非常绝妙的插件机制</strong>，这方面的实际应用案例不胜枚举。例如，著名的 OSGI 组件框架，再如 Eclipse 的插件机制。类加载器为应用程序提供了一种动态增加新功能的机制，这种机制无需重新打包发布应用程序就能实现</li> <li>同时，<strong>自定义加载器能够实现应用隔离</strong>，例如 Tomcat、Spring 等中间件和组件框架都在内部实现了自定义的加载器，并通过自定义加载器隔离不同的组件模块。这种机制比 C/C++ 程序要好太多，想不修改 C/C++ 程序就能为其新增功能，几乎是不可能的，仅仅一个兼容性便能阻挡所有美好的设想</li> <li>自定义类加载器通常需要继承于 ClassLoader</li></ul> <h2 id="测试不同的类加载器"><a href="#测试不同的类加载器" class="header-anchor">#</a> 测试不同的类加载器</h2> <p>每个 Class 对象都会包含一个定义它的 ClassLoader 的一个引用。</p> <p>获取 ClassLoader 的途径。</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token comment">// 获取当前类的 ClassLoader</span>
clazz<span class="token punctuation">.</span><span class="token function">getClassLoader</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>

<span class="token comment">// 获得当前线程上下文的 ClassLoader</span>
