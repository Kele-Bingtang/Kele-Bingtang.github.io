              <!----></a></dt></dl></div></div></div> <div class="content-wrapper"><!----> <!----> <!----> <div class="theme-vdoing-content content__default"><p>本内容分为三篇：</p> <ul><li><p>上篇为 JVM - 内存与垃圾回收篇</p></li> <li><p>中篇为 JVM - 字节码与类的加载篇</p></li> <li><p>下篇为 JVM - 性能监控与调优篇</p></li></ul> <p>JVM - 内存与垃圾回收篇内容分为：</p> <ul><li>类加载子系统：第 2 章（类加载子系统）</li> <li>运行时数据区：第 3 章（运行时数据区概述及线程） - 第 11 章（直接内容）</li> <li>执行引擎：第 12 章（执行引擎）</li> <li>面试常问：第 13 章（StringTable）</li> <li>垃圾回收机制：第 14 章（垃圾回收概述） - 第 17 章（垃圾回收期）</li></ul> <p>JVM - 字节码与类的加载篇内容为第 18 章 - 第 21 章。</p> <p>JVM - 性能监控与调优篇内容为第 22 章 - 第 26章。</p> <p>学习自 <code>https://www.bilibili.com/video/BV1PJ411n7xZ</code>。</p> <p>JVM - 内存与垃圾回收篇内容学习内容的顺序图（从上往下，中间是核心）：</p> <p><img src="https://cdn.staticaly.com/gh/Kele-Bingtang/static@master/img/Java/20220115234155.png" alt="image-20200705080911284"></p> <h2 id="技巧"><a href="#技巧" class="header-anchor">#</a> 技巧</h2> <h3 id="技巧1"><a href="#技巧1" class="header-anchor">#</a> 技巧1</h3> <p>在开发中，能够使用 final 修饰的时候，建议使用上，因为在编译期间就确定值，提高效率。</p> <h3 id="技巧2"><a href="#技巧2" class="header-anchor">#</a> 技巧2</h3> <p>遇到多个 String 相加，应该换成 StringBuilder</p> <div class="language-java line-numbers-mode"><pre class="language-java"><code><span class="token keyword">public</span> <span class="token keyword">static</span> <span class="token keyword">void</span> <span class="token function">method1</span><span class="token punctuation">(</span><span class="token keyword">int</span> highLevel<span class="token punctuation">)</span> <span class="token punctuation">{</span>
    <span class="token class-name">String</span> src <span class="token operator">=</span> <span class="token string">&quot;&quot;</span><span class="token punctuation">;</span>
    <span class="token keyword">for</span> <span class="token punctuation">(</span><span class="token keyword">int</span> i <span class="token operator">=</span> <span class="token number">0</span><span class="token punctuation">;</span> i <span class="token operator">&lt;</span> highLevel<span class="token punctuation">;</span> i<span class="token operator">++</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
        src <span class="token operator">+=</span> <span class="token string">&quot;a&quot;</span><span class="token punctuation">;</span> <span class="token comment">// 每次循环都会创建一个 StringBuilder 和 String 对象（应该避免）</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>

<span class="token keyword">public</span> <span class="token keyword">static</span> <span class="token keyword">void</span> <span class="token function">method2</span><span class="token punctuation">(</span><span class="token keyword">int</span> highLevel<span class="token punctuation">)</span> <span class="token punctuation">{</span>
    <span class="token comment">// 只需要创建一个StringBuilder</span>
    <span class="token class-name">StringBuilder</span> sb <span class="token operator">=</span> <span class="token keyword">new</span> <span class="token class-name">StringBuilder</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span> <span class="token comment">// 优化：StringBuilder s = new StringBuilder(highLevel);</span>
    <span class="token keyword">for</span> <span class="token punctuation">(</span><span class="token keyword">int</span> i <span class="token operator">=</span> <span class="token number">0</span><span class="token punctuation">;</span> i <span class="token operator">&lt;</span> highLevel<span class="token punctuation">;</span> i<span class="token operator">++</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
        sb<span class="token punctuation">.</span><span class="token function">append</span><span class="token punctuation">(</span><span class="token string">&quot;a&quot;</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br></div></div><p>方法 1 耗费的时间：4005ms，方法 2 消耗时间：7ms。</p> <p>方法 2 的再次优化：<code>new StringBuilder()</code> 构造器里可以传入参数（长度），所以为了避免后续长度不够的扩容，可以在创建的时候确定长度。</p> <p>具体看 <a href="/java/jvm/stringtable/#拼接操作和append性能对比">JVM - 拼接操作和append性能对比</a>。</p> <h2 id="参考"><a href="#参考" class="header-anchor">#</a> 参考</h2> <p>因为个人的时间原因，没有从头到尾完全手写笔记，而是参考了别人的一些笔记框架，然后在学习的途中，改成自己的布局和知识理解，这里注明参考的笔记来源：</p> <ul><li>1 - 17 篇（部分）参考 <code>https://gitee.com/moxi159753/LearningNotes/tree/master/JVM</code></li> <li>18 - 21 篇（部分）参考 <code>https://www.zhihu.com/column/c_1303831719934214144</code></li> <li>22 - 26 篇（部分）参考 <code>https://gitee.com/moxi159753/LearningNotes/tree/master/JVM</code></li></ul></div></div> <!----> <div class="page-edit"><!----> <!----> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2022/07/23, 01:19:36</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/java/juc/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">JUC - 知识体系</div></a> <a href="/java/new-features/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">Java版本新特性 - 知识体系</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
