">#</a> ELK 组成</h2> <h3 id="elasticsearch"><a href="#elasticsearch" class="header-anchor">#</a> Elasticsearch</h3> <p>ES 作为一个搜索型文档数据库，拥有优秀的搜索能力，以及提供了丰富的 REST API 让我们可以轻松的调用接口。</p> <h3 id="filebeat"><a href="#filebeat" class="header-anchor">#</a> Filebeat</h3> <p>Filebeat 是一款轻量的数据收集工具。</p> <h3 id="logstash"><a href="#logstash" class="header-anchor">#</a> Logstash</h3> <p>通过 Logstash 同样可以进行日志收集，但是若每一个节点都需要收集时，部署 Logstash 有点过重，因此这里主要用到 Logstash 的数据清洗能力，收集交给 Filebeat 去实现。</p> <h3 id="kibana"><a href="#kibana" class="header-anchor">#</a> Kibana</h3> <p>Kibana 是一款基于 ES 的可视化操作界面工具，利用 Kibana 可以实现非常方便的 ES 可视化操作。</p> <h3 id="流程图"><a href="#流程图" class="header-anchor">#</a> 流程图</h3> <p>k8s 内置 Docker，而 Docker 专门有个所有容器的统一日志收集目录 <code>/var/log/containers</code>，所以可以用 Filebeat 去这个目录收集容器的日志，收集后发给 Logstash（如果日志数据太大，可以先发给 Kafka 等中间件，然后 Logstash 去 Kafka 获取日志）。</p> <p>Logstash 得到日志后，内部可以进行数据的清洗等操作，然后发给 ElasticSearch，接着 Kibana 通过 ElasticSearch 的 API 去 ElasticSearch 里检索日志，在页面展示给程序员、运维人员看。</p> <p>Kibana 是一个 ElasticSearch 的可视化界面</p> <p>如下图：</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Spring%20Boot/20230624151652.png" alt="image-20230624151651646"></p> <h2 id="集成-elk"><a href="#集成-elk" class="header-anchor">#</a> 集成 ELK</h2> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Spring%20Boot/20230624151631.png" alt="image-20230624151623028"></p> <h3 id="部署-es-搜索服务"><a href="#部署-es-搜索服务" class="header-anchor">#</a> 部署 es 搜索服务</h3> <p>需要提前给 es 落盘节点打上标签</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># 对应下面 es.yaml 的 127</span>
kubectl label <span class="token function">node</span> <span class="token operator">&lt;</span>node name<span class="token operator">&gt;</span> <span class="token assign-left variable">es</span><span class="token operator">=</span>data 
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>创建 es.yaml</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token punctuation">---</span>

<span class="token key atrule">kind</span><span class="token punctuation">:</span> Service

  <span class="token key atrule">namespace</span><span class="token punctuation">:</span> kube<span class="token punctuation">-</span>logging 
  <span class="token key atrule">labels</span><span class="token punctuation">:</span> 
    <span class="token key atrule">k8s-app</span><span class="token punctuation">:</span> elasticsearch<span class="token punctuation">-</span>logging

    <span class="token key atrule">kubernetes.io/name</span><span class="token punctuation">:</span> <span class="token string">&quot;Elasticsearch&quot;</span> 
<span class="token key atrule">spec</span><span class="token punctuation">:</span> 
  <span class="token key atrule">ports</span><span class="token punctuation">:</span> 
  <span class="token punctuation">-</span> <span class="token key atrule">port</span><span class="token punctuation">:</span> <span class="token number">9200</span> 
    <span class="token key atrule">protocol</span><span class="token punctuation">:</span> TCP 
    <span class="token key atrule">targetPort</span><span class="token punctuation">:</span> db

    <span class="token key atrule">k8s-app</span><span class="token punctuation">:</span> elasticsearch<span class="token punctuation">-</span>logging

    <span class="token key atrule">k8s-app</span><span class="token punctuation">:</span> elasticsearch<span class="token punctuation">-</span>logging 
    <span class="token key atrule">kubernetes.io/cluster-service</span><span class="token punctuation">:</span> <span class="token string">&quot;true&quot;</span>

  <span class="token key atrule">serviceName</span><span class="token punctuation">:</span> elasticsearch<span class="token punctuation">-</span>logging <span class="token comment"># 与 svc 相关联，这可以确保使用以下 DNS 地址访问 Statefulset 中的每个 pod (es-cluster-[0,1,2].elasticsearch.elk.svc.cluster.local)</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h3 id="kibana-配置"><a href="#kibana-配置" class="header-anchor">#</a> Kibana 配置</h3> <p>进入 Kibana 界面，打开菜单中的 Stack Management 可以看到采集到的日志。</p> <p>避免日志越来越大，占用磁盘过多，进入 索引生命周期策略 界面点击 <strong>创建策略</strong> 按钮。</p> <ul><li>设置策略名称为 <code>logstash-history-ilm-policy</code></li> <li>关闭热阶段</li> <li>开启删除阶段，设置保留天数为 7 天</li></ul> <p><strong>保存配置</strong></p> <p>为了方便在 discover 中查看日志，选择 索引模式 然后点击 <strong>创建索引模式</strong> 按钮。</p> <ul><li><p>索引模式名称 里面配置 <code>logstash-*</code></p></li> <li><p>点击下一步</p></li> <li><p>时间字段 选择 <code>@timestamp</code></p></li> <li><p>点击 创建索引模式 按钮</p></li></ul> <p>由于部署的单节点，产生副本后索引状态会变成 yellow，打开 dev tools，取消所有索引的副本数</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>PUT _all/_settings
<span class="token punctuation">{</span>
    <span class="token string">&quot;number_of_replicas&quot;</span><span class="token builtin class-name">:</span> <span class="token number">0</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p>为了标准化日志中的 map 类型，以及解决链接索引生命周期策略，我们需要修改默认模板</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>PUT _template/logstash 
<span class="token punctuation">{</span> 
    <span class="token string">&quot;order&quot;</span><span class="token builtin class-name">:</span> <span class="token number">1</span>, 
    <span class="token string">&quot;index_patterns&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">[</span> 
      <span class="token string">&quot;logstash-*&quot;</span> 
    <span class="token punctuation">]</span>, 
    <span class="token string">&quot;settings&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
      <span class="token string">&quot;index&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
      <span class="token string">&quot;lifecycle&quot;</span> <span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
          <span class="token string">&quot;name&quot;</span> <span class="token builtin class-name">:</span> <span class="token string">&quot;logstash-history-ilm-policy&quot;</span> 
        <span class="token punctuation">}</span>, 
        <span class="token string">&quot;number_of_shards&quot;</span><span class="token builtin class-name">:</span> <span class="token string">&quot;2&quot;</span>, 
        <span class="token string">&quot;refresh_interval&quot;</span><span class="token builtin class-name">:</span> <span class="token string">&quot;5s&quot;</span>, 
        <span class="token string">&quot;number_of_replicas&quot;</span> <span class="token builtin class-name">:</span> <span class="token string">&quot;0&quot;</span> 
      <span class="token punctuation">}</span> 
    <span class="token punctuation">}</span>, 
    <span class="token string">&quot;mappings&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
        <span class="token string">&quot;properties&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
          <span class="token string">&quot;@timestamp&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
            <span class="token string">&quot;type&quot;</span><span class="token builtin class-name">:</span> <span class="token string">&quot;date&quot;</span> 
          <span class="token punctuation">}</span>, 
          <span class="token string">&quot;applog&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
            <span class="token string">&quot;dynamic&quot;</span><span class="token builtin class-name">:</span> true,

              <span class="token string">&quot;cost&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
                <span class="token string">&quot;type&quot;</span><span class="token builtin class-name">:</span> <span class="token string">&quot;float&quot;</span>

              <span class="token string">&quot;func&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
                <span class="token string">&quot;type&quot;</span><span class="token builtin class-name">:</span> <span class="token string">&quot;keyword&quot;</span> 
              <span class="token punctuation">}</span>, 
              <span class="token string">&quot;method&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
                <span class="token string">&quot;type&quot;</span><span class="token builtin class-name">:</span> <span class="token string">&quot;keyword&quot;</span> 
              <span class="token punctuation">}</span> 
            <span class="token punctuation">}</span> 
          <span class="token punctuation">}</span>, 
          <span class="token string">&quot;k8s&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
            <span class="token string">&quot;dynamic&quot;</span><span class="token builtin class-name">:</span> true, 
            <span class="token string">&quot;properties&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
              <span class="token string">&quot;namespace&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
                <span class="token string">&quot;type&quot;</span><span class="token builtin class-name">:</span> <span class="token string">&quot;keyword&quot;</span> 
              <span class="token punctuation">}</span>, 
              <span class="token string">&quot;container&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
                <span class="token string">&quot;dynamic&quot;</span><span class="token builtin class-name">:</span> true, 
                <span class="token string">&quot;properties&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
                  <span class="token string">&quot;name&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
                    <span class="token string">&quot;type&quot;</span><span class="token builtin class-name">:</span> <span class="token string">&quot;keyword&quot;</span> 
                  <span class="token punctuation">}</span> 
                <span class="token punctuation">}</span> 
              <span class="token punctuation">}</span>, 
              <span class="token string">&quot;labels&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
                <span class="token string">&quot;dynamic&quot;</span><span class="token builtin class-name">:</span> true, 
                <span class="token string">&quot;properties&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
                  <span class="token string">&quot;srv&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
                    <span class="token string">&quot;type&quot;</span><span class="token builtin class-name">:</span> <span class="token string">&quot;keyword&quot;</span> 
                  <span class="token punctuation">}</span> 
                <span class="token punctuation">}</span> 
              <span class="token punctuation">}</span> 
            <span class="token punctuation">}</span> 
          <span class="token punctuation">}</span>, 
          <span class="token string">&quot;geoip&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
            <span class="token string">&quot;dynamic&quot;</span><span class="token builtin class-name">:</span> true, 
            <span class="token string">&quot;properties&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
              <span class="token string">&quot;ip&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
                <span class="token string">&quot;type&quot;</span><span class="token builtin class-name">:</span> <span class="token string">&quot;ip&quot;</span> 
              <span class="token punctuation">}</span>, 
              <span class="token string">&quot;latitude&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
                <span class="token string">&quot;type&quot;</span><span class="token builtin class-name">:</span> <span class="token string">&quot;float&quot;</span> 
              <span class="token punctuation">}</span>, 
              <span class="token string">&quot;location&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
                <span class="token string">&quot;type&quot;</span><span class="token builtin class-name">:</span> <span class="token string">&quot;geo_point&quot;</span> 
              <span class="token punctuation">}</span>, 
              <span class="token string">&quot;longitude&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span> 
                <span class="token string">&quot;type&quot;</span><span class="token builtin class-name">:</span> <span class="token string">&quot;float&quot;</span> 
              <span class="token punctuation">}</span> 
            <span class="token punctuation">}</span> 
          <span class="token punctuation">}</span> 
      <span class="token punctuation">}</span> 
    <span class="token punctuation">}</span>, 
    <span class="token string">&quot;aliases&quot;</span><span class="token builtin class-name">:</span> <span class="token punctuation">{</span><span class="token punctuation">}</span> 
  <span class="token punctuation">}</span> 
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br><span class="line-number">27</span><br><span class="line-number">28</span><br><span class="line-number">29</span><br><span class="line-number">30</span><br><span class="line-number">31</span><br><span class="line-number">32</span><br><span class="line-number">33</span><br><span class="line-number">34</span><br><span class="line-number">35</span><br><span class="line-number">36</span><br><span class="line-number">37</span><br><span class="line-number">38</span><br><span class="line-number">39</span><br><span class="line-number">40</span><br><span class="line-number">41</span><br><span class="line-number">42</span><br><span class="line-number">43</span><br><span class="line-number">44</span><br><span class="line-number">45</span><br><span class="line-number">46</span><br><span class="line-number">47</span><br><span class="line-number">48</span><br><span class="line-number">49</span><br><span class="line-number">50</span><br><span class
