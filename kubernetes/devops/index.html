的-jenkins-镜像">构建带 maven 环境的 jenkins 镜像</a></li><li><a href="#安装-jenkins">安装 Jenkins</a></li><li><a href="#安装插件">安装插件</a></li><li><a href="#创建-gitlab-访问凭证">创建 Gitlab 访问凭证</a></li></ul></li><li><a href="#案例-springboot-项目-cicd">案例：SpringBoot 项目 CICD</a><ul><li><a href="#jenkinsfile">Jenkinsfile</a></li></ul></li></ul></div><p></p> <h2 id="devops"><a href="#devops" class="header-anchor">#</a> DevOps</h2> <p>项目开发需要考虑的维度：</p> <ul><li>Dev：怎么开发</li> <li>Ops：怎么运维</li> <li>高并发：怎么承担高并发</li> <li>高可用：怎么做到高可用</li></ul> <h3 id="什么是-devop"><a href="#什么是-devop" class="header-anchor">#</a> 什么是 DevOp</h3> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Spring%20Boot/20230706232259.png" alt="image-20230706232251424"></p> <p>DevOps: Development 和 Operations 的组合：</p> <ul><li>DevOps 看作开发（软件工程）、技术运营和质量保障（QA）三者的交集</li> <li>突出重视软件开发人员和运维人员的沟通合作，通过自动化流程来使得软件构建、测试、发布更加快捷、频繁和可靠</li> <li>DevOps 希望做到的是软件产品交付过程中 IT 工具链的打通，使得各个团队减少时间损耗，更加高效地协同工作。专家们总结出了下面这个 DevOps 能力图，良好的闭环可以大大增加整体的产出</li></ul> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Spring%20Boot/20230706232402.png" alt="image-20230706232401614"></p> <h3 id="什么是-ci-cd"><a href="#什么是-ci-cd" class="header-anchor">#</a> 什么是 CI &amp; CD</h3> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Spring%20Boot/20230706232437.png" alt="image-20230706232436903"></p> <blockquote><p>持续集成（Continuous Integration）</p></blockquote> <p>持续集成是指软件个人研发的部分向软件整体部分交付，频繁进行集成以便更快地发现其中的错误。“持续集成”源自于极限编程（XP），是 XP 最初的 12 种实践之一。</p> <p>CI 需要具备这些：</p> <ul><li>全面的自动化测试。这是实践持续集成&amp;持续部署的基础，同时，选择合适的自动化测试工具也极其重要</li> <li>灵活的基础设施。容器，虚拟机的存在让开发人员和 QA 人员不必再大费周折</li> <li>版本控制工具。如 Git，CVS，SVN 等</li> <li>自动化的构建和软件发布流程的工具，如 Jenkins，flow.ci</li> <li>反馈机制。如构建/测试的失败，可以快速地反馈到相关负责人，以尽快解决达到一个更稳定的版本</li></ul> <blockquote><p>持续交付（Continuous Delivery）</p></blockquote> <p>持续交付在持续集成的基础上，将集成后的代码部署到更贴近真实运行环境的「类生产环境」（production-like environments）中。持续交付优先于整个产品生命周期的软件部署，建立在高水平自动化持续集成之上。灰度发布。</p> <p>持续交付和持续集成的优点非常相似：</p> <ul><li>快速发布。能够应对业务需求，并更快地实现软件价值</li> <li>编码 -&gt; 测试 -&gt; 上线 -&gt; 交付的频繁迭代周期缩短，同时获得迅速反馈</li> <li>高质量的软件发布标准。整个交付过程标准化、可重复、可靠</li> <li>整个交付过程进度可视化，方便团队人员了解项目成熟度</li> <li>更先进的团队协作方式。从需求分析、产品的用户体验到交互 设计、开发、测试、运维等角色密切协作，相比于传统的瀑布式软件团队，更少浪费</li></ul> <blockquote><p>持续部署（Continuous Deployment）</p></blockquote> <p>持续部署是指当交付的代码通过评审之后，自动部署到生产环境中。持续部署是持续交付的最高阶段。这意味着，所有通过了一系列的自动化测试的改动都将自动部署到生产环境。它也可以被称为「Continuous Release」。</p> <p>开发人员提交代码，持续集成服务器获取代码，执行单元测试，根据测试结果决定是否部署到预演环境，如果成功部署到预演环境，进行整体验收测试，如果测试通过，自动部署到产品环境，全程自动化高效运转。</p> <p>持续部署主要好处是，可以相对独立地部署新的功能，并能快速地收集真实用户的反馈。</p> <p><code>You build it, you run it</code>，这是 Amazon 一年可以完成 5000 万次部署，平均每个工程师每天部署超过 50 次的核心秘籍。</p> <p>下图是由 Jams Bowman 绘制的持续交付工具链图</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Spring%20Boot/20230706233000.png" alt="img"></p> <h2 id="命名空间"><a href="#命名空间" class="header-anchor">#</a> 命名空间</h2> <p>开始构建 DevOps 流程。</p> <p>创建一个命名空间 kube-devops 实现 devops</p> <p>kube-devops-namespace.yaml</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">apiVersion</span><span class="token punctuation">:</span> v1
<span class="token key atrule">kind</span><span class="token punctuation">:</span> ServiceAccount
<span class="token key atrule">metadata</span><span class="token punctuation">:</span>
  <span class="token key atrule">name</span><span class="token punctuation">:</span> jenkins<span class="token punctuation">-</span>admin
  <span class="token key atrule">namespace</span><span class="token punctuation">:</span> kube<span class="token punctuation">-</span>devops
<span class="token punctuation">---</span>
<span class="token key atrule">apiVersion</span><span class="token punctuation">:</span> rbac.authorization.k8s.io/v1
<span class="token key atrule">kind</span><span class="token punctuation">:</span> ClusterRoleBinding
<span class="token key atrule">metadata</span><span class="token punctuation">:</span>
  <span class="token key atrule">name</span><span class="token punctuation">:</span> jenkins<span class="token punctuation">-</span>admin
<span class="token key atrule">roleRef</span><span class="token punctuation">:</span>
  <span class="token key atrule">apiGroup</span><span class="token punctuation">:</span> rbac.authorization.k8s.io
  <span class="token key atrule">kind</span><span class="token punctuation">:</span> ClusterRole
  <span class="token key atrule">name</span><span class="token punctuation">:</span> cluster<span class="token punctuation">-</span>admin
<span class="token key atrule">subjects</span><span class="token punctuation">:</span>
<span class="token punctuation">-</span> <span class="token key atrule">kind</span><span class="token punctuation">:</span> ServiceAccount
  <span class="token key atrule">name</span><span class="token punctuation">:</span> jenkins<span class="token punctuation">-</span>admin
  <span class="token key atrule">namespace</span><span class="token punctuation">:</span> kube<span class="token punctuation">-</span>devops
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br></div></div><p>构建：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>kubectl apply <span class="token parameter variable">-f</span> kube-devops-namespace.yaml
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h2 id="gitlab"><a href="#gitlab" class="header-anchor">#</a> Gitlab</h2> <p><a href="https://about.gitlab.com/" target="_blank" rel="noopener noreferrer">GitLab<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> 是一个用于仓库管理系统的开源项目，使用 Git 作为代码管理工具，并在此基础上搭建起来的 Web 服务。</p> <p>Gitlab 是被广泛使用的基于 git 的开源代码管理平台, 基于 Ruby on Rails 构建, 主要针对软件开发过程中产生的代码和文档进行管理, Gitlab 主要针对 group 和 project 两个维度进行代码和文档管理, 其中 group 是群组, project 是工程项目, 一个 group 可以管理多个project , 可以理解为一个群组中有多项软件开发任务, 而一个 project 中可能包含多个 branch, 意为每个项目中有多个分支, 分支间相互独立, 不同分支可以进行归并。</p> <p>安装GitLab官方推荐 <strong>至少 4G 的内存，否则可能会卡顿或者运行非常慢</strong>，所以建议采用 4G 以上的云服务进行测试，或者本地搭建虚拟机的方式来做。</p> <h3 id="安装"><a href="#安装" class="header-anchor">#</a> 安装</h3> <blockquote><p>非 Docker 安装</p></blockquote> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># 下载安装包</span>
<span class="token function">wget</span> https://mirrors.tuna.tsinghua.edu.cn/gitlab-ce/yum/el7/gitlab-ce-15.9.1-ce.0.el7.x86_64.rpm

<span class="token comment"># 安装</span>
<span class="token function">rpm</span> <span class="token parameter variable">-i</span> gitlab-ce-15.9.1-ce.0.el7.x86_64.rpm

<span class="token comment"># 编辑 /etc/gitlab/gitlab.rb 文件</span>
<span class="token comment"># 修改 external_url 访问路径 http://&lt;ip&gt;:&lt;port&gt;</span>
<span class="token comment"># 其他配置修改如下</span>
gitlab_rails<span class="token punctuation">[</span><span class="token string">'time_zone'</span><span class="token punctuation">]</span> <span class="token operator">=</span> <span class="token string">'Asia/Shanghai'</span>
puma<span class="token punctuation">[</span><span class="token string">'worker_processes'</span><span class="token punctuation">]</span> <span class="token operator">=</span> <span class="token number">2</span>
sidekiq<span class="token punctuation">[</span><span class="token string">'max_concurrency'</span><span class="token punctuation">]</span> <span class="token operator">=</span> <span class="token number">8</span>
postgresql<span class="token punctuation">[</span><span class="token string">'shared_buffers'</span><span class="token punctuation">]</span> <span class="token operator">=</span> <span class="token string">&quot;128MB&quot;</span>
postgresql<span class="token punctuation">[</span><span class="token string">'max_worker_processes'</span><span class="token punctuation">]</span> <span class="token operator">=</span> <span class="token number">4</span>
prometheus_monitoring<span class="token punctuation">[</span><span class="token string">'enable'</span><span class="token punctuation">]</span> <span class="token operator">=</span> <span class="token boolean">false</span>

<span class="token comment"># 更新配置并重启</span>
gitlab-ctl reconfigure
gitlab-ctl restart
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br></div></div><blockquote><p>Docker 安装</p></blockquote> <p>下载 Gitlab</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">docker</span> pull gitlab/gitlab-ce
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>配置，数据，日志进行持久化，即使用数据卷，先创建三个目录</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">mkdir</span> <span class="token parameter variable">-p</span> /docker/gitlab/etc
<span class="token function">mkdir</span> <span class="token parameter variable">-p</span> /docker/gitlab/log
<span class="token function">mkdir</span> <span class="token parameter variable">-p</span> /docker/gitlab/data
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>启动 Gitlab</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">docker</span> run <span class="token parameter variable">-d</span> <span class="token parameter variable">--name</span> gitlab <span class="token punctuation">\</span>
<span class="token parameter variable">-p</span> <span class="token number">8051</span>:443 <span class="token punctuation">\</span>
<span class="token parameter variable">-p</span> <span class="token number">8050</span>:80 <span class="token punctuation">\</span>
<span class="token parameter variable">--hostname</span> <span class="token number">192.168</span>.199.31 <span class="token punctuation">\</span>
<span class="token parameter variable">--restart</span><span class="token operator">=</span>always <span class="token punctuation">\</span>
<span class="token parameter variable">-v</span> /docker/gitlab/etc:/etc/gitlab <span class="token punctuation">\</span>
<span class="token parameter variable">-v</span> /docker/gitlab/log:/var/log/gitlab <span class="token punctuation">\</span>
<span class="token parameter variable">-v</span> /docker/gitlab/data:/var/opt/gitlab <span class="token punctuation">\</span>
<span class="token parameter variable">-v</span> /etc/localtime:/etc/localtime:ro <span class="token punctuation">\</span>
gitlab/gitlab-ce:latest
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br></div></div><p>然后前往 <code>docker/gitlab/etc</code>，编辑 <code>gitlab.rb</code> 文件。</p> <p>修改如下内容：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>external_url <span class="token string">'http://192.168.199.31'</span> <span class="token comment"># 因为是容器内部，所以不需要填写端口，默认 80</span>
gitlab_rails<span class="token punctuation">[</span><span class="token string">'time_zone'</span><span class="token punctuation">]</span> <span class="token operator">=</span> <span class="token string">'Asia/Shanghai'</span>
puma<span class="token punctuation">[</span><span class="token string">'worker_processes'</span><span class="token punctuation">]</span> <span class="token operator">=</span> <span class="token number">2</span> <span class="token comment"># 或者 1</span>
sidekiq<span class="token punctuation">[</span><span class="token string">'max_concurrency'</span><span class="token punctuation">]</span> <span class="token operator">=</span> <span class="token number">8</span> <span class="token comment"># 或者 2</span>
postgresql<span class="token punctuation">[</span><span class="token string">'shared_buffers'</span><span class="token punctuation">]</span> <span class="token operator">=</span> <span class="token string">&quot;128MB&quot;</span> <span class="token comment"># 或者 64MB</span>
postgresql<span class="token punctuation">[</span><span class="token string">'max_worker_processes'</span><span class="token punctuation">]</span> <span class="token operator">=</span> <span class="token number">4</span> <span class="token comment"># 或者 2</span>
prometheus_monitoring<span class="token punctuation">[</span><span class="token string">'enable'</span><span class="token punctuation">]</span> <span class="token operator">=</span> <span class="token boolean">false</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br></div></div><p>浏览器访问：<code>http://192.168.199.31:8050/</code></p> <h3 id="页面配置"><a href="#页面配置" class="header-anchor">#</a> 页面配置</h3> <p>访问 Gitlab 后，我们可以进行一些页面的初始化配置：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># 如果是 Docker 安装，则进入 Gitlab 容器</span>
<span class="token function">docker</span> <span class="token builtin class-name">exec</span> <span class="token parameter variable">-it</span> gitlab <span class="token function">bash</span>

<span class="token comment"># 查看默认密码</span>
<span class="token function">cat</span> /etc/gitlab/initial_root_password
<span class="token comment"># 登录后修改默认密码 &gt; 右上角头像 &gt; Perferences &gt; Password</span>

<span class="token comment"># 修改系统配置：点击左上角三横 &gt; Admin</span>
<span class="token comment"># Settings &gt; General &gt; Account and limit &gt; 取消 Gravatar enabled &gt; Save changes</span>

<span class="token comment"># 关闭用户注册功能</span>
<span class="token comment"># Settings &gt; General &gt; Sign-up restrictions &gt; 取消 Sign-up enabled &gt; Save changes</span>

<span class="token comment"># 开启 webhook 外部访问</span>
<span class="token comment"># Settings &gt; Network &gt; Outbound requests &gt; Allow requests to the local network from web hooks and services 勾选</span>

<span class="token comment"># 设置语言为中文（全局）</span>
<span class="token comment"># Settings &gt; Preferences &gt; Localization &gt; Default language &gt; 选择简体中文 &gt; Save changes</span>

<span class="token comment"># 设置当前用户语言为中文</span>
<span class="token comment"># 右上角用户头像 &gt; Preferences &gt; Localization &gt; Language &gt; 选择简体中文 &gt; Save changes</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br></div></div><h3 id="配置-secret"><a href="#配置-secret" class="header-anchor">#</a> 配置 Secret</h3> <p>创建 Gitlab 的一个默认用户名密码 secret 给 Jenkins，方便 Jenkins 后续实现自动化部署，快速访问 Gitlab。</p> <p>因为后面 Jenkins 在 k8s 部署，所以利用 k8s 的 secret 来管理用户名和密码。</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token builtin class-name">cd</span> /opt/gitlab

<span class="token builtin class-name">echo</span> root <span class="token operator">&gt;</span> ./username
<span class="token builtin class-name">echo</span> youngkbt <span class="token operator">&gt;</span> password
kubectl create secret generic git-username-password --from-file<span class="token operator">=</span>./username --from-file<span class="token operator">=</span>./password <span class="token parameter variable">-n</span> kube-devops
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><h3 id="为项目配置-webhook"><a href="#为项目配置-webhook" class="header-anchor">#</a> 为项目配置 Webhook</h3> <p>进入项目点击侧边栏设置 &gt; Webhooks 进入配置即可。</p> <p>URL：在 Jenkins 创建 pipeline 项目后（下面会按照 Jenkins）</p> <p>触发来源：</p> <ul><li>推送事件：表示收到新的推送代码就会触发</li> <li>标签推送事件：新标签推送才会触发</li> <li>评论：根据评论决定触发</li> <li>合并请求事件：创建、更新或合并请求触发</li></ul> <p>添加成功后，可以在下方点击测试按钮查看 jenkins 是否成功触发构建操作。</p> <h3 id="卸载"><a href="#卸载" class="header-anchor">#</a> 卸载</h3> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># 停止服务</span>
gitlab-ctl stop

<span class="token comment"># 卸载 rpm 软件（注意安装的软件版本是 ce 还是 ee）</span>
<span class="token function">rpm</span> <span class="token parameter variable">-e</span> gitlab-ce

<span class="token comment"># 查看进程</span>
<span class="token function">ps</span> -ef<span class="token operator">|</span><span class="token function">grep</span> gitlab 
<span class="token comment"># 干掉第一个 runsvdir -P /opt/gitlab/service log 进程</span>

<span class="token comment"># 删除 gitlab 残余文件</span>
<span class="token function">find</span> / <span class="token parameter variable">-name</span> *gitlab* <span class="token operator">|</span> <span class="token function">xargs</span> <span class="token function">rm</span> <span class="token parameter variable">-rf</span>
<span class="token function">find</span> / <span class="token parameter variable">-name</span> gitlab <span class="token operator">|</span> <span class="token function">xargs</span> <span class="token function">rm</span> <span class="token parameter variable">-rf</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br></div></div><h2 id="harbor"><a href="#harbor" class="header-anchor">#</a> Harbor</h2> <h3 id="安装-2"><a href="#安装-2" class="header-anchor">#</a> 安装</h3> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># 下载 harbor 安装包</span>
<span class="token function">wget</span> https://github.com/goharbor/harbor/releases/download/v2.8.2/harbor-offline-installer-v2.8.2.tgz

<span class="token comment"># 解压后执行 install.sh 就行</span>
<span class="token function">tar</span> <span class="token parameter variable">-zxvf</span> harbor-offline-installer-v2.8.2.tgz

<span class="token builtin class-name">cd</span> harbor
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br></div></div><p>复制配置模版</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">cp</span> harbor.yml.tmpl harbor.tmpl
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>进入配置文件 harbor.tmpl，修改 hostname 为本机地址，如 <code>192.168.199.31</code>。注释掉 https（如果不申请证书，只用 http 必须注释掉。否则会自动找 https 证书从而报错）。可以修改端口 port，默认是 80，我修改为 8040。其他保持默认。</p> <p>安装 harbor</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>./install.sh
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>安装完成后检查服务是否起来</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">docker-compose</span> <span class="token function">ps</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>浏览器访问：<code>http://192.168.199.31:8040</code>，默认账号密码：<code>admin / Harbor12345</code> ，密码在harbor.yml文件中可修改。</p> <h3 id="harbar-自启"><a href="#harbar-自启" class="header-anchor">#</a> Harbar 自启</h3> <p>创建配置文件</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">vim</span> /etc/systemd/system/harbor.service
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>添加如下内容</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token punctuation">[</span>Unit<span class="token punctuation">]</span>
<span class="token assign-left variable">Description</span><span class="token operator">=</span>Harbor
<span class="token assign-left variable">After</span><span class="token operator">=</span>docker.service systemd-networkd.service systemd-resolved.service
<span class="token assign-left variable">Requires</span><span class="token operator">=</span>docker.service
<span class="token assign-left variable">Documentation</span><span class="token operator">=</span>http://github.com/vmware/harbor

<span class="token punctuation">[</span>Service<span class="token punctuation">]</span>
<span class="token assign-left variable">Type</span><span class="token operator">=</span>simple
<span class="token assign-left variable">Restart</span><span class="token operator">=</span>on-failure
<span class="token assign-left variable">RestartSec</span><span class="token operator">=</span><span class="token number">5</span>
<span class="token assign-left variable">ExecStart</span><span class="token operator">=</span>/usr/local/bin/docker-compose <span class="token parameter variable">-f</span> /usr/local/harbor/docker-compose.yml up
<span class="token assign-left variable">ExecStop</span><span class="token operator">=</span>/usr/local/bin/docker-compose <span class="token parameter variable">-f</span> /usr/local/harbor/docker-compose.yml down
<span class="token comment"># ExecStart=/usr/local/bin/docker-compose -f {{ harbor_install_path }}/harbor/docker-compose.yml up</span>
<span class="token comment"># ExecStop=/usr/local/bin/docker-compose -f {{ harbor_install_path }}/harbor/docker-compose.yml down</span>

<span class="token punctuation">[</span>Install<span class="token punctuation">]</span>
<span class="token assign-left variable">WantedBy</span><span class="token operator">=</span>multi-user.target
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br></div></div><p>其中 <code></code> 换成自己的 harbor 安装路径。 还有 docker-compose 的绝对路径，请通过 <code>which docker-compose</code> 查看。</p> <p>然后启动该项服务：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">sudo</span> systemctl <span class="token builtin class-name">enable</span> harbor
<span class="token function">sudo</span> systemctl start harbor
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><h3 id="配置-secret-2"><a href="#配置-secret-2" class="header-anchor">#</a> 配置 Secret</h3> <p>创建 Harbor 的一个默认用户名密码 secret 给 Jenkins，方便 Jenkins 后续实现自动化部署，快速访问 Harbor。</p> <p>因为 k8s 去 Harbor 拉去镜像需要登录，所以利用 k8s 的 secret 来管理用户名和密码。</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># 创建 harbor 访问账号密码（需要将下访问的配置信息改成你自己的）</span>

kubectl apply <span class="token parameter variable">-f</span> manifests/

<span class="token comment"># 查看是否运行成功</span>
kubectl get po <span class="token parameter variable">-n</span> kube-devops

<span class="token comment"># 查看 service 端口，通过浏览器访问</span>
kubectl get svc <span class="token parameter variable">-n</span> kube-devops

<span class="token comment"># 查看容器日志，获取默认密码</span>
kubectl logs <span class="token parameter variable">-f</span> pod名称 <span class="token parameter variable">-n</span> kube-devops
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br></div></div><h3 id="安装插件"><a href="#安装插件" class="header-anchor">#</a> 安装插件</h3> <p>如果有些插件搜不到，可以去官网下载 <code>https://plugins.jenkins.io/</code>。</p> <blockquote><p>Build Authorization Token Root</p></blockquote> <p>构建授权 token</p> <blockquote><p>Gitlab</p></blockquote> <p>Gitlab 配置插件</p> <blockquote><p>SonarQube Scanner</p></blockquote> <p>代码质量审查工具</p> <p>在 Dashboard &gt; 系统管理 &gt; Configure System 下面配置 SonarQube servers</p> <p>Name：sonarqube # 注意这个名字要在 Jenkinsfile 中用到 Server URL：<code>http://sonarqube:9000</code></p> <p>Server authentication token：创建 credentials 配置为从 sonarqube 中得到的 token</p> <p>进入系统管理 &gt; 全局工具配置 &gt; SonarQube Scanner &gt; Add SonarQube Scanner</p> <p>Name：sonarqube-scanner</p> <p>自动安装：取消勾选</p> <p><code>SONAR_RUNNER_HOME：/usr/local/sonar-scanner-cli</code></p> <blockquote><p>Node and Label parameter</p></blockquote> <p>节点标签参数配置</p> <blockquote><p>Kubernetes</p></blockquote> <p>jenkins + k8s 环境配置</p> <p>进入 Dashboard &gt; 系统管理 &gt; 节点管理 &gt; Configure Clouds 页面</p> <p>配置 k8s 集群，名称：kubernetes，点击 Kubernetes Cloud details 继续配置</p> <p>Kubernetes 地址：如果 jenkins 是运行在 k8s 容器中，直接配置服务名即可 <code>https://kubernetes.default</code></p> <p>如果 jenkins 部署在外部，那么则不仅要配置外部访问 ip 以及 apiserver 的端口（6443），还需要配置服务证书</p> <p>Jenkins 地址：</p> <ul><li>如果部署在 k8s 集群内部：<code>http://jenkins-service:8080</code></li> <li>如果在外部：<code>http://192.168.192.168:32479</code>（换成你们自己的）</li></ul> <p>配置完成后保存即可</p> <blockquote><p>Config File Provider</p></blockquote> <p>用于加载外部配置文件，如 Maven 的 settings.xml 或者 k8s 的 kubeconfig 等。</p> <blockquote><p>Git Parameter</p></blockquote> <p>git 参数插件，在进行项目参数化构建时使用。</p> <h3 id="创建-gitlab-访问凭证"><a href="#创建-gitlab-访问凭证" class="header-anchor">#</a> 创建 Gitlab 访问凭证</h3> <p>系统管理 &gt; 安全 &gt; Manage Credentials &gt; System &gt; 全局凭据（unrestricted） &gt; Add Credentials</p> <p>范围：全局</p> <p>用户名：root</p> <p>密码：youngkbt</p> <p>ID：gitlab-user-pass</p> <h2 id="案例-springboot-项目-cicd"><a href="#案例-springboot-项目-cicd" class="header-anchor">#</a> 案例：SpringBoot 项目 CICD</h2> <p>点击创建任务 &gt; Pipeline（流水线）。</p> <p>参数化构建：可以通过配置参数化构建，将经常变动的参数提取出来，方便每次构建时传入。</p> <p>构建触发器：勾选基于 gitlab webhook 的构建方式，同时拿到 webhook 地址，且在高级中生成 secret token，将其配置到 gitlab 项目中。</p> <p>根据需求选择 webhook 的触发事件。</p> <p>流水线：选择定义为 Pipeline script from SCM 从远程仓库拉取 Jenkinsfile 配置。</p> <p>配置 SCM 为 Git。</p> <p>Repositories：</p> <ul><li>Repository URL：仓库地址</li> <li>Credentials：仓库访问的账号密码</li> <li>Branches to build：选择拉取哪个分支下的代码</li> <li>脚本路径：Jenkinsfile 脚本文件名称以及所在路径</li></ul> <p>PS：当项目下载下来后，所有操作都默认在项目根目录下执行。</p> <blockquote><p>配置节点标签</p></blockquote> <p>系统管理 &gt; 节点管理 &gt; 列表中 master 节点最右侧的齿轮按钮</p> <p>修改标签的值与项目中 Jenkinsfile 中 agent &gt; kubernetes &gt; label 的值相匹配</p> <blockquote><p>创建流水线项目</p></blockquote> <p>在首页点击 Create a Job 创建一个流水线风格的项目</p> <blockquote><p>Webhook 构建触发器</p></blockquote> <p><strong>Jenkins 流水线项目 Webhook 配置</strong></p> <p>在 Jenkins 项目配置下找到构建触发器栏目</p> <p>勾选 <code>Build when a change is pushed to GitLab. GitLab webhook URL: http://192.168.113.121:31216/project/k8s-cicd-demo</code> 上方的 URL 就是用于配置到 gitlab 项目 webhook 的地址。</p> <p>启用 Gitlab 构建触发器：</p> <ul><li>Push Events：勾选，表示有任意推送到 Git 仓库的操作都会触发构建</li> <li>Opend Merge Request Events：勾选，表示有请求合并时触发构建</li></ul> <p>点击高级 &gt; Secret Token &gt; Generate 按钮，生成 token</p> <p>保存以上配置</p> <p><strong>GitLab 项目 Webhook 配置</strong></p> <p>进入 GitLab 项目设置界面 &gt; Webhooks</p> <p>将上方 Jenkins 中的 URL 配置到 URL 处</p> <p>将上方生成的 Secret Token 配置到 Secret 令牌</p> <p>按照需求勾选触发来源，这里我依然勾选 推送事件、合并请求事件</p> <p>取消 SSL 验证</p> <p>点击添加 webhook 按钮，添加后可以点击测试确认链接是否可以访问</p> <blockquote><p>Pipeline 脚本配置</p></blockquote> <p>流水线：选择定义为 Pipeline script from SCM 从远程仓库拉取 Jenkinsfile 配置。</p> <p>配置 SCM 为 Git。</p> <p>Repositories：</p> <ul><li>Repository URL：仓库地址</li> <li>Credentials：仓库访问的账号密码</li> <li>Branches to build：选择拉取哪个分支下的代码</li> <li>脚本路径：Jenkinsfile 脚本文件名称以及所在路径</li></ul> <blockquote><p>检查/创建相关凭证</p></blockquote> <p><strong>Harbor 镜像仓库凭证</strong></p> <p>通过系统管理 &gt; Manage Credentials &gt; 凭据 &gt; System &gt; 全局凭证 &gt; Add Credentials 添加 Username with password 类型凭证</p> <p>填写好用户名密码后，需要注意凭证 id 要与 Jenkinsfile 中的 *<strong>DOCKER_CREDENTIAL_ID*</strong> <em>一致</em></p> <p><strong>Gitlab 访问凭证</strong></p> <p>通过系统管理 &gt; Manage Credentials &gt; 凭据 &gt; System &gt; 全局凭证 &gt; Add Credentials 添加 Username with password 类型凭证</p> <p>填写好用户名密码后，需要注意凭证 id 要与 Jenkinsfile 中的 <code>GIT_CREDENTIAL_ID</code> <em>一致</em></p> <p><strong>kubeconfig 文件 id</strong></p> <ol><li>事先安装 Config File Provider 插件</li> <li>进入系统管理 &gt; Mapped files &gt; Add a new Config 添加配置文件</li> <li>Type 选择 Custom file 点击 next</li> <li>在 k8s master 节点执行 cat ~/.kube/config 查看文件内容，并将所有内容复制</li> <li>将复制的内容贴到 Config file 的 Content 中后点击 Submit 保存并提交</li> <li>复制保存后文件 id 到 Jenkinsfile 中的 <code>KUBECONFIG_CREDENTIAL_ID</code> <em>处</em></li></ol> <p><strong>SonarQube 凭证</strong></p> <ol><li>进入 SonarQube 系统，点击右上角用户头像 &gt; 我的账号 进入设置页面</li> <li>点击 安全 &gt; 填写令牌名称 &gt; 点击生成按钮生成 token &gt; 复制生成后的 token</li> <li>进入 jenkins 添加凭证管理页面，添加 Secret Text 类型的凭证，将 token 贴入其中</li> <li>保证凭证 id 与 Jenkinsfile 文件中的 <code>SONAR_CREDENTIAL_ID</code> <em>一致</em></li></ol> <blockquote><p>添加 SonarQube Webhook</p></blockquote> <ol><li><p>进入 SonarQube 管理页面，点击顶部菜单栏的配置 &gt; 配置(小三角) &gt; 网络调用</p></li> <li><p>点击右侧创建按钮创建新的 Webhook，并填写名称与地址</p> <p>名称：jenkins
地址：<code>http://jenkins访问ip:端口/sonarqube-webhook/</code></p></li></ol> <blockquote><p>项目构建</p></blockquote> <p>方式一：在 Jenkins 管理后台，进入项目中点击立即构建进行项目构建。</p> <p>方式二：在开发工具中修改代码，并将代码提交到远程仓库自动触发构建。</p> <h3 id="jenkinsfile"><a href="#jenkinsfile" class="header-anchor">#</a> Jenkinsfile</h3> <p>一般我们都会在项目根目录创建一个 Jenkinsfile 文件和 Dockerfile 文件，让 Jenkins 按照 Jenkinsfile 的规则去触发 CICD，让 Docker 按照 Dockerfile 文件去构建镜像。</p> <p>这里给一个模板：</p> <div class="language-groovy line-numbers-mode"><pre class="language-groovy"><code>pipeline <span class="token punctuation">{</span>
    agent <span class="token punctuation">{</span>
        kubernetes <span class="token punctuation">{</span>
            label <span class="token interpolation-string"><span class="token string">&quot;maven&quot;</span></span> <span class="token comment">// 指定有 maven 标签的节点，Dashboard -&gt; 系统管理 -&gt; 节点列表，匹配有 maven 标签的节点</span>
        <span class="token punctuation">}</span>
    <span class="token punctuation">}</span>

    environment <span class="token punctuation">{</span>
        REGISTRY <span class="token operator">=</span> <span class="token interpolation-string"><span class="token string">&quot;192.168.199.31:8040&quot;</span></span> <span class="token comment">// Harbor 仓库</span>
        DOCKER_CREDENTIAL_ID <span class="token operator">=</span> <span class="token interpolation-string"><span class="token string">&quot;harbor-username-password&quot;</span></span> <span class="token comment">// Jenkins 全局凭据 ID：Harbor 登录的用户名密码</span>
        DOCKERHUB_NAMESPACE <span class="token operator">=</span> <span class="token interpolation-string"><span class="token string">&quot;library&quot;</span></span> <span class="token comment">// Harbar 仓库</span>
        GIT_REPO_URL <span class="token operator">=</span> <span class="token interpolation-string"><span class="token string">&quot;192.168.199.31:8050&quot;</span></span> <span class="token comment">// Gitlab 仓库地址</span>
        GIT_CREDENTIAL_ID <span class="token operator">=</span> <span class="token interpolation-string"><span class="token string">&quot;gitlab-username-password&quot;</span></span> <span class="token comment">// Jenkins 全局凭据 ID：Gitlab 登录的用户名密码</span>
        GIT_ACCOUNT <span class="token operator">=</span> <span class="token interpolation-string"><span class="token string">&quot;root&quot;</span></span> <span class="token comment">// Gitlab 用户名</span>
        APP_NAME <span class="token operator">=</span> <span class="token interpolation-string"><span class="token string">&quot;test-jenkins&quot;</span></span> <span class="token comment">// 部署的项目名</span>
        SONAR_SERVER_URL <span class="token operator">=</span> <span class="token interpolation-string"><span class="token string">&quot;192.168.199.28:30112&quot;</span></span> <span class="token comment">// sonarqube 质量检测地址</span>
        SONAR_CREDENTIAL_ID <span class="token operator">=</span> <span class="token interpolation-string"><span class="token string">&quot;sonarqube-token&quot;</span></span> <span class="token comment">// Jenkins 全局凭据 ID：sonarqube 的认证 token</span>
        KUBE_CONFIG_CREDENTIAL_ID <span class="token operator">=</span> <span class="token interpolation-string"><span class="token string">&quot;f1fd50fc-f462-42b8-8aa5-8055fdca05dd&quot;</span></span>
    <span class="token punctuation">}</span>
    <span class="token comment">// 可选的参数构建</span>
    parameters <span class="token punctuation">{</span>
        gitParameter name<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;BRANCH_NAME&quot;</span></span><span class="token punctuation">,</span> branch<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;&quot;</span></span><span class="token punctuation">,</span> branchFilter<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;origin/(.*)&quot;</span></span><span class="token punctuation">,</span> defaultValue<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;master&quot;</span></span><span class="token punctuation">,</span> description<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;请选择要发布的分支&quot;</span></span><span class="token punctuation">,</span> quickFilterEnabled<span class="token punctuation">:</span> <span class="token boolean">false</span><span class="token punctuation">,</span> selectedValue<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;DEFAULT&quot;</span></span><span class="token punctuation">,</span> sortMode<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;NONE&quot;</span></span><span class="token punctuation">,</span> tagFilter<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;*&quot;</span></span><span class="token punctuation">,</span> type<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;PT_BRANCH&quot;</span></span>
        <span class="token function">choice</span><span class="token punctuation">(</span>name<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;NAMESPACE&quot;</span></span><span class="token punctuation">,</span> choices<span class="token punctuation">:</span> <span class="token punctuation">[</span><span class="token interpolation-string"><span class="token string">&quot;kube-devops&quot;</span></span><span class="token punctuation">]</span><span class="token punctuation">,</span> description<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;命名空间&quot;</span></span><span class="token punctuation">)</span>
        <span class="token function">string</span><span class="token punctuation">(</span>name<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;TAG_NAME&quot;</span></span><span class="token punctuation">,</span> defaultValue<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;snapshot&quot;</span></span><span class="token punctuation">,</span> description<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;标签名称，必须以 v 开头，例如：v1、v1.0.0&quot;</span></span><span class="token punctuation">)</span>
    <span class="token punctuation">}</span>

    stages <span class="token punctuation">{</span>

        <span class="token function">stage</span><span class="token punctuation">(</span><span class="token interpolation-string"><span class="token string">&quot;checkout branch&quot;</span></span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
            steps <span class="token punctuation">{</span>
                checkout <span class="token function">scmGit</span><span class="token punctuation">(</span>branches<span class="token punctuation">:</span> <span class="token punctuation">[</span><span class="token punctuation">[</span>name<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;</span><span class="token interpolation"><span class="token interpolation-punctuation punctuation">$</span><span class="token expression">BRANCH_NAME</span></span><span class="token string">&quot;</span></span><span class="token punctuation">]</span><span class="token punctuation">]</span><span class="token punctuation">,</span> extensions<span class="token punctuation">:</span> <span class="token punctuation">[</span><span class="token punctuation">]</span><span class="token punctuation">,</span> userRemoteConfigs<span class="token punctuation">:</span> <span class="token punctuation">[</span><span class="token punctuation">[</span>credentialsId<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;</span><span class="token interpolation"><span class="token interpolation-punctuation punctuation">$</span><span class="token expression">GIT_CREDENTIAL_ID</span></span><span class="token string">&quot;</span></span><span class="token punctuation">,</span> url<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;http://</span><span class="token interpolation"><span class="token interpolation-punctuation punctuation">$</span><span class="token expression">GIT_REPO_URL</span></span><span class="token string">/</span><span class="token interpolation"><span class="token interpolation-punctuation punctuation">$</span><span class="token expression">GIT_ACCOUNT</span></span><span class="token string">/test-jenkins.git&quot;</span></span><span class="token punctuation">]</span><span class="token punctuation">]</span><span class="token punctuation">)</span>
            <span class="token punctuation">}</span>
        <span class="token punctuation">}</span>

        <span class="token function">stage</span><span class="token punctuation">(</span><span class="token interpolation-string"><span class="token string">&quot;unit test&quot;</span></span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
            steps <span class="token punctuation">{</span>
                sh <span class="token interpolation-string"><span class="token string">&quot;mvn clean test&quot;</span></span> <span class="token comment">// Maven 单元测试</span>
            <span class="token punctuation">}</span>
        <span class="token punctuation">}</span>
        <span class="token comment">// 代码质量检查</span>
        <span class="token function">stage</span><span class="token punctuation">(</span><span class="token interpolation-string"><span class="token string">&quot;sonarqube analysis&quot;</span></span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
            agent none
            steps <span class="token punctuation">{</span>
                <span class="token comment">// sonarqube 认证，连接服务端进行代码质量检查</span>
                <span class="token function">withCredentials</span><span class="token punctuation">(</span><span class="token punctuation">[</span><span class="token function">string</span><span class="token punctuation">(</span>credentialsId<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;</span><span class="token interpolation"><span class="token interpolation-punctuation punctuation">$</span><span class="token expression">SONAR_CREDENTIAL_ID</span></span><span class="token string">&quot;</span></span><span class="token punctuation">,</span> variable<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;SONAR_TOKEN&quot;</span></span><span class="token punctuation">)</span><span class="token punctuation">]</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
                    <span class="token function">withSonarQubeEnv</span><span class="token punctuation">(</span><span class="token interpolation-string"><span class="token string">&quot;sonarqube&quot;</span></span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
                        sh <span class="token string">'''
                                mvn sonar:sonar -Dsonar.projectKey=$APP_NAME
                                echo &quot;mvn sonar:sonar -Dsonar.projectKey=$APP_NAME&quot;
                           '''</span>
                    <span class="token punctuation">}</span>
                    <span class="token comment">// 代码质量检测超时为 5 分组</span>
                    <span class="token function">timeout</span><span class="token punctuation">(</span>time<span class="token punctuation">:</span> <span class="token number">5</span><span class="token punctuation">,</span> unit<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;MINUTES&quot;</span></span><span class="token punctuation">,</span> activity<span class="token punctuation">:</span> <span class="token boolean">true</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
                        waitForQualityGate <span class="token interpolation-string"><span class="token string">&quot;true&quot;</span></span>
                    <span class="token punctuation">}</span>

                <span class="token punctuation">}</span>

            <span class="token punctuation">}</span>
        <span class="token punctuation">}</span>
        <span class="token comment">// 构建进行，推到 Harbor，版本跟随 Jenkins 的构建次数变化</span>
        <span class="token function">stage</span><span class="token punctuation">(</span><span class="token interpolation-string"><span class="token string">&quot;build &amp; push&quot;</span></span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
            steps <span class="token punctuation">{</span>
                sh <span class="token interpolation-string"><span class="token string">&quot;mvn clean package -DskipTests&quot;</span></span> <span class="token comment">// 跳过单元测试，上面已经单元测试了</span>
                <span class="token comment">// 构建镜像，tag 为 Jenkins 内置的 BUILD_NUMBER，即 Jenkins 的构建次数</span>
                sh <span class="token interpolation-string"><span class="token string">&quot;docker build -f Dockerfile -t </span><span class="token interpolation"><span class="token interpolation-punctuation punctuation">$</span><span class="token expression">REGISTRY</span></span><span class="token string">/</span><span class="token interpolation"><span class="token interpolation-punctuation punctuation">$</span><span class="token expression">DOCKERHUB_NAMESPACE</span></span><span class="token string">/</span><span class="token interpolation"><span class="token interpolation-punctuation punctuation">$</span><span class="token expression">APP_NAME</span></span><span class="token string">:SNAPSHOT-</span><span class="token interpolation"><span class="token interpolation-punctuation punctuation">$</span><span class="token expression">BUILD_NUMBER</span></span><span class="token string"> .&quot;</span></span>
                <span class="token comment">// 认证 Harbor，推到 Harbor</span>
                <span class="token function">withCredentials</span><span class="token punctuation">(</span><span class="token punctuation">[</span><span class="token function">usernamePassword</span><span class="token punctuation">(</span>credentialsId<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;</span><span class="token interpolation"><span class="token interpolation-punctuation punctuation">$</span><span class="token expression">DOCKER_CREDENTIAL_ID</span></span><span class="token string">&quot;</span></span><span class="token punctuation">,</span> usernameVariable<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;DOCKER_USERNAME&quot;</span></span><span class="token punctuation">,</span> passwordVariable<span class="token punctuation">:</span> <span class="token interpolation-string"><span class="token string">&quot;DOCKER_PASSWORD&quot;</span></span><span class="token punctuation">)</span><span class="token punctuation">]</span><span class="token punctuation">)</span> <span class="token punctuation">{</span>
                    sh <span class="token string">'''
                            echo &quot;$DOCKER_PASSWORD&quot; | docker login $REGISTRY -u &quot;$DOCKER_USERNAME&quot; --password-stdin
                            docker push $REGISTRY/$DOCKERHUB_NAMESPACE/$APP_NAME:SNAPSHOT-$BUILD_NUMBER
                       '''</span>
                <span class="token punctuation">}</span>
            <span class="token punctuation">}</span>
        <span class="token punctuation">}</span>
        <span class="token comment">// 推到 Harbor，版本是 latest</span>
