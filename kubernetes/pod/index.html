i><a href="#prestop-的应用">PreStop 的应用</a></li></ul></li><li><a href="#terminating-强制删除">Terminating 强制删除</a></li></ul></div><p></p> <h2 id="pod-配置文件"><a href="#pod-配置文件" class="header-anchor">#</a> Pod 配置文件</h2> <p>创建一个 Pod，我们可以通过 yaml 文件来创建，如我们创建了一个文件：nginx-demo.yml</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">apiVersion</span><span class="token punctuation">:</span> v1 <span class="token comment"># api 文档版本</span>
<span class="token key atrule">kind</span><span class="token punctuation">:</span> Pod  <span class="token comment"># 资源对象类型，也可以配置为像 Deployment、StatefulSet 这一类的对象</span>
<span class="token key atrule">metadata</span><span class="token punctuation">:</span> <span class="token comment"># Pod 相关的元数据，用于描述 Pod 的数据</span>
  <span class="token key atrule">name</span><span class="token punctuation">:</span> nginx<span class="token punctuation">-</span>demo <span class="token comment"># Pod 的名称</span>
  <span class="token key atrule">labels</span><span class="token punctuation">:</span> <span class="token comment"># 定义 Pod 的标签</span>
    <span class="token key atrule">type</span><span class="token punctuation">:</span> app <span class="token comment"># 自定义 label 标签，名字为 type，值为 app</span>
    <span class="token key atrule">test</span><span class="token punctuation">:</span> 1.0.0 <span class="token comment"># 自定义 label 标签，描述 Pod 版本号</span>
  <span class="token key atrule">namespace</span><span class="token punctuation">:</span> <span class="token string">'default'</span> <span class="token comment"># 命名空间的配置</span>
<span class="token key atrule">spec</span><span class="token punctuation">:</span> <span class="token comment"># 期望 Pod 按照这里面的描述进行创建</span>
  <span class="token key atrule">containers</span><span class="token punctuation">:</span> <span class="token comment"># 对于 Pod 中的容器描述</span>
  <span class="token punctuation">-</span> <span class="token key atrule">name</span><span class="token punctuation">:</span> nginx <span class="token comment"># 容器的名称</span>
    <span class="token key atrule">image</span><span class="token punctuation">:</span> nginx<span class="token punctuation">:</span>1.7.9 <span class="token comment"># 指定容器的镜像</span>
    <span class="token key atrule">imagePullPolicy</span><span class="token punctuation">:</span> IfNotPresent <span class="token comment"># 镜像拉取策略，指定如果本地有就用本地的，如果没有就拉取远程的</span>
    <span class="token key atrule">startupProbe</span><span class="token punctuation">:</span>
      <span class="token key atrule">httpGet</span><span class="token punctuation">:</span>
        <span class="token key atrule">path</span><span class="token punctuation">:</span> /api/startup
        <span class="token key atrule">port</span><span class="token punctuation">:</span> <span class="token number">80</span>
    <span class="token key atrule">livenessProbe</span><span class="token punctuation">:</span>
      <span class="token key atrule">failureThreshold</span><span class="token punctuation">:</span> <span class="token number">5</span>
      <span class="token key atrule">httpGet</span><span class="token punctuation">:</span>
        <span class="token key atrule">path</span><span class="token punctuation">:</span> /health
        <span class="token key atrule">port</span><span class="token punctuation">:</span> <span class="token number">8080</span>
        <span class="token key atrule">scheme</span><span class="token punctuation">:</span> HTTP
    <span class="token key atrule">readinessProbe</span><span class="token punctuation">:</span>
      <span class="token key atrule">failureThreshold</span><span class="token punctuation">:</span> <span class="token number">3</span> <span class="token comment"># 错误次数</span>
      <span class="token key atrule">httpGet</span><span class="token punctuation">:</span>
        <span class="token key atrule">path</span><span class="token punctuation">:</span> /ready
        <span class="token key atrule">port</span><span class="token punctuation">:</span> <span class="token number">8181</span>
        <span class="token key atrule">scheme</span><span class="token punctuation">:</span> HTTP
  <span class="token key atrule">periodSeconds</span><span class="token punctuation">:</span> <span class="token number">10</span> <span class="token comment"># 间隔时间</span>
  <span class="token key atrule">successThreshold</span><span class="token punctuation">:</span> <span class="token number">1</span>
  <span class="token key atrule">timeoutSeconds</span><span class="token punctuation">:</span> <span class="token number">1</span>
  <span class="token key atrule">initialDelaySeconds</span><span class="token punctuation">:</span> <span class="token number">60</span>
  <span class="token key atrule">periodSeconds</span><span class="token punctuation">:</span> <span class="token number">10</span>
  <span class="token key atrule">successThreshold</span><span class="token punctuation">:</span> <span class="token number">1</span>
  <span class="token key atrule">timeoutSeconds</span><span class="token punctuation">:</span> <span class="token number">5</span>
    <span class="token key atrule">command</span><span class="token punctuation">:</span> <span class="token comment"># 指定容器启动时执行的命令</span>
    <span class="token punctuation">-</span> nginx
    <span class="token punctuation">-</span> <span class="token punctuation">-</span>g
    <span class="token punctuation">-</span> <span class="token string">'daemon off;'</span> <span class="token comment"># nginx -g 'daemon off;'</span>
    <span class="token key atrule">workingDir</span><span class="token punctuation">:</span> /usr/share/nginx/html <span class="token comment"># 定义容器启动后的工作目录</span>
    <span class="token key atrule">ports</span><span class="token punctuation">:</span>
    <span class="token punctuation">-</span> <span class="token key atrule">name</span><span class="token punctuation">:</span> http <span class="token comment"># 端口名称</span>
      <span class="token key atrule">containerPort</span><span class="token punctuation">:</span> <span class="token number">80</span> <span class="token comment"># 描述容器内要暴露什么端口</span>
      <span class="token key atrule">protocol</span><span class="token punctuation">:</span> TCP <span class="token comment"># 描述该端口是基于哪种协议通信的</span>
    <span class="token punctuation">-</span> <span class="token key atrule">env</span><span class="token punctuation">:</span> <span class="token comment"># 环境变量</span>
      <span class="token key atrule">name</span><span class="token punctuation">:</span> JVM_OPTS <span class="token comment"># 环境变量名称</span>
      <span class="token key atrule">value</span><span class="token punctuation">:</span> <span class="token string">'-Xms128m -Xmx128m'</span> <span class="token comment"># 环境变量的值</span>
    <span class="token key atrule">reousrces</span><span class="token punctuation">:</span>
      <span class="token key atrule">requests</span><span class="token punctuation">:</span> <span class="token comment"># 最少需要多少资源</span>
        <span class="token key atrule">cpu</span><span class="token punctuation">:</span> 100m <span class="token comment"># 限制 cpu 最少使用 0.1 个核心</span>
        <span class="token key atrule">memory</span><span class="token punctuation">:</span> 128Mi <span class="token comment"># 限制内存最少使用 128兆</span>
      <span class="token key atrule">limits</span><span class="token punctuation">:</span> <span class="token comment"># 最多可以用多少资源</span>
        <span class="token key atrule">cpu</span><span class="token punctuation">:</span> 200m <span class="token comment"># 限制 cpu 最多使用 0.2 个核心</span>
        <span class="token key atrule">memory</span><span class="token punctuation">:</span> 256Mi <span class="token comment"># 限制 最多使用 256兆</span>
  <span class="token key atrule">restartPolicy</span><span class="token punctuation">:</span> OnFailure <span class="token comment"># 重启策略，只有失败的情况才会重启</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br><span class="line-number">27</span><br><span class="line-number">28</span><br><span class="line-number">29</span><br><span class="line-number">30</span><br><span class="line-number">31</span><br><span class="line-number">32</span><br><span class="line-number">33</span><br><span class="line-number">34</span><br><span class="line-number">35</span><br><span class="line-number">36</span><br><span class="line-number">37</span><br><span class="line-number">38</span><br><span class="line-number">39</span><br><span class="line-number">40</span><br><span class="line-number">41</span><br><span class="line-number">42</span><br><span class="line-number">43</span><br><span class="line-number">44</span><br><span class="line-number">45</span><br><span class="line-number">46</span><br><span class="line-number">47</span><br><span class="line-number">48</span><br><span class="line-number">49</span><br><span class="line-number">50</span><br><span class="line-number">51</span><br><span class="line-number">52</span><br><span class="line-number">53</span><br><span class="line-number">54</span><br><span class="line-number">55</span><br><span class="line-number">56</span><br></div></div><p>然后执行命令：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>kubectl create <span class="token parameter variable">-f</span> nginx-demo.yml
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>然后就创建了一个 pod</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>kubectl get po
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h2 id="探针"><a href="#探针" class="header-anchor">#</a> 探针</h2> <p>容器内应用的监测机制，根据不同的探针来判断容器应用当前的状态。</p> <h3 id="类型"><a href="#类型" class="header-anchor">#</a> 类型</h3> <h4 id="startupprobe"><a href="#startupprobe" class="header-anchor">#</a> StartupProbe</h4> <p>k8s 1.16 版本新增的探针，用于判断应用程序是否已经启动了。</p> <p>当配置了 startupProbe 后，会先禁用其他探针，直到 startupProbe 成功后，其他探针才会继续。</p> <p>作用：由于有时候不能准确预估应用一定是多长时间启动成功，因此配置另外两种方式不方便配置初始化时长来检测，而配置了 statupProbe 后，只有在应用启动成功了，才会执行另外两种探针，可以更加方便的结合使用另外两种探针使用。</p> <p>可在 yaml 文件的 <code>spec.containers</code> 下配置：</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">startupProbe</span><span class="token punctuation">:</span>
  <span class="token key atrule">httpGet</span><span class="token punctuation">:</span>
    <span class="token key atrule">path</span><span class="token punctuation">:</span> /api/startup
    <span class="token key atrule">port</span><span class="token punctuation">:</span> <span class="token number">80</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><h4 id="livenessprobe"><a href="#livenessprobe" class="header-anchor">#</a> LivenessProbe</h4> <p>用于探测容器中的应用是否运行，如果探测失败，kubelet 会根据配置的重启策略进行重启，若没有配置，默认就认为容器启动成功，不会执行重启策略。</p> <p>可在 yaml 文件的 <code>spec.containers</code> 下配置：</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">livenessProbe</span><span class="token punctuation">:</span>
  <span class="token key atrule">failureThreshold</span><span class="token punctuation">:</span> <span class="token number">5</span>
  <span class="token key atrule">httpGet</span><span class="token punctuation">:</span>
    <span class="token key atrule">path</span><span class="token punctuation">:</span> /health
    <span class="token key atrule">port</span><span class="token punctuation">:</span> <span class="token number">8080</span>
    <span class="token key atrule">scheme</span><span class="token punctuation">:</span> HTTP
  <span class="token key atrule">initialDelaySeconds</span><span class="token punctuation">:</span> <span class="token number">60</span>
  <span class="token key atrule">periodSeconds</span><span class="token punctuation">:</span> <span class="token number">10</span>
  <span class="token key atrule">successThreshold</span><span class="token punctuation">:</span> <span class="token number">1</span>
  <span class="token key atrule">timeoutSeconds</span><span class="token punctuation">:</span> <span class="token number">5</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br></div></div><h4 id="readinessprobe"><a href="#readinessprobe" class="header-anchor">#</a> ReadinessProbe</h4> <p>用于探测容器内的程序是否健康，它的返回值如果返回 success，那么就认为该容器已经完全启动，并且该容器是可以接收外部流量的。</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">readinessProbe</span><span class="token punctuation">:</span>
  <span class="token key atrule">failureThreshold</span><span class="token punctuation">:</span> <span class="token number">3</span> <span class="token comment"># 错误次数</span>
  <span class="token key atrule">httpGet</span><span class="token punctuation">:</span>
    <span class="token key atrule">path</span><span class="token punctuation">:</span> /ready
    <span class="token key atrule">port</span><span class="token punctuation">:</span> <span class="token number">8181</span>
    <span class="token key atrule">scheme</span><span class="token punctuation">:</span> HTTP
  <span class="token key atrule">periodSeconds</span><span class="token punctuation">:</span> <span class="token number">10</span> <span class="token comment"># 间隔时间</span>
  <span class="token key atrule">successThreshold</span><span class="token punctuation">:</span> <span class="token number">1</span>
  <span class="token key atrule">timeoutSeconds</span><span class="token punctuation">:</span> <span class="token number">1</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br></div></div><p>这三种探针的配置信息基本一样，只是名字不一样</p> <h3 id="探测方式"><a href="#探测方式" class="header-anchor">#</a> 探测方式</h3> <p>上面介绍的三个探针的 yaml 配置就用到了探测方式：</p> <h4 id="execaction"><a href="#execaction" class="header-anchor">#</a> ExecAction</h4> <p>在容器内部执行一个命令，如果返回值为 0，则任务容器时健康的。</p> <p>如</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">livenessProbe</span><span class="token punctuation">:</span>
  <span class="token key atrule">exec</span><span class="token punctuation">:</span>
    <span class="token key atrule">command</span><span class="token punctuation">:</span>
      <span class="token punctuation">-</span> cat
      <span class="token punctuation">-</span> /health
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><h4 id="tcpsocketaction"><a href="#tcpsocketaction" class="header-anchor">#</a> TCPSocketAction</h4> <p>通过 tcp 连接监测容器内端口是否开放，如果开放则证明该容器健康。</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">livenessProbe</span><span class="token punctuation">:</span>
  <span class="token key atrule">tcpSocket</span><span class="token punctuation">:</span>
    <span class="token key atrule">port</span><span class="token punctuation">:</span> <span class="token number">80</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><h4 id="httpgetaction"><a href="#httpgetaction" class="header-anchor">#</a> HTTPGetAction</h4> <p>生产环境用的较多的方式，发送 HTTP 请求到容器内的应用程序，如果接口返回的状态码在 200~400 之间，则认为容器健康。</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">livenessProbe</span><span class="token punctuation">:</span>
  <span class="token key atrule">failureThreshold</span><span class="token punctuation">:</span> <span class="token number">5</span>
  <span class="token key atrule">httpGet</span><span class="token punctuation">:</span>
    <span class="token key atrule">path</span><span class="token punctuation">:</span> /health
    <span class="token key atrule">port</span><span class="token punctuation">:</span> <span class="token number">8080</span>
    <span class="token key atrule">scheme</span><span class="token punctuation">:</span> HTTP
    <span class="token key atrule">httpHeaders</span><span class="token punctuation">:</span>
      <span class="token punctuation">-</span> <span class="token key atrule">name</span><span class="token punctuation">:</span> xxx
        <span class="token key atrule">value</span><span class="token punctuation">:</span> xxx
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br></div></div><h3 id="参数配置"><a href="#参数配置" class="header-anchor">#</a> 参数配置</h3> <p>下面的配置可以作用在任意一个探针上，具体看上面的 Pod 配置文件。</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">initialDelaySeconds</span><span class="token punctuation">:</span> <span class="token number">60</span> <span class="token comment"># 初始化时间</span>
<span class="token key atrule">timeoutSeconds</span><span class="token punctuation">:</span> <span class="token number">2</span> <span class="token comment"># 超时时间</span>
<span class="token key atrule">periodSeconds</span><span class="token punctuation">:</span> <span class="token number">5</span> <span class="token comment"># 监测间隔时间</span>
<span class="token key atrule">successThreshold</span><span class="token punctuation">:</span> <span class="token number">1</span> <span class="token comment"># 检查 1 次成功就表示成功</span>
<span class="token key atrule">failureThreshold</span><span class="token punctuation">:</span> <span class="token number">2</span> <span class="token comment"># 监测失败 2 次就表示失败</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><h2 id="生命周期"><a href="#生命周期" class="header-anchor">#</a> 生命周期</h2> <p>Pod 完整的运行分为如图阶段：</p> <p>容器环境初始化的初始化阶段，这个阶段会初始化容器需要的信息，我们可以在这个阶段做一些自己的动作，当初始化阶段结束后，则开始真正运行起来。</p> <p>在容器刚运行成功后，会执行 <code>postStart</code> 钩子函数，这里我们做一些操作，类似于 Vue3 的 OnMounted，但是这个钩子不一定是容器启动后第一个执行的钩子， 因为如图的 <code>command</code> 命令也在这执行，<code>command</code> 命令可能在 <code>postStart</code> 前执行，可能两个一起执行，也可能在 <code>postStart</code> 后执行，所以不稳定。</p> <p>在容器运行的过程，就会有上面介绍的三个探针进行监控。</p> <p>当容器销毁前，会执行 preStop 钩子函数，我们可以在 preStop 做一些「善后工作」，如下介绍。</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Spring%20Boot/20230618231032.png" alt="image-20230618231031887"></p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">lifecycle</span><span class="token punctuation">:</span>
  <span class="token key atrule">postStart</span><span class="token punctuation">:</span> <span class="token comment"># 容创建完成后执行的动作，不能保证该操作一定在容器的 command 之前执行，一般不使用</span>
    <span class="token key atrule">exec</span><span class="token punctuation">:</span> <span class="token comment"># 可以是 exec / httpGet / tcpSocket</span>
      <span class="token key atrule">command</span><span class="token punctuation">:</span>
        <span class="token punctuation">-</span> sh
        <span class="token punctuation">-</span> <span class="token punctuation">-</span>c
        <span class="token punctuation">-</span> <span class="token string">'mkdir /data'</span>
  <span class="token key atrule">preStop</span><span class="token punctuation">:</span> <span class="token comment"># 在容器停止前执行的动作</span>
    <span class="token key atrule">httpGet</span><span class="token punctuation">:</span> <span class="token comment"># 发送一个 http 请求</span>
      <span class="token key atrule">path</span><span class="token punctuation">:</span> /
      <span class="token key atrule">port</span><span class="token punctuation">:</span> <span class="token number">80</span>
    <span class="token key atrule">exec</span><span class="token punctuation">:</span> <span class="token comment"># 执行一个命令</span>
      <span class="token key atrule">command</span><span class="token punctuation">:</span>
        <span class="token punctuation">-</span> sh
        <span class="token punctuation">-</span> <span class="token punctuation">-</span>c
        <span class="token punctuation">-</span> sleep 9
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br></div></div><p>钩子函数里的使用和探测方式一样。</p> <h3 id="pod-退出流程"><a href="#pod-退出流程" class="header-anchor">#</a> Pod 退出流程</h3> <p>当 Pod 被删除时：</p> <ol><li><p>Endpoint 先删除 pod 的 ip 地址</p></li> <li><p>然后 Pod 变成 Terminating 状态：Terminating 状态会给 Pod 一个宽限期，让 Pod 去执行一些清理或销毁操作</p> <p>设置宽限期配置参数（默认 30 秒）：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># 作用与 pod 中的所有容器</span>
terminationGracePeriodSeconds: <span class="token number">40</span> <span class="token comment"># 30 秒才真正销毁 Pod</span>
containers:
  - xxx
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div></li> <li><p>最后执行 preStop 的指令</p></li></ol> <h3 id="prestop-的应用"><a href="#prestop-的应用" class="header-anchor">#</a> PreStop 的应用</h3> <p>如果应用销毁操作耗时需要比较长，可以在 preStop 按照如下方式进行配置：</p> <div class="language-yml line-numbers-mode"><pre class="language-yml"><code><span class="token key atrule">preStop</span><span class="token punctuation">:</span>
  <span class="token key atrule">exec</span><span class="token punctuation">:</span>
    <span class="token key atrule">command</span><span class="token punctuation">:</span>
      <span class="token punctuation">-</span> sh
      <span class="token punctuation">-</span> <span class="token punctuation">-</span>c
      <span class="token punctuation">-</span> <span class="token string">'sleep 20; kill pgrep java'</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><p>但是需要注意，由于 k8s 默认给 pod 的停止宽限时间为 30s，如果我们停止操作会超过 30s 时，不要光设置 sleep 50，还要将 <code>terminationGracePeriodSeconds: 30</code> 也更新成更长的时间，否则 k8s 最多只会在这个时间的基础上再宽限几秒，不会真正等待 50s</p> <p>应用有：注册中心下线、数据清理、数据销毁。</p> <h2 id="terminating-强制删除"><a href="#terminating-强制删除" class="header-anchor">#</a> Terminating 强制删除</h2> <p>一键强制删除 k8s 集群中所有 Terminating 状态的 pod</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>kubectl get po --all-namespaces<span class="token operator">|</span><span class="token function">grep</span> Terminating<span class="token operator">|</span> <span class="token function">awk</span> <span class="token string">'{print $1&quot;\t&quot;$2}'</span><span class="token operator">|</span> <span class="token function">xargs</span> <span class="token parameter variable">-l</span> <span class="token function">bash</span> <span class="token parameter variable">-c</span> <span class="token string">'kubectl delete po $1 -n $0 --force --grace-period=0'</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Kele-Bingtang/Kele-Bingtang.github.io/edit/master/docs/40.工具/60.容器管理 - kubernetes/11.Kubernetes - 深入 Pod.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=Kubernetes" title="标签">#Kubernetes</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2023/10/23, 18:58:51</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/kubernetes/install/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">Kubernetes - 安装</div></a> <a href="/kubernetes/resource-scheduling/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">Kubernetes - 资源调度</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
