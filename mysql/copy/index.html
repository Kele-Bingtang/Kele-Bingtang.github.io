"><div class="articleInfo-wrap" data-v-06225672><div class="articleInfo" data-v-06225672><ul class="breadcrumbs" data-v-06225672><li data-v-06225672><a href="/" title="首页" class="iconfont icon-home router-link-active" data-v-06225672></a></li> <li data-v-06225672><a href="/categories/?category=%E6%95%B0%E6%8D%AE%E5%BA%93" title="分类" data-v-06225672>数据库</a></li><li data-v-06225672><a href="/categories/?category=%E5%85%B3%E7%B3%BB%E6%95%B0%E6%8D%AE%E5%BA%93%20-%20MySQL" title="分类" data-v-06225672>关系数据库 - MySQL</a></li></ul> <div class="info" data-v-06225672><div title="作者" class="author iconfont icon-touxiang" data-v-06225672><a href="https://www.youngkbt.cn" target="_blank" title="作者" class="beLink" data-v-06225672>Young Kbt </a></div> <div title="创建时间" class="date iconfont icon-riqi" data-v-06225672><a href="javascript:;" data-v-06225672>2021-10-24</a></div> <!----></div></div></div> <!----> <div class="content-wrapper"><div class="right-menu-wrapper"><div class="right-menu-margin"><div class="right-menu-title">目录</div> <div class="right-menu-content"></div></div></div> <h1><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAAAAXNSR0IArs4c6QAABH1JREFUSA3tVl1oHFUUPmdmd2ltklqbpJDiNnXFmgbFktho7YMPNiJSSZM0+CAYSkUELVhM6YuwIPpgoOKDqOBDC0XE2CQoNtQXBUFTTcCi+Wlh1V2TQExsUzcltd3M9Tt3ZjZzZ2fT+OJTL8yeM+eee757fmeJbq//KQL8X3DUSFOcfr7cRsRtxNQMWueeVzOkaITIGqQHNg5y8+jNW9ldM7A6nTpAjuolUikAwq7CE3WcM2RRDz+XGVgN3FptU/aUSlvq9Pa3iZ1+sgAqJyyAFqkipd9dqiwHF3P65YycLWc/6sqGrvoEoIp6DOFaX5h6+dnfjkWprwqsPk0dUGq5vySwDImC10KxFHgGL1SWoc92O3eVht09qdXNH11I2SsTsJYqMWzihqGMi+A+Garf3BAuuLI5oGlULyNfyB/HYNujwktOfRrMr5t77NmevqaUopx0grnKAyvVpmwUDB4x6FPXuGvYLTDwWsejwgtgkYKPqRJg8SV6xaiZ3ZTppGneS4yfH5/66fZSDHv+QZci/+h5c5UHtpy67JUqGppM0sh0Nc1dW6/N1W5Yoqat8/TU/VnadmdeW2PLLSyh0cvxBs3KbqTmwYPpxN4do/mzE8nEpvX/UMu2Wbp74zUAK5q6WkHns7V0eWkdPbPzd3rxkTGybadYySumVzhcaJFbs5UrEkQ/+CK8gF5dnh/6ciIZ73gwQ927L1IitoxKLXYP3SjYdOrHHfTZhRRlFyrorafPk20B3HPD1y2G3qKZME5Jcf3t/HUC13/8tSd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">MySQL - 主从复制<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p></p><div class="table-of-contents"><ul><li><a href="#复制概述">复制概述</a></li><li><a href="#复制原理">复制原理</a></li><li><a href="#复制优势">复制优势</a></li><li><a href="#搭建步骤">搭建步骤</a><ul><li><a href="#master">Master</a></li><li><a href="#slave">Slave</a></li><li><a href="#验证同步操作">验证同步操作</a></li></ul></li><li><a href="#docker-mysql8-搭建步骤">Docker+MySQL8 搭建步骤</a><ul><li><a href="#master">Master</a></li><li><a href="#slave">Slave</a></li><li><a href="#主主集群">主主集群</a></li><li><a href="#总结">总结</a></li></ul></li></ul></div><p></p> <h2 id="复制概述"><a href="#复制概述" class="header-anchor">#</a> 复制概述</h2> <p>复制是指将主数据库的 DDL 和 DML 操作通过二进制日志传到从库服务器中，然后在从库上对这些日志重新执行（也叫重做），从而使得从库和主库的数据保持同步。</p> <p>MySQL 支持一台主库同时向多台从库进行复制，从库同时也可以作为其他从服务器的主库，实现链状复制。</p> <h2 id="复制原理"><a href="#复制原理" class="header-anchor">#</a> 复制原理</h2> <p>MySQL 的主从复制原理如下：</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/MySQL/20211024153757.png" alt=""></p> <p>从上层来看，复制分成三步：</p> <ul><li><p>Master 主库在事务提交时，会把数据变更作为时间 Events 记录在二进制日志文件 Binlog 中</p></li> <li><p>主库推送二进制日志文件 Binlog 中的日志事件到从库的中继日志 Relay Log</p></li> <li><p>Slave 执行中继日志中的事件，将改变它自己的数据</p></li></ul> <h2 id="复制优势"><a href="#复制优势" class="header-anchor">#</a> 复制优势</h2> <p>MySQL 复制的有点主要包含以下三个方面：</p> <ul><li><p>主库出现问题，可以快速切换到从库提供服务</p></li> <li><p>可以在从库上执行查询操作，从主库中更新，实现读写分离，降低主库的访问压力</p></li> <li><p>可以在从库中执行备份，以避免备份期间影响主库的服务</p></li></ul> <h2 id="搭建步骤"><a href="#搭建步骤" class="header-anchor">#</a> 搭建步骤</h2> <h3 id="master"><a href="#master" class="header-anchor">#</a> Master</h3> <p>1）在 Master 的配置文件（/usr/my.cnf）中，配置如下内容：</p> <div class="language-properties line-numbers-mode"><pre class="language-properties"><code><span class="token comment"># MySQL 服务 ID，保证整个集群环境中唯一</span>
<span class="token key attr-name">server-id</span><span class="token punctuation">=</span><span class="token value attr-value">1</span>

<span class="token comment">#mysql binlog 日志的存储路径和文件名</span>
<span class="token key attr-name">log-bin</span><span class="token punctuation">=</span><span class="token value attr-value">/var/lib/mysql/mysqlbin</span>

<span class="token comment"># 错误日志，默认已经开启</span>
<span class="token comment">#log-err</span>

<span class="token comment"># MySQL 的安装目录</span>
<span class="token comment">#basedir</span>

<span class="token comment"># MySQL 的临时目录</span>
<span class="token comment">#tmpdir</span>

<span class="token comment"># MySQL 的数据存放目录</span>
<span class="token comment">#datadir</span>

<span class="token comment"># 是否只读，1 代表只读，0 代表读写</span>
<span class="token key attr-name">read-only</span><span class="token punctuation">=</span><span class="token value attr-value">0</span>

<span class="token comment"># 忽略的数据，指不需要同步的数据库</span>
<span class="token key attr-name">binlog-ignore-db</span><span class="token punctuation">=</span><span class="token value attr-value">mysql</span>

<span class="token comment"># 指定同步的数据库</span>
<span class="token comment">#binlog-do-db=db01</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br><span class="line-number">25</span><br><span class="line-number">26</span><br></div></div><p>2）执行完毕之后，需要重启 MySQL：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">service</span> mysql restart
<span class="token comment">#有的是这个</span>
<span class="token function">service</span> mysqld restart
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>3）创建同步数据的账户，并且进行授权操作：</p> <div class="language-sql line-numbers-mode"><pre class="language-sql"><code><span class="token keyword">grant</span> <span class="token keyword">replication</span> slave <span class="token keyword">on</span> <span class="token operator">*</span><span class="token punctuation">.</span><span class="token operator">*</span> <span class="token keyword">to</span> <span class="token string">'itcast'</span><span class="token variable">@'192.168.192.131'</span> identified <span class="token keyword">by</span> <span class="token string">'itcast'</span><span class="token punctuation">;</span>	

flush <span class="token keyword">privileges</span><span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>4）查看 Master 状态：</p> <div class="language-sql line-numbers-mode"><pre class="language-sql"><code><span class="token keyword">show</span> master <span class="token keyword">status</span><span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/MySQL/20211024153812.png" alt=""></p> <table><thead><tr><th>字段</th> <th>含义</th></tr></thead> <tbody><tr><td>File</td> <td>从哪个日志文件开始推送日志文件</td></tr> <tr><td>Position</td> <td>从哪个位置开始推送日志</td></tr> <tr><td>Binlog_Ignore_DB</td> <td>指定不需要同步的数据库</td></tr></tbody></table> <h3 id="slave"><a href="#slave" class="header-anchor">#</a> Slave</h3> <p>1）在 Slave 端配置文件中，配置如下内容：</p> <div class="language-properties line-numbers-mode"><pre class="language-properties"><code><span class="token comment"># MySQL 服务端 ID，唯一</span>
<span class="token key attr-name">server-id</span><span class="token punctuation">=</span><span class="token value attr-value">2</span>

<span class="token comment">#指定 binlog 日志</span>
<span class="token key attr-name">log-bin</span><span class="token punctuation">=</span><span class="token value attr-value">/var/lib/mysql/mysqlbin</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>2）执行完毕之后，需要重启 MySQL：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">service</span> mysql restart；
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>3）执行如下指令：</p> <div class="language-sql line-numbers-mode"><pre class="language-sql"><code>change master <span class="token keyword">to</span> master_host<span class="token operator">=</span> <span class="token string">'192.168.192.130'</span><span class="token punctuation">,</span> master_user<span class="token operator">=</span><span class="token string">'itcast'</span><span class="token punctuation">,</span> master_password<span class="token operator">=</span><span class="token string">'itcast'</span><span class="token punctuation">,</span> master_log_file<span class="token operator">=</span><span class="token string">'mysqlbin.000001'</span><span class="token punctuation">,</span> master_log_pos<span class="token operator">=</span><span class="token number">413</span><span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>指定当前从库对应的主库的 IP 地址，用户名，密码，从哪个日志文件开始的那个位置开始同步推送日志。</p> <p>4）开启同步操作</p> <div class="language-sql line-numbers-mode"><pre class="language-sql"><code><span class="token keyword">start</span> slave<span class="token punctuation">;</span>

<span class="token keyword">show</span> slave <span class="token keyword">status</span><span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/MySQL/20211024153821.png" alt=""></p> <p>5）停止同步操作</p> <div class="language-sql line-numbers-mode"><pre class="language-sql"><code>stop slave<span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h3 id="验证同步操作"><a href="#验证同步操作" class="header-anchor">#</a> 验证同步操作</h3> <p>1）在主库中创建数据库，创建表，并插入数据 ：</p> <div class="language-sql line-numbers-mode"><pre class="language-sql"><code><span class="token keyword">create</span> <span class="token keyword">database</span> db01<span class="token punctuation">;</span>

<span class="token keyword">user</span> db01<span class="token punctuation">;</span>

<span class="token keyword">create</span> <span class="token keyword">table</span> <span class="token keyword">user</span><span class="token punctuation">(</span>
	id <span class="token keyword">int</span><span class="token punctuation">(</span><span class="token number">11</span><span class="token punctuation">)</span> <span class="token operator">not</span> <span class="token boolean">null</span> <span class="token keyword">auto_increment</span><span class="token punctuation">,</span>
	name <span class="token keyword">varchar</span><span class="token punctuation">(</span><span class="token number">50</span><span class="token punctuation">)</span> <span class="token operator">not</span> <span class="token boolean">null</span><span class="token punctuation">,</span>
	sex <span class="token keyword">varchar</span><span class="token punctuation">(</span><span class="token number">1</span><span class="token punctuation">)</span><span class="token punctuation">,</span>
	<span class="token keyword">primary</span> <span class="token keyword">key</span> <span class="token punctuation">(</span>id<span class="token punctuation">)</span>
<span class="token punctuation">)</span><span class="token keyword">engine</span><span class="token operator">=</span><span class="token keyword">innodb</span> <span class="token keyword">default</span> <span class="token keyword">charset</span><span class="token operator">=</span>utf8<span class="token punctuation">;</span>

<span class="token keyword">insert</span> <span class="token keyword">into</span> <span class="token keyword">user</span><span class="token punctuation">(</span>id<span class="token punctuation">,</span>name<span class="token punctuation">,</span>sex<span class="token punctuation">)</span> <span class="token keyword">values</span><span class="token punctuation">(</span><span class="token boolean">null</span><span class="token punctuation">,</span><span class="token string">'Tom'</span><span class="token punctuation">,</span><span class="token string">'1'</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
<span class="token keyword">insert</span> <span class="token keyword">into</span> <span class="token keyword">user</span><span class="token punctuation">(</span>id<span class="token punctuation">,</span>name<span class="token punctuation">,</span>sex<span class="token punctuation">)</span> <span class="token keyword">values</span><span class="token punctuation">(</span><span class="token boolean">null</span><span class="token punctuation">,</span><span class="token string">'Trigger'</span><span class="token punctuation">,</span><span class="token string">'0'</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
<span class="token keyword">insert</span> <span class="token keyword">into</span> <span class="token keyword">user</span><span class="token punctuation">(</span>id<span class="token punctuation">,</span>name<span class="token punctuation">,</span>sex<span class="token punctuation">)</span> <span class="token keyword">values</span><span class="token punctuation">(</span><span class="token boolean">null</span><span class="token punctuation">,</span><span class="token string">'Dawn'</span><span class="token punctuation">,</span><span class="token string">'1'</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br></div></div><p>2）在从库中查询数据，进行验证：</p> <p>在从库中，可以查看到刚才创建的数据库：</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/MySQL/20211024153853.png" alt=""></p> <p>在该数据库中，查询 user 表中的数据：</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/MySQL/20211024153902.png" alt=""></p> <h2 id="docker-mysql8-搭建步骤"><a href="#docker-mysql8-搭建步骤" class="header-anchor">#</a> Docker+MySQL8 搭建步骤</h2> <p>这里模拟两个服务器存在自己的 MySQL，进行主从集群搭建。</p> <ul><li>服务器 A：172.169.1.1，作为主 master</li> <li>服务器 B：172.169.1.2，作为从 slave</li></ul> <p>首先分别在这两个服务器启动 MySQL 容器：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">docker</span> run <span class="token parameter variable">-d</span> <span class="token parameter variable">--name</span> mysql <span class="token punctuation">\</span>
<span class="token parameter variable">--restart</span> always <span class="token punctuation">\</span>
<span class="token parameter variable">-p</span> <span class="token number">3306</span>:3306 <span class="token punctuation">\</span>
<span class="token parameter variable">-e</span> <span class="token assign-left variable">MYSQL_ROOT_PASSWORD</span><span class="token operator">=</span>root1234 <span class="token punctuation">\</span>
<span class="token parameter variable">-v</span> /docker/mysql/data:/var/lib/mysql <span class="token punctuation">\</span>
<span class="token parameter variable">-v</span> /docker/mysql/conf:/etc/mysql/conf.d <span class="token punctuation">\</span>
<span class="token parameter variable">-v</span> /docker/mysql/log:/var/log <span class="token punctuation">\</span>
<span class="token parameter variable">--network</span> web --network-alias mysql <span class="token punctuation">\</span>
mysql:latest
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br></div></div><p><code>--network web --network-alias mysql</code> 这里使用了 web 网桥，如果你没有或者不懂网桥，则把这段去掉即可。</p> <p>密码自行修改。</p> <blockquote><p>注意</p></blockquote> <p>-v 是容器数据卷挂载，这里映射了三个目录。</p> <p>如果你的三个目录没有任何东西，你需要先启动一个 MySQL 容器，从里面复制出宿主机需要的内容：</p> <ul><li>复制 <code>/var/lib/mysql</code> 下的内容到 <code>/docker/mysql/data</code></li> <li>复制 <code>/etc/mysql/conf.d</code> 下的内容到 <code>/docker/mysql/conf</code></li> <li>复制 <code>/var/log</code> 下的内容到 <code>/docker/mysql/log</code></li></ul> <p>执行命令：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">docker</span> <span class="token function">cp</span> <span class="token punctuation">[</span>容器名<span class="token punctuation">]</span>:<span class="token punctuation">[</span>目录<span class="token punctuation">]</span> <span class="token punctuation">[</span>宿主机目录<span class="token punctuation">]</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>再重新执行上面的启动命令，实现挂载。</p> <blockquote><p>为什么？</p></blockquote> <p>因为 docker 数据卷挂载时，会将宿主机的的目录覆盖掉容器内的目录（这是其中一个规则），当宿主机的目录是空的时候，那么原本容器内的挂载目录有数据，也会宿主机的空目录被覆盖，导致无法启动，所以先复制一份出来，再挂载。</p> <p>进入 MySQL 容器：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">docker</span> <span class="token builtin class-name">exec</span> <span class="token parameter variable">-it</span> mysql <span class="token function">bash</span>

mysql <span class="token parameter variable">-uroot</span> <span class="token parameter variable">-proot1234</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><h3 id="master-2"><a href="#master-2" class="header-anchor">#</a> Master</h3> <p>Master 数据库，在 <code>/docker/mysql/conf/mysql.conf</code> 添加如下内容（需要重启数据库）：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token punctuation">[</span>mysqld<span class="token punctuation">]</span>
server-id<span class="token operator">=</span><span class="token number">1</span>
log-bin<span class="token operator">=</span>mysql-bin
character-set-server<span class="token operator">=</span>utf8
collation-server<span class="token operator">=</span>utf8_general_ci

<span class="token punctuation">[</span>client<span class="token punctuation">]</span>
default-character-set<span class="token operator">=</span>utf8
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br></div></div><p><code>server-id</code> 作为 id，不能和作为主从集群的其他数据库一样，这里主 Master 的 <code>server-id</code> 是 1。</p> <p>然后创建一个用户名和密码给从 Slave 使用，不建议使用 root，因为存在安全隐患，所以这里就创建一个 slave 用户专门给从 Slave 使用。（直接使用 root 也可以）</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>create user <span class="token string">'slave'</span>@<span class="token string">'%'</span> identified with mysql_native_password by <span class="token string">'slave1234'</span><span class="token punctuation">;</span>
GRANT REPLICATION SLAVE, REPLICATION CLIENT ON *.* TO <span class="token string">'slave'</span>@<span class="token string">'%'</span><span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>此时用户名是 <code>slave</code>，密码是 <code>slave1234</code>。</p> <p>接着先锁表，确保主从集群配置期间，主数据库不会发生改变，否则引起从数据库无法同步问题。</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>flush table with <span class="token builtin class-name">read</span> lock<span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>然后查看 File 和 Position，这两个是给从数据库使用，告诉从数据库从哪里开始同步数据。</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>show master status<span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>执行命令的效果图：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>+------------------+----------+--------------+------------------+-------------------+
<span class="token operator">|</span> File             <span class="token operator">|</span> Position <span class="token operator">|</span> Binlog_Do_DB <span class="token operator">|</span> Binlog_Ignore_DB <span class="token operator">|</span> Executed_Gtid_Set <span class="token operator">|</span>
+------------------+----------+--------------+------------------+-------------------+
<span class="token operator">|</span> mysql-bin.000003 <span class="token operator">|</span>    <span class="token number">47259</span> <span class="token operator">|</span>              <span class="token operator">|</span>                  <span class="token operator">|</span>                   <span class="token operator">|</span>
+------------------+----------+--------------+------------------+-------------------+
<span class="token number">1</span> row <span class="token keyword">in</span> <span class="token builtin class-name">set</span> <span class="token punctuation">(</span><span class="token number">0.01</span> sec<span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><p>此时 <code>mysql-bin.000003</code> 和 <code>47259</code> 就是从数据库需要的，如果前面没有先锁表，会导致 Position 可能变化，导致 Position 不是最新的。</p> <h3 id="slave-2"><a href="#slave-2" class="header-anchor">#</a> Slave</h3> <p>Slave 数据库，在 <code>/docker/mysql/conf/mysql.conf</code> 添加如下内容（需要重启数据库）：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token punctuation">[</span>mysqld<span class="token punctuation">]</span>
server-id<span class="token operator">=</span><span class="token number">2</span>
log-bin<span class="token operator">=</span>mysql-bin
<span class="token assign-left variable">relay_log</span><span class="token operator">=</span>edu-mysql-relay-bin
<span class="token assign-left variable">replicate_ignore_db</span><span class="token operator">=</span>mysql
<span class="token assign-left variable">replicate_ignore_db</span><span class="token operator">=</span>information_schema
<span class="token assign-left variable">replicate_ignore_db</span><span class="token operator">=</span>performance_schema
<span class="token assign-left variable">replicate_ignore_db</span><span class="token operator">=</span>sys
<span class="token assign-left variable">replicate_ignore_db</span><span class="token operator">=</span>etherpad

<span class="token punctuation">[</span>client<span class="token punctuation">]</span>
default-character-set<span class="token operator">=</span>utf8
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br></div></div><p>前面主数据库的 <code>server-id</code> 是 1，则从数据库不能是 1，所以这里是 2。</p> <p><code>replicate_ignore_db</code> 就是指定不同步的表，如果你不需要同步一些表到从数据库，则这里排除掉。</p> <p>我这里使用的场景是：</p> <ul><li>我的主数据库是 2021 年创建的，而从数据库是 2023 年创建的，它们不是 <strong>同一时间创建的</strong>，所以 MySQL 自带的一些表无法保证一样，所以我就排除掉</li> <li>如果你是两个同时创建的数据库，或者将主数据库的所有数据同步到从数据库，则无需排除</li></ul> <p>此时 Slave 数据库需要和 Master 数据库关联，在 Slave 执行命令：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>change master to <span class="token assign-left variable">master_host</span><span class="token operator">=</span><span class="token string">'172.169.1.1'</span>, <span class="token assign-left variable">master_user</span><span class="token operator">=</span><span class="token string">'slave'</span>, <span class="token assign-left variable">master_password</span><span class="token operator">=</span><span class="token string">'slave1234'</span>, <span class="token assign-left variable">master_port</span><span class="token operator">=</span><span class="token number">3306</span>, <span class="token assign-left variable">master_log_file</span><span class="token operator">=</span><span class="token string">'mysql-bin.000003'</span>, <span class="token assign-left variable">master_log_pos</span><span class="token operator">=</span><span class="token number">47259</span>, <span class="token assign-left variable">master_connect_retry</span><span class="token operator">=</span><span class="token number">30</span><span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><code>master_log_file</code> 和 <code>master_log_pos</code> 就是 Master 数据库执行 <code>show master status</code> 得到的数据库。</p> <p>最后执行命令启动 slave 功能：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>start slave；
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>如果想重新换主数据库，则先停掉 slave 功能：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>stop slave<span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>再执行更换命令：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>change master to <span class="token assign-left variable">master_host</span><span class="token operator">=</span><span class="token string">'xx'</span>, <span class="token assign-left variable">master_user</span><span class="token operator">=</span><span class="token string">'xxx'</span>, <span class="token assign-left variable">master_password</span><span class="token operator">=</span><span class="token string">'xxxx'</span>, <span class="token assign-left variable">master_port</span><span class="token operator">=</span><span class="token number">3306</span>, <span class="token assign-left variable">master_log_file</span><span class="token operator">=</span><span class="token string">'xxx'</span>, <span class="token assign-left variable">master_log_pos</span><span class="token operator">=</span>xxx, <span class="token assign-left variable">master_connect_retry</span><span class="token operator">=</span><span class="token number">30</span><span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>如果不想作为从数据库，而清除 slave 功能。</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>reset slave<span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h3 id="主主集群"><a href="#主主集群" class="header-anchor">#</a> 主主集群</h3> <p>如果你想实现主主集群，则在上面把从数据库升级为主数据库即可。</p> <p>同理在从数据库创建一个用户名密码，然后在服务器 A 的主数据库执行命令绑定服务器 B 的 Slave 即可。</p> <h3 id="总结"><a href="#总结" class="header-anchor">#</a> 总结</h3> <p>主从集群就是将两个不同服务器的数据库通过如下命令进行绑定：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>change master to <span class="token assign-left variable">master_host</span><span class="token operator">=</span><span class="token string">'172.169.1.1'</span>, <span class="token assign-left variable">master_user</span><span class="token operator">=</span><span class="token string">'slave'</span>, <span class="token assign-left variable">master_password</span><span class="token operator">=</span><span class="token string">'slave1234'</span>, <span class="token assign-left variable">master_port</span><span class="token operator">=</span><span class="token number">3306</span>, <span class="token assign-left variable">master_log_file</span><span class="token operator">=</span><span class="token string">'mysql-bin.000003'</span>, <span class="token assign-left variable">master_log_pos</span><span class="token operator">=</span><span class="token number">47259</span>, <span class="token assign-left variable">master_connect_retry</span><span class="token operator">=</span><span class="token number">30</span><span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>谁执行这个命令，谁就是从。</p> <p>只不过执行这个命令的条件就是主数据库创建一个用户名密码、查看自己的 File 和 Position 给从数据库绑定。</p> <p>如果两个都执行这个命令，那么两个都是从。因为都和对方绑定了，所以从从等价于主主，这就是主主集群。</p> <p>主从集群：从数据库只能读数据库，无法写，否则主从集群失效，需要重新走如上配置。</p> <p>主主集群：任意一个数据库都可以读写，并且数据都是同步的。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/Kele-Bingtang/Kele-Bingtang.github.io/edit/master/docs/20.数据库/05.关系数据库 - MySQL/30.MySQL - 主从复制.md" target="_blank" rel="noopener noreferrer">编辑此页</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E5%85%B3%E7%B3%BB%E6%95%B0%E6%8D%AE%E5%BA%93" title="标签">#关系数据库</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2023/10/23, 18:58:51</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/mysql/log/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">MySQL - 日志</div></a> <a href="/oracle/test/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">Oracle - 测试</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
