3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">JavaWeb - Maven<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h1 id="_5、maven"><a href="#_5、maven" class="header-anchor">#</a> 5、Maven</h1> <p><strong>我为什么要学习这个技术？</strong></p> <ol><li><p>在Javaweb开发中，需要使用大量的jar包，我们手动去导入；</p></li> <li><p>如何能够让一个东西自动帮我导入和配置这个jar包。</p> <p>由此，Maven诞生了！</p></li></ol> <h2 id="_5-1-maven项目架构管理工具"><a href="#_5-1-maven项目架构管理工具" class="header-anchor">#</a> 5.1 Maven项目架构管理工具</h2> <p>我们目前用来就是方便导入jar包的！</p> <p>Maven的核心思想：<strong>约定大于配置</strong></p> <ul><li>有约束，不要去违反。</li></ul> <p>Maven会规定好你该如何去编写我们的Java代码，必须要按照这个规范来；</p> <h2 id="_5-2-下载安装maven"><a href="#_5-2-下载安装maven" class="header-anchor">#</a> 5.2 下载安装Maven</h2> <p>官网;https://maven.apache.org/</p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567842350606.png" alt="1567842350606"></p> <p>下载完成后，解压即可；</p> <p>小狂神友情建议：电脑上的所有环境都放在一个文件夹下，方便管理；</p> <h2 id="_5-3-配置环境变量"><a href="#_5-3-配置环境变量" class="header-anchor">#</a> 5.3 配置环境变量</h2> <p>在我们的系统环境变量中</p> <p>配置如下配置：</p> <ul><li>M2_HOME     maven目录下的bin目录</li> <li>MAVEN_HOME      maven的目录</li> <li>在系统的path中配置  %MAVEN_HOME%\bin</li></ul> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567842882993.png" alt="1567842882993"></p> <p>测试Maven是否安装成功，保证必须配置完毕！</p> <h2 id="_5-4-阿里云镜像"><a href="#_5-4-阿里云镜像" class="header-anchor">#</a> 5.4 阿里云镜像</h2> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567844609399.png" alt="1567844609399"></p> <ul><li>镜像：mirrors
<ul><li>作用：加速我们的下载</li></ul></li> <li>国内建议使用阿里云的镜像</li></ul> <div class="language-xml line-numbers-mode"><pre class="language-xml"><code><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>mirror</span><span class="token punctuation">&gt;</span></span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>id</span><span class="token punctuation">&gt;</span></span>nexus-aliyun<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>id</span><span class="token punctuation">&gt;</span></span>  
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>mirrorOf</span><span class="token punctuation">&gt;</span></span>*,!jeecg,!jeecg-snapshots<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>mirrorOf</span><span class="token punctuation">&gt;</span></span>  
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>name</span><span class="token punctuation">&gt;</span></span>Nexus aliyun<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>name</span><span class="token punctuation">&gt;</span></span>  
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>url</span><span class="token punctuation">&gt;</span></span>http://maven.aliyun.com/nexus/content/groups/public<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>url</span><span class="token punctuation">&gt;</span></span> 
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>mirror</span><span class="token punctuation">&gt;</span></span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><h2 id="_5-5-本地仓库"><a href="#_5-5-本地仓库" class="header-anchor">#</a> 5.5 本地仓库</h2> <p>在本地的仓库，远程仓库；</p> <p>**建立一个本地仓库：**localRepository</p> <div class="language-xml line-numbers-mode"><pre class="language-xml"><code><span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>localRepository</span><span class="token punctuation">&gt;</span></span>D:\Environment\apache-maven-3.6.2\maven-repo<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>localRepository</span><span class="token punctuation">&gt;</span></span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h2 id="_5-6、在idea中使用maven"><a href="#_5-6、在idea中使用maven" class="header-anchor">#</a> 5.6、在IDEA中使用Maven</h2> <ol><li><p>启动IDEA</p></li> <li><p>创建一个MavenWeb项目</p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567844785602.png" alt="1567844785602"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567844841172.png" alt="1567844841172"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567844917185.png" alt="1567844917185"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567844956177.png" alt="1567844956177"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567845029864.png" alt="1567845029864"></p></li> <li><p>等待项目初始化完毕</p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567845105970.png" alt="1567845105970"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567845137978.png" alt="1567845137978"></p></li> <li><p>观察maven仓库中多了什么东西？</p></li> <li><p>IDEA中的Maven设置</p> <p>注意：IDEA项目创建成功后，看一眼Maven的配置</p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567845341956.png" alt="1567845341956"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567845413672.png" alt="1567845413672"></p></li> <li><p>到这里，Maven在IDEA中的配置和使用就OK了!</p></li></ol> <h2 id="_5-7、创建一个普通的maven项目"><a href="#_5-7、创建一个普通的maven项目" class="header-anchor">#</a> 5.7、创建一个普通的Maven项目</h2> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567845557744.png" alt="1567845557744"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567845717377.png" alt="1567845717377"></p> <p>这个只有在Web应用下才会有！</p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567845782034.png" alt="1567845782034"></p> <h2 id="_5-8-标记文件夹功能"><a href="#_5-8-标记文件夹功能" class="header-anchor">#</a> 5.8 标记文件夹功能</h2> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567845910728.png" alt="1567845910728"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567845957139.png" alt="1567845957139"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567846034906.png" alt="1567846034906"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567846073511.png" alt="1567846073511"></p> <h2 id="_5-9-在-idea中配置tomcat"><a href="#_5-9-在-idea中配置tomcat" class="header-anchor">#</a> 5.9 在 IDEA中配置Tomcat</h2> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567846140348.png" alt="1567846140348"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567846179573.png" alt="1567846179573"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567846234175.png" alt="1567846234175"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567846369751.png" alt="1567846369751"></p> <p>解决警告问题</p> <p>必须要的配置：<strong>为什么会有这个问题：我们访问一个网站，需要指定一个文件夹名字；</strong></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567846421963.png" alt="1567846421963"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567846546465.png" alt="1567846546465"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567846559111.png" alt="1567846559111"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567846640372.png" alt="1567846640372"></p> <h2 id="_5-10-pom文件"><a href="#_5-10-pom文件" class="header-anchor">#</a> 5.10 pom文件</h2> <p>pom.xml 是Maven的核心配置文件</p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567846784849.png" alt="1567846784849"></p> <div class="language-xml line-numbers-mode"><pre class="language-xml"><code><span class="token prolog">&lt;?xml version=&quot;1.0&quot; encoding=&quot;UTF-8&quot;?&gt;</span>

<span class="token comment">&lt;!--Maven版本和头文件--&gt;</span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>project</span> <span class="token attr-name">xmlns</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>http://maven.apache.org/POM/4.0.0<span class="token punctuation">&quot;</span></span> <span class="token attr-name"><span class="token namespace">xmlns:</span>xsi</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>http://www.w3.org/2001/XMLSchema-instance<span class="token punctuation">&quot;</span></span>
  <span class="token attr-name"><span class="token namespace">xsi:</span>schemaLocation</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>modelVersion</span><span class="token punctuation">&gt;</span></span>4.0.0<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>modelVersion</span><span class="token punctuation">&gt;</span></span>

  <span class="token comment">&lt;!--这里就是我们刚才配置的GAV--&gt;</span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>groupId</span><span class="token punctuation">&gt;</span></span>com.kuang<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>groupId</span><span class="token punctuation">&gt;</span></span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>artifactId</span><span class="token punctuation">&gt;</span></span>javaweb-01-maven<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>artifactId</span><span class="token punctuation">&gt;</span></span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>version</span><span class="token punctuation">&gt;</span></span>1.0-SNAPSHOT<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>version</span><span class="token punctuation">&gt;</span></span>
  <span class="token comment">&lt;!--Package：项目的打包方式
  jar：java应用
  war：JavaWeb应用
  --&gt;</span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>packaging</span><span class="token punctuation">&gt;</span></span>war<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>packaging</span><span class="token punctuation">&gt;</span></span>


  <span class="token comment">&lt;!--配置--&gt;</span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>properties</span><span class="token punctuation">&gt;</span></span>
    <span class="token comment">&lt;!--项目的默认构建编码--&gt;</span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>project.build.sourceEncoding</span><span class="token punctuation">&gt;</span></span>UTF-8<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>project.build.sourceEncoding</span><span class="token punctuation">&gt;</span></span>
    <span class="token comment">&lt;!--编码版本--&gt;</span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>maven.compiler.source</span><span class="token punctuation">&gt;</span></span>1.8<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>maven.compiler.source</span><span class="token punctuation">&gt;</span></span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>maven.compiler.target</span><span class="token punctuation">&gt;</span></span>1.8<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>maven.compiler.target</span><span class="token punctuation">&gt;</span></span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>properties</span><span class="token punctuation">&gt;</span></span>

  <span class="token comment">&lt;!--项目依赖--&gt;</span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>dependencies</span><span class="token punctuation">&gt;</span></span>
    <span class="token comment">&lt;!--具体依赖的jar包配置文件--&gt;</span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>dependency</span><span class="token punctuation">&gt;</span></span>
      <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>groupId</span><span class="token punctuation">&gt;</span></span>junit<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>groupId</span><span class="token punctuation">&gt;</span></span>
      <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>artifactId</span><span class="token punctuation">&gt;</span></span>junit<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>artifactId</span><span class="token punctuation">&gt;</span></span>
      <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>version</span><span class="token punctuation">&gt;</span></span>4.11<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>version</span><span class="token punctuation">&gt;</span></span>
    <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>dependency</span><span class="token punctuation">&gt;</span></span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>dependencies</span><span class="token punctuation">&gt;</span></span>

在IDEA中的全局默认配置中去配置</p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567905247201.png" alt="1567905247201"></p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567905291002.png" alt="1567905291002"></p></li> <li><p>Maven项目中Tomcat无法配置</p></li> <li><p>maven默认web项目中的web.xml版本问题</p> <p><img src="https://cdn.staticaly.com/gh/oddfar/static@master/img/JavaWeb.assets/1567905537026.png" alt="1567905537026"></p></li> <li><p>替换为webapp4.0版本和tomcat一致</p> <div class="language-xml line-numbers-mode"><pre class="language-xml"><code><span class="token prolog">&lt;?xml version=&quot;1.0&quot; encoding=&quot;UTF-8&quot;?&gt;</span>

         <span class="token attr-name"><span class="token namespace">xmlns:</span>xsi</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>http://www.w3.org/2001/XMLSchema-instance<span class="token punctuation">&quot;</span></span>
         <span class="token attr-name"><span class="token namespace">xsi:</span>schemaLocation</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>http://xmlns.jcp.org/xml/ns/javaee
                      http://xmlns.jcp.org/xml/ns/javaee/web-app_4_0.xsd<span class="token punctuation">&quot;</span></span>
         <span class="token attr-name">version</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>4.0<span class="token punctuation">&quot;</span></span>
         <span class="token attr-name">metadata-complete</span><span class="token attr-value"><span class="token punctuation attr-equals">=</span><span class="token punctuation">&quot;</span>true<span class="token punctuation">&quot;</span></span><span class="token punctuation">&gt;</span></span>
