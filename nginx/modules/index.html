pi学习">API学习</a></li><li><a href="#效果实现">效果实现</a></li></ul></li><li><a href="#ngx-lua操作mysql">ngx_lua操作Mysql</a><ul><li><a href="#lua-resty-mysql">lua-resty-mysql</a></li><li><a href="#mysql环境准备">MySQL环境准备</a></li><li><a href="#api学习">API学习</a></li><li><a href="#表创建">表创建</a></li><li><a href="#数据插入">数据插入</a></li><li><a href="#数据查询">数据查询</a></li><li><a href="#lua-cjson处理查询结果">lua-cjson处理查询结果</a></li><li><a href="#数据库删改">数据库删改</a></li></ul></li><li><a href="#综合小案例">综合小案例</a></li></ul></div><p></p> <h2 id="ngx-lua模块概念"><a href="#ngx-lua模块概念" class="header-anchor">#</a> ngx_lua模块概念</h2> <p><a href="https://github.com/openresty/lua-nginx-module#readme" target="_blank" rel="noopener noreferrer">ngx_lua 官方文档<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <p><a href="https://www.kancloud.cn/qq13867685/openresty-api-cn/159175" target="_blank" rel="noopener noreferrer">ngx_lua 中文文档<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <p>淘宝开发的 <code>ngx_lua</code> 模块通过将 Lua 解释器集成进 Nginx，可以采用 Lua 脚本实现业务逻辑，由于 Lua 的紧凑、快速以及内建协程，所以在保证高并发服务能力的同时极大地降低了业务逻辑实现成本。</p> <h2 id="ngx-lua模块环境准备"><a href="#ngx-lua模块环境准备" class="header-anchor">#</a> ngx_lua模块环境准备</h2> <p>下载 <code>ngx-lua-module</code> 模块有两个方式。</p> <ul><li>方式一安装比较繁琐，需要手动下载其他依赖</li> <li>方式二安装简单快捷，集成了依赖，不需要手动下载依赖，建议方式二</li></ul> <p>不论方式一还是方式二安装，<strong>首先确保你为它安装好了环境，否则会安装报错</strong>。环境分别为：<code>GCC</code>、<code>PCRE</code>、<code>zlib</code>、<code>OpenSSL</code>。<a href="/nginx/install/#nginx环境安装">环境安装传送门</a>。</p> <h3 id="方式一"><a href="#方式一" class="header-anchor">#</a> 方式一</h3> <p>方式一下载第三方模块 <code>lua-nginx-module</code>，前，需要先下载 <code>LuaJIT</code> 解析器。</p> <p><code>LuaJIT</code> 官网地址为：<a href="http://luajit.org/" target="_blank" rel="noopener noreferrer">http://luajit.org/<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>。</p> <ul><li><p>LuaJIT 是采用 C 语言编写的 Lua 代表的解释器，我们先下载它。</p> <p>在官网上找到对应的下载地址：<a href="https://luajit.org/download.html" target="_blank" rel="noopener noreferrer">https://luajit.org/download.html<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <p>在 Linux 上使用 wget 来下载: <code>wget http://luajit.org/download/LuaJIT-2.0.5.tar.gz</code>，这里下载在 <code>/opt</code>，下载的版本是 2.0.5。</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token builtin class-name">cd</span> /opt
<span class="token function">wget</span> http://luajit.org/download/LuaJIT-2.0.5.tar.gz
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>将下载的资源进行解压</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">tar</span> <span class="token parameter variable">-zxf</span> LuaJIT-2.0.5.tar.gz
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>进入解压的目录</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token builtin class-name">cd</span> LuaJIT-2.0.5
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>执行编译和安装:</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">make</span> <span class="token operator">&amp;&amp;</span> <span class="token function">make</span> <span class="token function">install</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Nginx/20211129235040.png" alt="1604636335626"></p></li> <li><p>下载 <code>lua-nginx-module</code></p> <p>下载地址：<a href="https://github.com/openresty/lua-nginx-module/tags" target="_blank" rel="noopener noreferrer">https://github.com/openresty/lua-nginx-module/tags<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <p>在 Linux 上使用 wget 来下载: <code>wget https://github.com/openresty/lua-nginx-module/archive/v0.10.16rc4.tar.gz</code>，这里下载在 <code>/opt</code>，版本是 0.10.16rc4。</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">wget</span> https://github.com/openresty/lua-nginx-module/archive/v0.10.16rc4.tar.gz
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>将下载的资源进行解压</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">tar</span> <span class="token parameter variable">-zxf</span> lua-nginx-module-0.10.16rc4.tar.gz
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>目录名太长，更改目录名</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">mv</span> lua-nginx-module-0.10.16rc4 lua-nginx-module
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>导入环境变量，告诉 Nginx 去哪里找 LuaJIT</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token builtin class-name">export</span> <span class="token assign-left variable">LUAJIT_LIB</span><span class="token operator">=</span>/usr/local/lib
<span class="token builtin class-name">export</span> <span class="token assign-left variable">LUAJIT_INC</span><span class="token operator">=</span>/usr/local/include/luajit-2.0
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>进入 Nginx 的源码目录（安装包目录）执行如下命令：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>./configure <span class="token parameter variable">--prefix</span><span class="token operator">=</span>/usr/local/nginx --add-module<span class="token operator">=</span>/opt/lua-nginx-module
<span class="token function">make</span> <span class="token operator">&amp;&amp;</span> <span class="token function">make</span> <span class="token function">install</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div></li></ul> <p><strong>注意事项</strong></p> <p>（1）如果启动 Nginx 出现如下错误:</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Nginx/20211129234444.png" alt="1604636421045"></p> <p>解决方案：</p> <p>设置软链接，使用如下命令</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code> <span class="token function">ln</span> <span class="token parameter variable">-s</span> /usr/local/lib/libluajit-5.1.so.2 /lib64/libluajit-5.1.so.2
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>（2）如果启动 Nginx 出现以下错误信息</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Nginx/20211129234504.png" alt="1604636405241"></p> <p>分析原因：因为 <code>lua-nginx-module</code> 是来自 OpenResty，错误中提示的 resty.core 是 OpenRestry 的核心模块，对其下的很多函数进行了优化等工作。以前的版本默认不会把该模块编译进去，所以需要使用的话，我们得手动安装，或者禁用就可以。但是最新的 <code>lua-nginx-module</code> 模块已经强制性安装了该模块，所以此处因为缺少 resty 模块导致的报错信息。</p> <p>解决方案有两个：一种是下载对应的模块，另一种则是禁用掉 restry 模块，禁用的方式为：</p> <div class="language-nginx line-numbers-mode"><pre class="language-nginx"><code><span class="token directive"><span class="token keyword">http</span></span><span class="token punctuation">{</span>
	<span class="token directive"><span class="token keyword">lua_load_resty_core</span> <span class="token boolean">off</span></span><span class="token punctuation">;</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><ul><li><p>测试</p> <p>在 nginx.conf 下配置如下内容:</p> <div class="language-nginx line-numbers-mode"><pre class="language-nginx"><code><span class="token directive"><span class="token keyword">location</span> /lua</span><span class="token punctuation">{</span>
    <span class="token directive"><span class="token keyword">default_type</span> <span class="token string">'text/html'</span></span><span class="token punctuation">;</span>
    <span class="token directive"><span class="token keyword">content_by_lua</span> <span class="token string">'ngx.say(&quot;&lt;h1&gt;HELLO,LUA&lt;/h1&gt;&quot;)'</span></span><span class="token punctuation">;</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p>配置成功后，启动 Nginx，通过浏览器进行访问，如果获取到如下结果，则证明安装成功。</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Nginx/20211129234900.png" alt="1604636592232"></p></li></ul> <h3 id="方式二"><a href="#方式二" class="header-anchor">#</a> 方式二</h3> <p>方式二使用 OpenRestry 进行安装。OpenRestry 就是我们上面说到的 Nginx 的 Spring 之一。</p> <h4 id="概述"><a href="#概述" class="header-anchor">#</a> 概述</h4> <p>前面我们提到过，OpenResty 是由淘宝工程师开发的，所以其官方网站（<a href="http://openresty.org/" target="_blank" rel="noopener noreferrer">http://openresty.org/<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>）我们读起来是非常的方便。OpenResty 是一个基于 Nginx 与 Lua 的高性能 Web 平台，其内部集成了大量精良的 Lua 库、第三方模块以及大多数的依赖项。用于方便地搭建能够处理超高并发、扩展性极高的动态 Web 应用、Web 服务和动态网关。所以本身 OpenResty 内部就已经集成了 Nginx 和 Lua，所以我们使用起来会更加方便。</p> <h4 id="linux安装"><a href="#linux安装" class="header-anchor">#</a> Linux安装</h4> <p>下载地址：<a href="http://openresty.org/cn/download.html" target="_blank" rel="noopener noreferrer">http://openresty.org/cn/download.html<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>。这里下载 1.19.9.1 版本。</p> <ul><li><p>可以在 Windows 下载 OpenResty：<a href="https://openresty.org/download/openresty-1.19.9.1.tar.gz" target="_blank" rel="noopener noreferrer">https://openresty.org/download/openresty-1.19.9.1.tar.gz<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>，然后上传到 Linux</p> <p>或者直接在 Linux 使用 wget 下载: <code>wget https://openresty.org/download/openresty-1.19.9.1.tar.gz</code></p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token builtin class-name">cd</span> /opt/openresty    <span class="token comment"># 没有就创建：mkdir /opt/openresty</span>

<span class="token function">wget</span> https://openresty.org/download/openresty-1.19.9.1.tar.gz
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div></li> <li><p>解压缩</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">tar</span> <span class="token parameter variable">-zxf</span> openresty-1.19.9.1.tar.gz
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li> <li><p>进入 OpenResty 目录</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token builtin class-name">cd</span> openresty-1.19.9.1
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li> <li><p>执行命令</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>./configure
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li> <li><p>执行命令进行编译和安装</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">make</span> <span class="token operator">&amp;&amp;</span> <span class="token function">make</span> <span class="token function">install</span>
<span class="token comment"># 或者</span>
gmake <span class="token operator">&amp;&amp;</span> gmake <span class="token function">install</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>默认安装在 <code>/usr/local/</code> 下。</p></li> <li><p>进入 OpenResty 的目录，找到 nginx</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token builtin class-name">cd</span> /usr/local/openresty/nginx
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li> <li><p>在 conf 目录下的 nginx.conf 添加如下内容：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">vim</span> conf/nginx.conf
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><div class="language-sh line-numbers-mode"><pre class="language-sh"><code>location /lua <span class="token punctuation">{</span>
    default_type <span class="token string">'text/html'</span><span class="token punctuation">;</span>
    content_by_lua <span class="token string">'ngx.say(&quot;&lt;h1&gt;HELLO,OpenRestry&lt;/h1&gt;&quot;)'</span><span class="token punctuation">;</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p>重启 Nginx 配置文件</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>nginx <span class="token parameter variable">-s</span> reload
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li> <li><p>先把 Nginx 停止运行</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>systemctl stop Nginx
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>然后在 sbin 目录下启动可执行文件 nginx</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>./sbin/nginx
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li> <li><p>通过浏览器访问测试</p> <p><code>http://192.168.199.27</code></p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Nginx/20211130150914.png" alt="image-20211130150906341"></p></li></ul> <p><code>http://192.168.199.27/lua</code></p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Nginx/20211130150917.png" alt="image-20211130150916543"></p> <h3 id="docker安装"><a href="#docker安装" class="header-anchor">#</a> Docker安装</h3> <p>前往 DockerHub 的 OpenResty 地址：<a href="https://registry.hub.docker.com/r/openresty/openresty" target="_blank" rel="noopener noreferrer">https://registry.hub.docker.com/r/openresty/openresty<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <p>下载版本自行选择，我安装的是最新版</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">docker</span> pull openresty/openresty
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>安装完后查看是否安装成功</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">docker</span> images

<span class="token comment"># 返回结果</span>
REPOSITORY            TAG                         IMAGE ID       CREATED        SIZE
openresty/openresty   latest                      0f3cb4127b95   <span class="token number">13</span> days ago    <span class="token number">92</span>.6MB
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>名字太长，重命名名字</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">docker</span> tag openresty/openresty:latest openresty:latest <span class="token comment"># 新增镜像，并重命名</span>

<span class="token function">docker</span> rmi openresty/openresty:latest <span class="token comment"># 删除旧的长名字镜像</span>

<span class="token function">docker</span> images

<span class="token comment"># 返回结果</span>
REPOSITORY        TAG          IMAGE ID       CREATED        SIZE
openresty         latest       0f3cb4127b95   <span class="token number">13</span> days ago    <span class="token number">92</span>.6MB
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br></div></div><p>这里只能使用具体目录挂载方式，因为需要挂载文件，具体原因请看 <a href="/docker/volume/#哪个挂载方法好">Docker - 数据卷</a>。</p> <p>我这里打算挂载 Nginx 配置文件、html 静态资源目录、log 日志目录，所以先从容器拿出来，因为挂载时容器的挂载目录会被宿主机覆盖。</p> <p>我拷贝到宿主机的 <code>/docker/openresty</code> 路径下，具体路径根据你的需求决定。</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">mkdir</span> <span class="token parameter variable">-p</span> /docker/openresty/conf

<span class="token comment"># 不需要创建 html 和 log 目录，因为从容器将整个目录拷贝出来</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>拷贝的时候，记得先简单启动 openresty 镜像</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># 简单启动</span>
<span class="token function">docker</span> run <span class="token parameter variable">-d</span> <span class="token parameter variable">--name</span> openresty openresty:latest

<span class="token comment"># 配置文件、html 静态资源目录、log 日志目录分别拷贝出来</span>
<span class="token function">docker</span> <span class="token function">cp</span> openresty:/etc/nginx/conf.d /docker/openresty/conf
<span class="token function">docker</span> <span class="token function">cp</span> openresty:/usr/local/openresty/nginx/html /docker/openresty/
<span class="token function">docker</span> <span class="token function">cp</span> openresty:/usr/local/openresty/nginx/logs /docker/openresty/
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br></div></div><div class="custom-block note"><p class="custom-block-title">笔记</p> <p>Ngxin 完整的配置文件在 <code>/usr/local/openresty/nginx/conf</code> 路径下，但是 openresty 将 <code>/etc/nginx/conf.d/</code> 路径下的 .conf 文件和完整的配置文件通过 <code>inlcude</code> 关联起来了，为了不破坏完整的配置文件，我们只需要在这个目录下添加 .conf 文件，则会自动添加到完整的配置文件里。</p> <div class="custom-block right"><p>2021-12-1 @Young Kbt</p></div></div> <p>删除刚刚启动的 openresty 容器</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">docker</span> <span class="token function">rm</span> <span class="token parameter variable">-f</span> openresty
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>启动新的 openresty 镜像，将配置文件、html 静态资源目录、日志目录进行挂载，将刚才拷贝出来的路径一一对应挂载。</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">docker</span> run <span class="token parameter variable">-d</span> <span class="token parameter variable">--name</span> openresty <span class="token parameter variable">-p</span> <span class="token number">80</span>:80 <span class="token parameter variable">--restart</span> always <span class="token punctuation">\</span>
<span class="token parameter variable">-v</span> /docker/openresty/conf:/etc/nginx/conf.d <span class="token punctuation">\</span>
<span class="token parameter variable">-v</span> /docker/openresty/html:/usr/local/openresty/nginx/html <span class="token punctuation">\</span>
<span class="token parameter variable">-v</span> /docker/openresty/logs:/usr/local/openresty/nginx/logs <span class="token punctuation">\</span>
openresty:latest

<span class="token comment"># 这一步无需看，只是启动时候指定网桥和网桥的别名</span>
<span class="token function">docker</span> run <span class="token parameter variable">-d</span> <span class="token parameter variable">--name</span> openresty <span class="token parameter variable">-p</span> <span class="token number">80</span>:80 <span class="token parameter variable">--restart</span> always <span class="token punctuation">\</span>
<span class="token parameter variable">-v</span> /docker/openresty/conf:/etc/nginx/conf.d <span class="token punctuation">\</span>
<span class="token parameter variable">-v</span> /docker/openresty/html:/usr/local/openresty/nginx/html <span class="token punctuation">\</span>
<span class="token parameter variable">-v</span> /docker/openresty/logs:/usr/local/openresty/nginx/logs <span class="token punctuation">\</span>
<span class="token parameter variable">--network</span> web --network-alias nginx <span class="token punctuation">\</span>
openresty:latest    
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br></div></div><p>这一步不需要看，只是我个人的测试，因为容器里没有安装 yum、vim，只有初始的 <code>apt-get</code>，但是下载源是国外，所以修改下载源到国内，并更新 <code>apt-get</code>，然后下载 vim。</p> <p>必须更新 <code>apt-get</code> 才能下载 vim，因为初始的 <code>apt-get</code> 仓库没有 vim 和 vi。</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">docker</span> run <span class="token parameter variable">-d</span> <span class="token parameter variable">--name</span> php <span class="token parameter variable">-v</span> /home/kbt:/home/kbt php:7.3-fpm

<span class="token comment"># 1. 进入容器</span>
<span class="token function">docker</span> <span class="token builtin class-name">exec</span> <span class="token parameter variable">-it</span> <span class="token operator">&lt;</span>容器名称/id<span class="token operator">&gt;</span> <span class="token function">bash</span> 
<span class="token comment"># 3. 进入 apt-get 配置目录</span>
<span class="token builtin class-name">cd</span> /etc/apt

<span class="token comment"># 4. 执行备份命令，避免修改失败无法使用</span>
<span class="token function">cp</span> sources.list sources.list.bak

<span class="token comment"># 5.同时执行 echo下的 4 行命令，修改成国内镜像源</span>
<span class="token builtin class-name">echo</span> <span class="token string">&quot;&quot;</span><span class="token operator">&gt;</span>sources.list <span class="token punctuation">\</span>
<span class="token builtin class-name">echo</span> <span class="token string">&quot;deb http://ftp2.cn.debian.org/debian/ buster main&quot;</span><span class="token operator">&gt;&gt;</span>sources.list <span class="token punctuation">\</span>
<span class="token builtin class-name">echo</span> <span class="token string">&quot;deb http://ftp2.cn.debian.org/debian/debian-security buster/updates main&quot;</span><span class="token operator">&gt;&gt;</span>sources.list <span class="token punctuation">\</span>
<span class="token builtin class-name">echo</span> <span class="token string">&quot;deb http://ftp2.cn.debian.org/debian/debian buster-updates main&quot;</span><span class="token operator">&gt;&gt;</span>sources.list

<span class="token comment"># 执行更新命令 apt-get update</span>
<span class="token function">apt-get</span> update
<span class="token comment"># 下载 vim</span>
<span class="token function">apt-get</span> <span class="token function">install</span> <span class="token parameter variable">-y</span> <span class="token function">vim</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br></div></div><p>这里使用的是默认端口 80 进行配置。此时在宿主机修改文件，容器里的就会生效。</p> <p>访问测试。</p> <p><strong>如果想配置 SSL，请看 <a href="/nginx/reverse-proxy/#ssl实例模板-通用">SSL 部署</a></strong></p> <h3 id="openresty卸载"><a href="#openresty卸载" class="header-anchor">#</a> OpenResty卸载</h3> <p>卸载非常简单粗暴，相信我，这样卸载是对的，没什么问题。</p> <ol><li><p>停止 Nginx 服务</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># 查看 Nginx 是否停止，没有则去停止</span>
<span class="token function">ps</span> <span class="token parameter variable">-ef</span> <span class="token operator">|</span> <span class="token function">grep</span> nginx 

<span class="token comment"># 进入 sbin 目录</span>
<span class="token builtin class-name">cd</span> /usr/local/openresty/nginx/sbin
./nginx <span class="token parameter variable">-s</span> stop
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div></li> <li><p>输入以下指令全局查找 OpenResty 相关的文件</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">find</span> / <span class="token parameter variable">-name</span> openresty
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li> <li><p>删除查找出来的所有openresty相关文件</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">rm</span> <span class="token parameter variable">-rf</span>  此处跟查找出来的 Openresty 文件
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div></li></ol> <h2 id="ngx-lua指令图"><a href="#ngx-lua指令图" class="header-anchor">#</a> ngx_lua指令图</h2> <p>使用 Lua 编写 Nginx 脚本的基本构建块是指令。指令用于指定何时运行用户 Lua 代码以及如何使用结果。</p> <p>下图显示了执行指令的顺序。</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Nginx/20211130001237.png" alt="1604717983815"></p> <p>先来解释下 * 的作用</p> <ul><li>* 代表 *_by_lua 指令，指令后面跟的是 lua 指令</li> <li>*:_file，即 *_by_lua_file 指令，后面跟的是 lua 文件</li> <li>*:_block，即 *_by_lua_block 指令，在 0.9.17 版后替换 init_by_lua_file</li></ul> <p>如上图所示，OpenResty 的执行阶段分为：</p> <ul><li><p>init_by_lua*：在每次 Nginx 重新加载配置时执行，初始化一些全局配置。</p></li> <li><p>init_worker_by_lua*：该指令用于启动一些定时任务，如心跳检查、定时拉取服务器配置等。</p></li> <li><p>set_by_lua* : 流程分支处理判断变量初始化</p></li> <li><p>rewrite_by_lua* : 转发、重定向、缓存等功能(例如特定请求代理到外网)</p></li> <li><p>access_by_lua* : IP 准入、接口权限等情况集中处理(例如配合 iptable 完成简单防火墙)</p></li> <li><p>content_by_lua* : 内容生成</p></li> <li><p>header_filter_by_lua* : 响应头部过滤处理(例如添加头部信息)</p></li> <li><p>body_filter_by_lua* : 响应体过滤处理(例如完成应答内容统一成大写)</p></li> <li><p>log_by_lua* : 会话完成后本地异步完成日志记录(日志可以记录在本地，还可以同步到其他机器)</p></li></ul> <h2 id="语法api"><a href="#语法api" class="header-anchor">#</a> 语法API</h2> <h3 id="ngx-say"><a href="#ngx-say" class="header-anchor">#</a> ngx.say</h3> <p>返回结果给客户端。</p> <p>语法：<code>ngx.say(&quot;&quot;)</code>。</p> <div class="language-nginx line-numbers-mode"><div class="highlight-lines"><br><br><br><div class="highlighted"> </div><br><br><br></div><pre class="language-nginx"><code><span class="token directive"><span class="token keyword">location</span> /</span> <span class="token punctuation">{</span>
    <span class="token directive"><span class="token keyword">default_type</span> <span class="token string">'text/plain'</span></span><span class="token punctuation">;</span>
    <span class="token directive"><span class="token keyword">content_by_lua_block</span></span> <span class="token punctuation">{</span>
        ngx.say(&quot;Hello World&quot;)
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre><div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><p>你会在网页上看到 Hello World。</p> <h3 id="ngx-print"><a href="#ngx-print" class="header-anchor">#</a> ngx.print</h3> <p>将输入参数合并发送给 HTTP 客户端 (作为 HTTP 响应体)。如果此时还没有发送响应头信息，本函数将先发送 HTTP 响应头，再输出响应体。</p> <p>语法：<code>ok, err = ngx.print(...)</code></p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code><span class="token keyword">local</span> table <span class="token operator">=</span> <span class="token punctuation">{</span>
     <span class="token string">&quot;hello, &quot;</span><span class="token punctuation">,</span>
     <span class="token punctuation">{</span><span class="token string">&quot;world: &quot;</span><span class="token punctuation">,</span> <span class="token keyword">true</span><span class="token punctuation">,</span> <span class="token string">&quot; or &quot;</span><span class="token punctuation">,</span> <span class="token keyword">false</span><span class="token punctuation">,</span>
         <span class="token punctuation">{</span><span class="token string">&quot;: &quot;</span><span class="token punctuation">,</span> <span class="token keyword">nil</span><span class="token punctuation">}</span><span class="token punctuation">}</span>
 <span class="token punctuation">}</span>
ok<span class="token punctuation">,</span> err <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">print</span><span class="token punctuation">(</span>table<span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><p>将输出：</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code> hello<span class="token punctuation">,</span> world<span class="token punctuation">:</span> <span class="token keyword">true</span> <span class="token keyword">or</span> <span class="token keyword">false</span><span class="token punctuation">:</span> <span class="token keyword">nil</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>其中 ok 存储着输出的内容，如果输出失败，err 存储失败的原因。</p> <p>本函数为异步调用，将立即返回，不会等待所有数据被写入系统发送缓冲区。要以同步模式运行，请在调用 <code>ngx.print</code> 之后调用 <code>ngx.flush</code>。</p> <h3 id="ngx-flush"><a href="#ngx-flush" class="header-anchor">#</a> ngx.flush</h3> <p>向客户端刷新响应输出。</p> <p>语法：<code>ok, err = ngx.flush(wait)</code></p> <p><code>ngx.flush</code> 接受一个布尔型可选参数 <code>wait</code> (默认值 <code>false</code>)。当通过默认参数（<code>false</code>）调用时，本函数发起一个异步调用。当把 <code>wait</code> 参数设置为 <code>true</code> 时，本函数将以同步模式执行。</p> <ul><li><p>异步调用下，直接将数据返回，不等待输出数据被写入系统发送缓冲区。</p></li> <li><p>同步模式下，本函数不会立即返回，一直到所有输出数据被写入系统输出缓冲区，或到达发送超时 send_timeout 时间。</p></li></ul> <p>这个要和上方的 ngx.print 进行配合使用，开启同步模式，可以优化返回客户端多条数据的速度。</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code><span class="token keyword">local</span> table <span class="token operator">=</span> <span class="token punctuation">{</span>
     <span class="token string">&quot;hello, &quot;</span><span class="token punctuation">,</span>
     <span class="token punctuation">{</span><span class="token string">&quot;world: &quot;</span><span class="token punctuation">,</span> <span class="token keyword">true</span><span class="token punctuation">,</span> <span class="token string">&quot; or &quot;</span><span class="token punctuation">,</span> <span class="token keyword">false</span><span class="token punctuation">,</span>
         <span class="token punctuation">{</span><span class="token string">&quot;: &quot;</span><span class="token punctuation">,</span> <span class="token keyword">nil</span><span class="token punctuation">}</span><span class="token punctuation">}</span>
 <span class="token punctuation">}</span>
ok<span class="token punctuation">,</span> err <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">print</span><span class="token punctuation">(</span>table<span class="token punctuation">)</span>
ngx<span class="token punctuation">.</span><span class="token function">flush</span><span class="token punctuation">(</span><span class="token keyword">true</span><span class="token punctuation">)</span> 		<span class="token comment">-- 开启同步模式</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br></div></div><h3 id="ngx-arg"><a href="#ngx-arg" class="header-anchor">#</a> ngx.arg</h3> <p>获取定义的变量。</p> <p>语法：<code>ngx.arg[n]</code>。</p> <div class="language-nginx line-numbers-mode"><div class="highlight-lines"><br><br><br><div class="highlighted"> </div><br><br><br></div><pre class="language-nginx"><code> <span class="token directive"><span class="token keyword">location</span> /foo</span> <span class="token punctuation">{</span>
     <span class="token directive"><span class="token keyword">set</span> <span class="token variable">$a</span> <span class="token number">32</span></span><span class="token punctuation">;</span>
     <span class="token directive"><span class="token keyword">set</span> <span class="token variable">$b</span> <span class="token number">56</span></span><span class="token punctuation">;</span>
     <span class="token directive"><span class="token keyword">sum</span> = ngx.arg[1] + ngx.arg[2]  <span class="token comment"># 等价于 $a + $b</span>
     echo <span class="token variable">$sum</span></span><span class="token punctuation">;</span>  
 <span class="token punctuation">}</span>
</code></pre><div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><p>将输出 88，是 32 和 56 的和。</p> <h3 id="ngx-var"><a href="#ngx-var" class="header-anchor">#</a> ngx.var</h3> <p>读写 Nginx 变量值。</p> <p>语法：<code>ngx.var.xxx</code>。</p> <div class="language-nginx line-numbers-mode"><div class="highlight-lines"><br><div class="highlighted"> </div><br><div class="highlighted"> </div><br><br><br></div><pre class="language-nginx"><code><span class="token directive"><span class="token keyword">location</span> /foo</span> <span class="token punctuation">{</span>
    <span class="token directive"><span class="token keyword">set</span> <span class="token variable">$my_var</span> <span class="token string">''</span></span><span class="token punctuation">;</span>  <span class="token comment"># 创建 $my_var 变量</span>
    <span class="token directive"><span class="token keyword">content_by_lua</span> <span class="token string">'
        ngx.var.my_var = 123;  # 使用 <span class="token variable">$my_var</span> 变量
    '</span></span><span class="token punctuation">;</span>
<span class="token punctuation">}</span>
</code></pre><div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br></div></div><h3 id="ngx-log"><a href="#ngx-log" class="header-anchor">#</a> ngx.log</h3> <p>输出到日志中。格式：<code>ngx.log(ngx.level,...)</code></p> <p>可指定多个日志常量 ngx.level。</p> <p>ngx.level有：</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>ngx<span class="token punctuation">.</span>STDERR    <span class="token comment">-- 例如 ngx.log(ngx.STDERR)</span>

ngx<span class="token punctuation">.</span>CRIT
ngx<span class="token punctuation">.</span>ERR
ngx<span class="token punctuation">.</span>WARN
ngx<span class="token punctuation">.</span>NOTICE
ngx<span class="token punctuation">.</span>INFO
ngx<span class="token punctuation">.</span>DEBUG
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br></div></div><h3 id="http-方法常量"><a href="#http-方法常量" class="header-anchor">#</a> HTTP 方法常量</h3> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>ngx<span class="token punctuation">.</span>HTTP_GET
