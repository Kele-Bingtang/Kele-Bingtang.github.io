ngx<span class="token punctuation">.</span><span class="token function">HTTP_MKCOL</span>     <span class="token punctuation">(</span>v0<span class="token punctuation">.</span><span class="token number">8.2</span> 版本加入<span class="token punctuation">)</span>
ngx<span class="token punctuation">.</span><span class="token function">HTTP_COPY</span>      <span class="token punctuation">(</span>v0<span class="token punctuation">.</span><span class="token number">8.2</span> 版本加入<span class="token punctuation">)</span>
ngx<span class="token punctuation">.</span><span class="token function">HTTP_MOVE</span>      <span class="token punctuation">(</span>v0<span class="token punctuation">.</span><span class="token number">8.2</span> 版本加入<span class="token punctuation">)</span>
ngx<span class="token punctuation">.</span><span class="token function">HTTP_PROPFIND</span>  <span class="token punctuation">(</span>v0<span class="token punctuation">.</span><span class="token number">8.2</span> 版本加入<span class="token punctuation">)</span>
ngx<span class="token punctuation">.</span><span class="token function">HTTP_PROPPATCH</span> <span class="token punctuation">(</span>v0<span class="token punctuation">.</span><span class="token number">8.2</span> 版本加入<span class="token punctuation">)</span>
ngx<span class="token punctuation">.</span><span class="token function">HTTP_LOCK</span>      <span class="token punctuation">(</span>v0<span class="token punctuation">.</span><span class="token number">8.2</span> 版本加入<span class="token punctuation">)</span>
ngx<span class="token punctuation">.</span><span class="token function">HTTP_UNLOCK</span>    <span class="token punctuation">(</span>v0<span class="token punctuation">.</span><span class="token number">8.2</span> 版本加入<span class="token punctuation">)</span>
ngx<span class="token punctuation">.</span><span class="token function">HTTP_PATCH</span>     <span class="token punctuation">(</span>v0<span class="token punctuation">.</span><span class="token number">8.2</span> 版本加入<span class="token punctuation">)</span>
ngx<span class="token punctuation">.</span><span class="token function">HTTP_TRACE</span>     <span class="token punctuation">(</span>v0<span class="token punctuation">.</span><span class="token number">8.2</span> 版本加入<span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br></div></div><h3 id="http-状态常量"><a href="#http-状态常量" class="header-anchor">#</a> HTTP 状态常量</h3> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_OK</span> 					<span class="token punctuation">(</span>等于 <span class="token number">200</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_CREATED</span> 				<span class="token punctuation">(</span>等于 <span class="token number">201</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_SPECIAL_RESPONSE</span> 		<span class="token punctuation">(</span>等于 <span class="token number">300</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_MOVED_PERMANENTLY</span> 		<span class="token punctuation">(</span>等于 <span class="token number">301</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_MOVED_TEMPORARILY</span> 		<span class="token punctuation">(</span>等于 <span class="token number">302</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_SEE_OTHER</span> 				<span class="token punctuation">(</span>等于 <span class="token number">303</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_NOT_MODIFIED</span> 			<span class="token punctuation">(</span>等于 <span class="token number">304</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_BAD_REQUEST</span> 			<span class="token punctuation">(</span>等于 <span class="token number">400</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_UNAUTHORIZED</span> 			<span class="token punctuation">(</span>等于 <span class="token number">401</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_FORBIDDEN</span> 				<span class="token punctuation">(</span>等于 <span class="token number">403</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_NOT_FOUND</span> 				<span class="token punctuation">(</span>等于 <span class="token number">404</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_NOT_ALLOWED</span> 			<span class="token punctuation">(</span>等于 <span class="token number">405</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_GONE</span> 					<span class="token punctuation">(</span>等于 <span class="token number">410</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_INTERNAL_SERVER_ERROR</span> 	<span class="token punctuation">(</span>等于 <span class="token number">500</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_METHOD_NOT_IMPLEMENTED</span> <span class="token punctuation">(</span>等于 <span class="token number">501</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_SERVICE_UNAVAILABLE</span> 	<span class="token punctuation">(</span>等于 <span class="token number">503</span><span class="token punctuation">)</span>
value <span class="token operator">=</span> ngx<span class="token punctuation">.</span><span class="token function">HTTP_GATEWAY_TIMEOUT</span> 		<span class="token punctuation">(</span>等于 <span class="token number">504</span><span class="token punctuation">)</span> <span class="token punctuation">(</span>v0<span class="token punctuation">.</span><span class="token number">3.</span>1rc38 版本加入<span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br></div></div><h3 id="print"><a href="#print" class="header-anchor">#</a> print</h3> <p>将参数值以 <code>ngx.NOTICE</code> 日志级别写入 Nginx 的 <code>error.log</code> 文件。</p> <p>语法：<code>print(...)</code>。</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code><span class="token function">print</span><span class="token punctuation">(</span><span class="token string">&quot;可乐&quot;</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>等价于</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>ngx<span class="token punctuation">.</span><span class="token function">log</span><span class="token punctuation">(</span>ngx<span class="token punctuation">.</span>NOTICE<span class="token punctuation">,</span> <span class="token string">&quot;可乐&quot;</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h3 id="ngx-ctx"><a href="#ngx-ctx" class="header-anchor">#</a> ngx.ctx</h3> <p>一个 location 模块里的全局环境变量，存储基于请求的 Lua 环境数据。</p> <p>语法：<code>ngx.ctx.xxx</code>。</p> <div class="language-nginx line-numbers-mode"><pre class="language-nginx"><code><span class="token directive"><span class="token keyword">location</span> /sub</span> <span class="token punctuation">{</span>
    <span class="token directive"><span class="token keyword">content_by_lua</span> <span class="token string">'
        ngx.say(&quot;sub pre: &quot;, ngx.ctx.blah)
        ngx.ctx.blah = 32
        ngx.say(&quot;sub post: &quot;, ngx.ctx.blah)
    '</span></span><span class="token punctuation">;</span>
<span class="token punctuation">}</span>

<span class="token directive"><span class="token keyword">location</span> /main</span> <span class="token punctuation">{</span>
    <span class="token directive"><span class="token keyword">content_by_lua</span> <span class="token string">'
        ngx.ctx.blah = 73
        ngx.say(&quot;main pre: &quot;, ngx.ctx.blah)
        local res = ngx.location.capture(&quot;/sub&quot;)
        ngx.print(res.body)
        ngx.say(&quot;main post: &quot;, ngx.ctx.blah)
    '</span></span><span class="token punctuation">;</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br></div></div><p>访问 <code>GET /main</code> 输出：</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>main pre<span class="token punctuation">:</span> <span class="token number">73</span>
sub pre<span class="token punctuation">:</span> <span class="token keyword">nil</span>
sub post<span class="token punctuation">:</span> <span class="token number">32</span>
main post<span class="token punctuation">:</span> <span class="token number">73</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><h3 id="ngx-exit"><a href="#ngx-exit" class="header-anchor">#</a> ngx.exit</h3> <p>退出某个阶段，如处理请求阶段、重定向阶段等。</p> <p>语法：<code>ngx.exit(status)</code>。</p> <p><code>status</code> 参数可以是 <code>ngx.OK</code>，<code>ngx.ERROR</code> 等等 <a href="#http-%E7%8A%B6%E6%80%81%E5%B8%B8%E9%87%8F">HTTP 状态常量</a>。</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>ngx<span class="token punctuation">.</span>status <span class="token operator">=</span> ngx<span class="token punctuation">.</span>HTTP_GONE
ngx<span class="token punctuation">.</span><span class="token function">say</span><span class="token punctuation">(</span><span class="token string">&quot;This is our own content&quot;</span><span class="token punctuation">)</span>

<span class="token comment">-- 退出整个请求而不是当前处理阶段</span>
ngx<span class="token punctuation">.</span><span class="token function">exit</span><span class="token punctuation">(</span>ngx<span class="token punctuation">.</span>HTTP_OK<span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>可以直接使用数字作为参数，例如：</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code> ngx<span class="token punctuation">.</span><span class="token function">exit</span><span class="token punctuation">(</span><span class="token number">501</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><div class="custom-block warning"><p class="custom-block-title">注意</p> <p>数字作为参数仅支持 <code>NGX_OK</code> 和 <code>NGX_ERROR</code> 的数字。</p> <div class="custom-block right"><p>2021-11-30 @Young Kbt</p></div></div> <p>ngx.sleep</p> <p>无阻塞地休眠特定秒。时间可以精确到 0.001 秒 (毫秒)。</p> <p>语法：<code>ngx.sleep(seconds)</code>。</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>ngx<span class="token punctuation">.</span><span class="token function">sleep</span><span class="token punctuation">(</span><span class="token number">1000</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h2 id="请求api"><a href="#请求api" class="header-anchor">#</a> 请求API</h2> <h3 id="ngx-req-get-uri-args"><a href="#ngx-req-get-uri-args" class="header-anchor">#</a> ngx.req.get_uri_args</h3> <p>返回一个 Lua table，包含当前请求的所有 URL 查询参数。</p> <p>语法：<code>args = ngx.req.get_uri_args([max_args])</code></p> <div class="language-nginx line-numbers-mode"><pre class="language-nginx"><code><span class="token directive"><span class="token keyword">location</span> = /test</span> <span class="token punctuation">{</span>
     <span class="token directive"><span class="token keyword">content_by_lua</span> <span class="token string">'
         local args = ngx.req.get_uri_args()
         for key, val in pairs(args) do
             if type(val) == &quot;table&quot; then
                 ngx.say(key, &quot;: &quot;, table.concat(val, &quot;, &quot;))
             else
                 ngx.say(key, &quot;: &quot;, val)
             end
         end
     '</span></span><span class="token punctuation">;</span>
 <span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br></div></div><p>访问 <code>GET /test?foo=bar&amp;bar=baz&amp;bar=blah</code> 将输出：</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code> foo<span class="token punctuation">:</span> bar
 bar<span class="token punctuation">:</span> baz<span class="token punctuation">,</span> blah
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>多次出现同一个参数 key 时，将生成一个 Lua table，按顺序保存其所有 value。</p> <h3 id="ngx-req-set-uri-args"><a href="#ngx-req-set-uri-args" class="header-anchor">#</a> ngx.req.set_uri_args</h3> <p>用 <code>args</code> 参数重写当前请求的 URI 请求参数。</p> <p>语法：<code>ngx.req.set_uri_args(args)</code>。</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>ngx<span class="token punctuation">.</span>req<span class="token punctuation">.</span><span class="token function">set_uri_args</span><span class="token punctuation">(</span><span class="token string">&quot;a=3&amp;b=hello%20world&quot;</span><span class="token punctuation">)</span>

ngx<span class="token punctuation">.</span>req<span class="token punctuation">.</span><span class="token function">set_uri_args</span><span class="token punctuation">(</span><span class="token punctuation">{</span> a <span class="token operator">=</span> <span class="token number">3</span><span class="token punctuation">,</span> b <span class="token operator">=</span> <span class="token string">&quot;hello world&quot;</span> <span class="token punctuation">}</span><span class="token punctuation">)</span>

ngx<span class="token punctuation">.</span>req<span class="token punctuation">.</span><span class="token function">set_uri_args</span><span class="token punctuation">(</span><span class="token punctuation">{</span> a <span class="token operator">=</span> <span class="token number">3</span><span class="token punctuation">,</span> b <span class="token operator">=</span> <span class="token punctuation">{</span><span class="token number">5</span><span class="token punctuation">,</span> <span class="token number">6</span><span class="token punctuation">}</span> <span class="token punctuation">}</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>在第二种情况下，本方法将根据 URI 转义规则转义参数的 key 和 value。</p> <p>在第三种情况下，请求参数字符串为 <code>a=3&amp;b=5&amp;b=6</code>。</p> <h3 id="ngx-header-header"><a href="#ngx-header-header" class="header-anchor">#</a> ngx.header.HEADER</h3> <p>修改、添加、或清除当前请求待发送的 <code>HEADER</code> 响应头信息。</p> <p>语法：<code>ngx.header.HEADER = VALUE</code>。</p> <p><code>HEADER</code> 响应头信息不是自定义的，是请求头带有的。</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code> <span class="token comment">-- 与 ngx.header[&quot;Content-Type&quot;] = 'text/plain' 相同</span>
 ngx<span class="token punctuation">.</span>header<span class="token punctuation">.</span>content_type <span class="token operator">=</span> <span class="token string">'text/plain'</span><span class="token punctuation">;</span>

 ngx<span class="token punctuation">.</span>header<span class="token punctuation">[</span><span class="token string">&quot;X-My-Header&quot;</span><span class="token punctuation">]</span> <span class="token operator">=</span> <span class="token string">'blah blah'</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><h3 id="ngx-req-get-method"><a href="#ngx-req-get-method" class="header-anchor">#</a> ngx.req.get_method</h3> <p>获取当前请求的 HTTP 请求方法名称。结果为类似 <code>&quot;GET&quot;</code> 和 <code>&quot;POST&quot;</code> 的字符串。</p> <p>语法：<code>ngx.req.get_method</code>。</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>value <span class="token operator">=</span> ngx<span class="token punctuation">.</span>req<span class="token punctuation">.</span>get_method
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h3 id="ngx-req-set-method"><a href="#ngx-req-set-method" class="header-anchor">#</a> ngx.req.set_method</h3> <p>用 <code>method_id</code> 参数的值改写当前请求的 HTTP 请求方法。当前仅支持 <a href="#http-%E8%AF%B7%E6%B1%82%E6%96%B9%E6%B3%95">HTTP 请求方法</a> 中定义的数值常量。</p> <p>语法：<code>ngx.req.set_method(method_id)</code>。</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>ngx<span class="token punctuation">.</span>req<span class="token punctuation">.</span><span class="token function">set_method</span><span class="token punctuation">(</span>method_id<span class="token punctuation">)</span>

ngx<span class="token punctuation">.</span>req<span class="token punctuation">.</span><span class="token function">set_method</span><span class="token punctuation">(</span>ngx<span class="token punctuation">.</span>HTTP_GET<span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><h3 id="ngx-req-read-body"><a href="#ngx-req-read-body" class="header-anchor">#</a> ngx.req.read_body</h3> <p>同步读取客户端请求体，不阻塞 Nginx 事件循环。</p> <p>语法：<code>ngx.req.read_body()</code>。</p> <div class="language- line-numbers-mode"><pre class="language-text"><code>ngx.req.read_body()
local args = ngx.req.get_post_args()
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><h3 id="ngx-req-get-post-args"><a href="#ngx-req-get-post-args" class="header-anchor">#</a> ngx.req.get_post_args</h3> <p>返回一个 Lua table，包含当前请求的所有 POST 查询参数。</p> <p>语法：<code>args, err = ngx.req.get_post_args(max_args?)</code></p> <div class="custom-block warning"><p class="custom-block-title">注意</p> <p>使用 <code>ngx.req.get_post_args</code> 获取参数前，必须使用 <code>ngx.req.read_body</code> 读取请求体。</p> <div class="custom-block right"><p>2021-11-30 @Young Kbt</p></div></div> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code> location <span class="token operator">=</span> <span class="token operator">/</span><span class="token function">test</span> <span class="token punctuation">{</span>
     content_by_lua '
         ngx<span class="token punctuation">.</span>req<span class="token punctuation">.</span><span class="token function">read_body</span><span class="token punctuation">(</span><span class="token punctuation">)</span>
         <span class="token keyword">local</span> args<span class="token punctuation">,</span> err <span class="token operator">=</span> ngx<span class="token punctuation">.</span>req<span class="token punctuation">.</span><span class="token function">get_post_args</span><span class="token punctuation">(</span><span class="token punctuation">)</span>
         <span class="token keyword">if</span> <span class="token keyword">not</span> args <span class="token keyword">then</span>
             ngx<span class="token punctuation">.</span><span class="token function">say</span><span class="token punctuation">(</span><span class="token string">&quot;failed to get post args: &quot;</span><span class="token punctuation">,</span> err<span class="token punctuation">)</span>
             <span class="token keyword">return</span>
         <span class="token keyword">end</span>
         <span class="token keyword">for</span> key<span class="token punctuation">,</span> val <span class="token keyword">in</span> <span class="token function">pairs</span><span class="token punctuation">(</span>args<span class="token punctuation">)</span> <span class="token keyword">do</span>
             <span class="token keyword">if</span> <span class="token function">type</span><span class="token punctuation">(</span>val<span class="token punctuation">)</span> <span class="token operator">==</span> <span class="token string">&quot;table&quot;</span> <span class="token keyword">then</span>
                 ngx<span class="token punctuation">.</span><span class="token function">say</span><span class="token punctuation">(</span>key<span class="token punctuation">,</span> <span class="token string">&quot;: &quot;</span><span class="token punctuation">,</span> table<span class="token punctuation">.</span><span class="token function">concat</span><span class="token punctuation">(</span>val<span class="token punctuation">,</span> <span class="token string">&quot;, &quot;</span><span class="token punctuation">)</span><span class="token punctuation">)</span>
             <span class="token keyword">else</span>
                 ngx<span class="token punctuation">.</span><span class="token function">say</span><span class="token punctuation">(</span>key<span class="token punctuation">,</span> <span class="token string">&quot;: &quot;</span><span class="token punctuation">,</span> val<span class="token punctuation">)</span>
             <span class="token keyword">end</span>
         <span class="token keyword">end</span>
     '<span class="token punctuation">;</span>
 <span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br></div></div><p>请求</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code> <span class="token comment"># Post request with the body 'foo=bar&amp;bar=baz&amp;bar=blah'</span>
 $ <span class="token function">curl</span> <span class="token parameter variable">--data</span> <span class="token string">'foo=bar&amp;bar=baz&amp;bar=blah'</span> localhost/test
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>将输出：</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code> foo<span class="token punctuation">:</span> bar
 bar<span class="token punctuation">:</span> baz<span class="token punctuation">,</span> blah
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><p>多次出现同一个参数 key 时，将生成一个 Lua table，按顺序保存其所有 value。</p> <h3 id="ngx-redirect"><a href="#ngx-redirect" class="header-anchor">#</a> ngx.redirect</h3> <p>发出一个 HTTP <code>301</code> 或 <code>302</code> 重定向到 <code>uri</code>。</p> <p>可选项 <code>status</code> 参数指定 <code>301</code> 或 <code>302</code> 哪个被使用。 默认使用 <code>302</code>。</p> <p>语法：<code>ngx.redirect(uri, [status])</code>。</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code><span class="token keyword">return</span> ngx<span class="token punctuation">.</span><span class="token function">redirect</span><span class="token punctuation">(</span><span class="token string">&quot;/foo&quot;</span><span class="token punctuation">)</span>

<span class="token comment">-- 等价于</span>
<span class="token keyword">return</span> ngx<span class="token punctuation">.</span><span class="token function">redirect</span><span class="token punctuation">(</span><span class="token string">&quot;/foo&quot;</span><span class="token punctuation">,</span> <span class="token number">301</span><span class="token punctuation">)</span>

<span class="token comment">-- 等价于</span>
<span class="token keyword">return</span> ngx<span class="token punctuation">.</span><span class="token function">redirect</span><span class="token punctuation">(</span><span class="token string">&quot;/foo&quot;</span><span class="token punctuation">,</span> ngx<span class="token punctuation">.</span>HTTP_MOVED_TEMPORARILY<span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br></div></div><p>重定向到任意外部 URL 也是支持的，例如：</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code><span class="token keyword">return</span> ngx<span class="token punctuation">.</span><span class="token function">redirect</span><span class="token punctuation">(</span><span class="token string">&quot;http://www.baidu.com&quot;</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><h3 id="ngx-exec"><a href="#ngx-exec" class="header-anchor">#</a> ngx.exec</h3> <p>使用 <code>uri</code>、<code>args</code> 参数执行一个内部跳转。内部指的是 Nginx 的某个 location 模块。</p> <p>语法：<code>ngx.exec(uri, [args])</code></p> <div class="language-nginx line-numbers-mode"><pre class="language-nginx"><code><span class="token directive"><span class="token keyword">location</span> /foo</span> <span class="token punctuation">{</span>
     <span class="token directive"><span class="token keyword">content_by_lua</span> <span class="token string">'
         ngx.exec(&quot;/bar&quot;, &quot;a=goodbye&quot;);
     '</span></span><span class="token punctuation">;</span>
 <span class="token punctuation">}</span>

 <span class="token directive"><span class="token keyword">location</span> /bar</span> <span class="token punctuation">{</span>
     <span class="token directive"><span class="token keyword">content_by_lua</span> <span class="token string">'
         local args = ngx.req.get_uri_args()
         for key, val in pairs(args) do
             if key == &quot;a&quot; then
                 ngx.say(val)
             end
         end
     '</span></span><span class="token punctuation">;</span>
 <span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br></div></div><p>访问 <code>GET /foo/file.php?a=hello</code>，将返回 『 hello 』 ，而不是 『 goodbye 』</p> <div class="custom-block warning"><p class="custom-block-title">注意</p> <p><code>ngx.exec</code> 方法与 <a href="#ngx-redirect">ngx.redirect</a> 是完全不同的，前者是个纯粹的内部跳转并且没有引入任何额外 HTTP 信号。</p> <p>此方法的调用终止当前请求的处理。</p> <div class="custom-block right"><p>2021-11-30 @Young Kbt</p></div></div> <h3 id="ngx-location-capture"><a href="#ngx-location-capture" class="header-anchor">#</a> ngx.location.capture</h3> <p>向 <code>uri</code> 发起一个同步非阻塞 Nginx 子请求。</p> <p>语法：<code>ngx.location.capture(uri,[options])</code>。</p> <div class="custom-block warning"><p class="custom-block-title">注意</p> <p>它会请求 Nginx 的其他 location 模块，location 模块可以是其他文件目录的配置文件中，或任何其他 Nginx 模块。</p> <div class="custom-block right"><p>2021-11-30 @Young Kbt</p></div></div> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>res <span class="token operator">=</span> ngx<span class="token punctuation">.</span>location<span class="token punctuation">.</span><span class="token function">capture</span><span class="token punctuation">(</span>uri<span class="token punctuation">,</span><span class="token punctuation">[</span>options<span class="token punctuation">]</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><code>res</code> 是返回的结果，它是一个「对象」，将包含四个元素的 Lua 表 (<code>res.status</code>, <code>res.header</code>, <code>res.body</code>, 和 <code>res.truncated</code>)。</p> <ul><li><p><code>res.status</code> (状态) 保存子请求的响应状态码。</p></li> <li><p><code>res.header</code> (头) 用一个标准 Lua 表储子请求响应的所有头信息。如果是“多值”响应头，这些值将使用 Lua (数组) 表顺序存储。</p></li></ul> <p>如果子请求响应头包含下面的行：</p> <div class="language- line-numbers-mode"><pre class="language-text"><code> Set-Cookie: a=3
 Set-Cookie: foo=bar
 Set-Cookie: baz=blah
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p>则 <code>res.header[&quot;Set-Cookie&quot;]</code> 将存储 Lua 表 <code>{&quot;a=3&quot;, &quot;foo=bar&quot;, &quot;baz=blah&quot;}</code>。</p> <p><strong>options 选项</strong></p> <table><thead><tr><th>选项</th> <th>作用</th></tr></thead> <tbody><tr><td>method</td> <td>指定子请求的请求方法, 只接受类似 <code>ngx.HTTP_POST</code> 的常量</td></tr> <tr><td>body</td> <td>指定子请求的请求体 (仅接受字符串值)</td></tr> <tr><td>args</td> <td>指定子请求的 URI 请求参数 (可以是字符串或者 Lua 表)</td></tr> <tr><td>ctx</td> <td>指定一个 Lua 表作为子请求的 ngx.ctx 表，可以是当前请求的 ngx.ctx 表</td></tr> <tr><td>vars</td> <td>用一个 Lua 表设置子请求中的 Nginx 变量值</td></tr> <tr><td>copy_all_vars</td> <td>设置是否复制所有当前请求的 Nginx 变量值到子请求中，修改子请求的 nginx 变量值不影响当前 (父) 请求</td></tr> <tr><td>share_all_vars</td> <td>设置是否共享所有当前 (父) 请求的 Nginx 变量值到子请求中，修改子请求的 nginx 变量值将影响当前 (父) 请求</td></tr> <tr><td>always_forward_body</td> <td>当设置为 true 时，如果没有设置 <code>body</code> 选项，当前 (父) 请求的请求体将被转发给子请求</td></tr></tbody></table> <p>例如，发送一个 POST 子请求，可以这样做：</p> <div class="language-nginx line-numbers-mode"><pre class="language-nginx"><code> <span class="token directive"><span class="token keyword">res</span> = ngx.location.capture(
     <span class="token string">'/foo/bar'</span>,</span>
     <span class="token punctuation">{</span> <span class="token directive"><span class="token keyword">method</span> = ngx.HTTP_POST, args =</span> <span class="token punctuation">{</span> a = 1,b = 3<span class="token punctuation">}</span>, body = 'Hello，World' <span class="token punctuation">}</span>
 )
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p>等价于：</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>res <span class="token operator">=</span> ngx<span class="token punctuation">.</span>location<span class="token punctuation">.</span><span class="token function">capture</span><span class="token punctuation">(</span><span class="token string">'/foo/bar?a=1&amp;b=3'</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><code>method</code> 选项默认值是 <code>ngx.HTTP_GET</code>。</p> <p>其他内容具体看中文文档，开头有转送门。</p> <div class="custom-block note"><p class="custom-block-title">ngx.exec 和 ngx.location.capture 区别</p> <p><code>ngx.exec</code> 只会访问同一个配置文件的 location 模块。</p> <p><code>ngx.location.capture</code> 不仅如此，还可以访问其他配置文件的 location 模块。</p> <div class="custom-block right"><p>2021-11-30 @Young Kbt</p></div></div> <h3 id="ngx-req-set-uri"><a href="#ngx-req-set-uri" class="header-anchor">#</a> ngx.req.set_uri</h3> <p>语法：<code>ngx.req.set_uri(uri, jump?)</code></p> <p>通过参数 uri 重写当前请求的 uri；参数 jump，表明是否进行 locations 的重新匹配。当 jump 为 true 时，调用 <code>ngx.req.set_uri</code> 后，Nginx 将会根据修改后的 uri，重新匹配新的 locations；如果 jump 为 false，将不会进行 locations 的重新匹配，而仅仅是修改了当前请求的 URI 而已。jump 的默认值为 false。</p> <ul><li><p>jump 为 true，等价于 rewrite...last</p></li> <li><p>jump 为 false，等价于 rewrite...break</p></li></ul> <p>例如：</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>ngx<span class="token punctuation">.</span>req<span class="token punctuation">.</span><span class="token function">set_uri</span><span class="token punctuation">(</span><span class="token string">&quot;/foo&quot;</span><span class="token punctuation">,</span> <span class="token keyword">true</span><span class="token punctuation">)</span>  <span class="token operator">==</span><span class="token operator">=</span> rewrite <span class="token operator">^</span> <span class="token operator">/</span>foo last<span class="token punctuation">;</span>

ngx<span class="token punctuation">.</span>req<span class="token punctuation">.</span><span class="token function">set_uri</span><span class="token punctuation">(</span><span class="token string">&quot;/foo&quot;</span><span class="token punctuation">,</span> <span class="token keyword">false</span><span class="token punctuation">)</span>  <span class="token operator">==</span><span class="token operator">=</span>  rewrite <span class="token operator">^</span> <span class="token operator">/</span>foo <span class="token keyword">break</span><span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><h2 id="指令api"><a href="#指令api" class="header-anchor">#</a> 指令API</h2> <h3 id="init-by-lua"><a href="#init-by-lua" class="header-anchor">#</a> init_by_lua</h3> <p>该指令在每次 Nginx 重新加载配置时执行，可以用来完成一些耗时模块的加载，或者初始化一些全局配置。</p> <p>这是一个公共模块，把所有都用到的代码放到这个模块里，避免重复使用相同的代码。</p> <p>比如每个模块都需要 MySQL 和 Redis，则在这个公共模块进行引用。</p> <div class="language-nginx line-numbers-mode"><pre class="language-nginx"><code><span class="token directive"><span class="token keyword">init_by_lua_block</span></span><span class="token punctuation">{</span>
    mysql = require &quot;resty.mysql&quot;
	redis = require &quot;resty.redis&quot;
<span class="token punctuation">}</span>
<span class="token comment"># 下方直接使用 MySQL 和 Redis 的 API</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>如果不喜欢直接写 Lua 语法，把 Lua 语法 放到 Lua 文件里，使用 <code>init_by_lua_file</code> 引用 Lua 文件。</p> <h3 id="init-worker-by-lua"><a href="#init-worker-by-lua" class="header-anchor">#</a> init_worker_by_lua</h3> <p>该指令用于启动一些定时任务，如心跳检查、定时拉取服务器配置等。</p> <p>例如：</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code> init_worker_by_lua '
     <span class="token keyword">local</span> delay <span class="token operator">=</span> <span class="token number">3</span>  <span class="token comment">-- in seconds</span>
     <span class="token keyword">local</span> new_timer <span class="token operator">=</span> ngx<span class="token punctuation">.</span>timer<span class="token punctuation">.</span>at
     <span class="token keyword">local</span> log <span class="token operator">=</span> ngx<span class="token punctuation">.</span>log
     <span class="token keyword">local</span> ERR <span class="token operator">=</span> ngx<span class="token punctuation">.</span>ERR
     <span class="token keyword">local</span> check

     check <span class="token operator">=</span> <span class="token keyword">function</span><span class="token punctuation">(</span>premature<span class="token punctuation">)</span>
         <span class="token keyword">if</span> <span class="token keyword">not</span> premature <span class="token keyword">then</span>
             <span class="token comment">-- do the health check or other routine work</span>
             <span class="token keyword">local</span> ok<span class="token punctuation">,</span> err <span class="token operator">=</span> <span class="token function">new_timer</span><span class="token punctuation">(</span>delay<span class="token punctuation">,</span> check<span class="token punctuation">)</span>
             <span class="token keyword">if</span> <span class="token keyword">not</span> ok <span class="token keyword">then</span>
                 <span class="token function">log</span><span class="token punctuation">(</span>ERR<span class="token punctuation">,</span> <span class="token string">&quot;failed to create timer: &quot;</span><span class="token punctuation">,</span> err<span class="token punctuation">)</span>
                 <span class="token keyword">return</span>
             <span class="token keyword">end</span>
         <span class="token keyword">end</span>
     <span class="token keyword">end</span>

     <span class="token keyword">local</span> ok<span class="token punctuation">,</span> err <span class="token operator">=</span> <span class="token function">new_timer</span><span class="token punctuation">(</span>delay<span class="token punctuation">,</span> check<span class="token punctuation">)</span>
     <span class="token keyword">if</span> <span class="token keyword">not</span> ok <span class="token keyword">then</span>
         <span class="token function">log</span><span class="token punctuation">(</span>ERR<span class="token punctuation">,</span> <span class="token string">&quot;failed to create timer: &quot;</span><span class="token punctuation">,</span> err<span class="token punctuation">)</span>
         <span class="token keyword">return</span>
     <span class="token keyword">end</span>
 '<span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br><span class="line-number">22</span><br><span class="line-number">23</span><br><span class="line-number">24</span><br></div></div><p>如果不喜欢直接写 Lua 语法，把 Lua 语法 放到 Lua 文件里，使用 <code>init_worker_by_lua_file</code> 引用 Lua 文件。</p> <h3 id="set-by-lua"><a href="#set-by-lua" class="header-anchor">#</a> set_by_lua</h3> <p>该指令只要用来做变量赋值，这个指令一次只能返回一个值，并将结果赋值给 Nginx 中指定的变量。</p> <table><thead><tr><th>语法</th> <th>说明</th></tr></thead> <tbody><tr><td>set_by_lua* &lt;key&gt; &lt;value&gt;</td> <td>key要加上 $ 符号，value 是 Lua 语言的格式</td></tr></tbody></table> <p>例如：</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>set_by_lua $name &quot;
		<span class="token keyword">local</span> uri_args <span class="token operator">=</span> ngx<span class="token punctuation">.</span>req<span class="token punctuation">.</span><span class="token function">get_uri_args</span><span class="token punctuation">(</span><span class="token punctuation">)</span>   <span class="token comment">-- 获取请求 ? 后的参数</span>
		name <span class="token operator">=</span> uri_args<span class="token punctuation">[</span><span class="token string">'name'</span><span class="token punctuation">]</span>   <span class="token comment">-- 获取 key 为 name 的参数</span>
		<span class="token keyword">return</span> name<span class="token operator">..</span><span class="token string">'先生'</span>   <span class="token comment">-- 在 name 后面加上 先生，作为 $name 的 value 返回给客户端</span>
	&quot;<span class="token punctuation">;</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div><p>此时 key 为 <code>$name</code> 的 value 值是 URL 的参数 name 加上「先生」。</p> <p>如果不喜欢直接写 Lua 语法，把 Lua 语法 放到 Lua 文件里，使用 <code>set_by_lua_file</code> 引用 Lua 文件。</p> <h3 id="rewrite-by-lua"><a href="#rewrite-by-lua" class="header-anchor">#</a> rewrite_by_lua</h3> <p>该指令用于执行内部 URL 重写或者外部重定向，典型的如伪静态化 URL 重写，本阶段在 Rewrite 处理阶段的最后默认执行。</p> <p>例如：</p> <div class="language-nginx line-numbers-mode"><pre class="language-nginx"><code><span class="token directive"><span class="token keyword">location</span> /foo</span> <span class="token punctuation">{</span>
    <span class="token directive"><span class="token keyword">set</span> <span class="token variable">$a</span> <span class="token number">12</span></span><span class="token punctuation">;</span> <span class="token comment"># 创建变量 $a</span>
    <span class="token directive"><span class="token keyword">set</span> <span class="token variable">$b</span> <span class="token string">&quot;&quot;</span></span><span class="token punctuation">;</span> <span class="token comment"># 创建变量 $b</span>
    <span class="token directive"><span class="token keyword">rewrite_by_lua</span> <span class="token string">'
         ngx.var.b = tonumber(ngx.var.a) + 1  # 此时 b = 13
         if tonumber(ngx.var.b) == 13 then
             return ngx.redirect(&quot;/bar&quot;);   # 重定向到 /bar
         end
     '</span></span><span class="token punctuation">;</span>
    <span class="token directive"><span class="token keyword">echo</span> <span class="token string">&quot;res = <span class="token variable">$b</span>&quot;</span></span><span class="token punctuation">;</span>  <span class="token comment"># res = 13</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br></div></div><p>如果不喜欢直接写 Lua 语法，把 Lua 语法 放到 Lua 文件里，使用 <code>rewrite_by_lua_file</code> 引用 Lua 文件。</p> <h3 id="access-by-lua"><a href="#access-by-lua" class="header-anchor">#</a> access_by_lua</h3> <p>该指令用于访问控制。例如，如果只允许内网 IP 访问。</p> <div class="language-nginx line-numbers-mode"><pre class="language-nginx"><code><span class="token directive"><span class="token keyword">location</span> /</span> <span class="token punctuation">{</span>
    <span class="token directive"><span class="token keyword">access_by_lua</span> <span class="token string">'
        local res = ngx.location.capture(&quot;/auth&quot;)

        if res.status == ngx.HTTP_OK then
        return
        end

        if res.status == ngx.HTTP_FORBIDDEN then
        ngx.exit(res.status)
        end

        ngx.exit(ngx.HTTP_INTERNAL_SERVER_ERROR)
        '</span></span><span class="token punctuation">;</span>

        <span class="token comment"># proxy_pass/fastcgi_pass/postgres_pass/...</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br></div></div><p>注意，在 access_by_lua 处理内部，当调用 <code>ngx.exit(ngx.OK)</code> 时，nginx 请求将继续下一阶段的内容处理。要在 access_by_lua 处理中终结当前请求，调用 ngx.exit ，成功的请求设定 status &gt;= 200 (<code>ngx.HTTP_OK</code>) 并 status &lt; 300 (<code>ngx.HTTP_SPECIAL_RESPONSE</code>)，失败的请求设定<code>ngx.exit(ngx.HTTP_INTERNAL_SERVER_ERROR)</code> (或其他相关的)。</p> <p>如果不喜欢直接写 Lua 语法，把 Lua 语法 放到 Lua 文件里，使用 <code>access_by_lua_file</code> 引用 Lua 文件。</p> <h3 id="content-by-lua"><a href="#content-by-lua" class="header-anchor">#</a> content_by_lua</h3> <p><strong>该指令是应用最多的指令</strong>，大部分任务是在这个阶段完成的，其他的过程往往为这个阶段准备数据，正式处理基本都在本阶段。</p> <p>这个指令就相当于 Java 的一个方法，所有的代码都需要一个方法体作为环境。</p> <p>例如：</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code><span class="token function">content_by_lua_block</span> <span class="token punctuation">{</span>
    set_by_lua $name &quot;
        <span class="token keyword">local</span> uri_args <span class="token operator">=</span> ngx<span class="token punctuation">.</span>req<span class="token punctuation">.</span><span class="token function">get_uri_args</span><span class="token punctuation">(</span><span class="token punctuation">)</span>   <span class="token comment">-- 获取请求 ? 后的参数</span>
        name <span class="token operator">=</span> uri_args<span class="token punctuation">[</span><span class="token string">'name'</span><span class="token punctuation">]</span>   <span class="token comment">-- 获取 key 为 name 的参数</span>
        <span class="token keyword">return</span> name<span class="token operator">..</span><span class="token string">'先生'</span>   <span class="token comment">-- 在 name 后面加上 先生，作为 $name 的 value 返回给客户端</span>
    &quot;<span class="token punctuation">;</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br></div></div><p>如果不喜欢直接写 Lua 语法，把 Lua 语法 放到 Lua 文件里，使用 <code>content_by_lua_file</code> 引用 Lua 文件。</p> <h3 id="header-filter-by-lua"><a href="#header-filter-by-lua" class="header-anchor">#</a> header_filter_by_lua</h3> <p>该指令用于设置应答消息的头部信息。</p> <p>例如：</p> <div class="language-nginx line-numbers-mode"><pre class="language-nginx"><code><span class="token directive"><span class="token keyword">location</span> /</span> <span class="token punctuation">{</span>
	 <span class="token directive"><span class="token keyword">proxy_pass</span> http://mybackend</span><span class="token punctuation">;</span>
	 <span class="token directive"><span class="token keyword">header_filter_by_lua</span> <span class="token string">'ngx.header.username = &quot;可乐&quot;'</span></span><span class="token punctuation">;</span>
 <span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p>你会在请求头看到 name 为 可乐</p> <p>如果不喜欢直接写 Lua 语法，把 Lua 语法 放到 Lua 文件里，使用 <code>header_filter_by_lua_file</code> 引用 Lua 文件。</p> <h3 id="body-filter-by-lua"><a href="#body-filter-by-lua" class="header-anchor">#</a> body_filter_by_lua</h3> <p>该指令是对响应数据进行过滤，如截断、替换。</p> <p>例如，在输出体转换所有的小写字母，我们可以这样用：</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code> location / <span class="token punctuation">{</span>
     proxy_pass http://mybackend<span class="token punctuation">;</span>
     body_filter_by_lua <span class="token string">'ngx.arg[1] = string.upper(ngx.arg[1])'</span><span class="token punctuation">;</span>  <span class="token comment"># 转小写</span>
 <span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p>如果不喜欢直接写 Lua 语法，把 Lua 语法 放到 Lua 文件里，使用 <code>body_filter_by_lua_file</code> 引用 Lua 文件。</p> <h3 id="log-by-lua"><a href="#log-by-lua" class="header-anchor">#</a> log_by_lua</h3> <p>该指令用于在 log 请求处理阶段，用 Lua 代码处理日志，但并不替换原有 log 处理。</p> <p>例如：</p> <div class="language-nginx line-numbers-mode"><pre class="language-nginx"><code><span class="token directive"><span class="token keyword">server</span></span> <span class="token punctuation">{</span>
    <span class="token directive"><span class="token keyword">location</span> /</span> <span class="token punctuation">{</span>
        <span class="token directive"><span class="token keyword">proxy_pass</span> http://mybackend</span><span class="token punctuation">;</span>

        <span class="token directive"><span class="token keyword">log_by_lua</span> <span class="token string">'
            local log_dict = ngx.shared.log_dict
            local upstream_time = tonumber(ngx.var.upstream_response_time)

            local sum = log_dict:get(&quot;upstream_time-sum&quot;) or 0
            sum = sum + upstream_time
            log_dict:set(&quot;upstream_time-sum&quot;, sum)

            local newval, err = log_dict:incr(&quot;upstream_time-nb&quot;, 1)
            if not newval and err == &quot;not found&quot; then
            log_dict:add(&quot;upstream_time-nb&quot;, 0)
            log_dict:incr(&quot;upstream_time-nb&quot;, 1)
            end
            '</span></span><span class="token punctuation">;</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br></div></div><p>如果不喜欢直接写 Lua 语法，把 Lua 语法 放到 Lua 文件里，使用 <code>log_by_lua_file</code> 引用 Lua 文件。</p> <h3 id="balancer-by-lua"><a href="#balancer-by-lua" class="header-anchor">#</a> balancer_by_lua</h3> <p>该指令主要的作用是用来实现上游服务器的负载均衡器算法</p> <h3 id="ssl-certificate-by"><a href="#ssl-certificate-by" class="header-anchor">#</a> ssl_certificate_by</h3> <p>该指令作用在 Nginx 和下游服务开始一个 SSL 握手操作时将允许本配置项的 Lua 代码。</p> <h2 id="简单案例"><a href="#简单案例" class="header-anchor">#</a> 简单案例</h2> <h3 id="需求"><a href="#需求" class="header-anchor">#</a> 需求</h3> <p>发送请求：<code>http://192.168.200.133?name=张三&amp;gender=1</code></p> <p>Nginx 接收到请求后，根据 gender 传入的值进行判断，如果 gender 传入的是 1，则在页面上展示张三先生,如果 gender 传入的是 0，则在页面上展示张三女士，如果未传或者传入的不是 1 和 2，则在页面上展示张三。</p> <h3 id="实现"><a href="#实现" class="header-anchor">#</a> 实现</h3> <p>在配置文件进行如下配置：</p> <div class="language-nginx line-numbers-mode"><pre class="language-nginx"><code><span class="token directive"><span class="token keyword">location</span> /getByGender</span> <span class="token punctuation">{</span>
	<span class="token directive"><span class="token keyword">default_type</span> <span class="token string">'text/html'</span></span><span class="token punctuation">;</span>
    
	<span class="token directive"><span class="token keyword">set_by_lua</span> <span class="token variable">$name</span> <span class="token string">&quot;
		local uri_args = ngx.req.get_uri_args()
		gender = uri_args['gender']
		name = uri_args['name']
		if gender=='1' then
			return name..'先生'
		elseif gender=='0' then
			return name..'女士'
		else
			return name
		end
	&quot;</span></span><span class="token punctuation">;</span>
	<span class="token directive"><span class="token keyword">header_filter_by_lua</span> <span class="token string">&quot;
		ngx.header.aaa='bbb'
	&quot;</span></span><span class="token punctuation">;</span>
	<span class="token directive"><span class="token keyword">charset</span> utf-8</span><span class="token punctuation">;</span>
	<span class="token directive"><span class="token keyword">return</span> <span class="token number">200</span> <span class="token variable">$name</span></span><span class="token punctuation">;</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br></div></div><p>访问测试：</p> <p><code>http://192.168.199.27/getByGender?name=可乐&amp;gender=0</code></p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Nginx/20211130151408.png" alt="image-20211130151407648"></p> <p><code>http://192.168.199.27/getByGender?name=可乐&amp;gender=1</code></p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Nginx/20211130151326.png" alt="image-20211130151325276"></p> <p><code>http://192.168.199.27/getByGender?name=可乐</code></p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Nginx/20211130151429.png" alt="image-20211130151428991"></p> <h2 id="ngx-lua操作redis"><a href="#ngx-lua操作redis" class="header-anchor">#</a> ngx_lua操作Redis</h2> <p>Redis 在系统中经常作为数据缓存、内存数据库使用，在大型系统中扮演着非常重要的作用。</p> <p>在 Nginx 核心系统中，Redis 是常备组件。Nginx 支持 3 种方法访问 Redis，分别是 HttpRedis 模块、HttpRedis2Module 模块、lua-resty-redis 库。</p> <p>这三种方式中 HttpRedis 模块提供的指令少，功能单一，适合做简单缓存。HttpRedis2Module 模块比 HttpRedis 模块操作更灵活，功能更强大。而Lua-resty-redis 库是 OpenResty 提供的一个操作 Redis 的接口库，可根据自己的业务情况做一些逻辑处理，适合做复杂的业务逻辑。</p> <p>本内容将主要以 Lua-resty-redis 来进行讲解。</p> <h3 id="redis环境准备"><a href="#redis环境准备" class="header-anchor">#</a> Redis环境准备</h3> <p>准备一个 Redis 环境，并确保正常连接</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token comment"># 连接地址</span>
<span class="token assign-left variable">host</span><span class="token operator">=</span> <span class="token number">192.168</span>.199.27
<span class="token assign-left variable">port</span><span class="token operator">=</span><span class="token number">6379</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br></div></div><p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Nginx/20211130151544.png" alt="1604726959698"></p> <h3 id="api学习"><a href="#api学习" class="header-anchor">#</a> API学习</h3> <p><code>lua-resty-redis</code> 提供了访问 Redis 的详细 API，包括创建对接、连接、操作、数据处理等。这些 API 基本上与 Redis 的操作一一对应。</p> <table><thead><tr><th>API</th> <th>作用</th></tr></thead> <tbody><tr><td>redis = require &quot;resty.redis&quot;</td> <td>引入 Redis 模块，类似于 Java 的 import。</td></tr> <tr><td>redis,err = redis:new()</td> <td>创建一个 Redis 对象给 redis，err 记录创建失败的原因。</td></tr> <tr><td>ok,err=redis:connect(host,port[,options_table])</td> <td>设置连接 Redis 的连接信息。<br>ok：连接成功返回 1，连接失败返回 nil。<br>err：返回对应的错误信息。</td></tr> <tr><td>redis:set_timeout(time)</td> <td>设置请求操作 Redis 的超时时间，单位毫秒。</td></tr> <tr><td>ok,err = redis:close()</td> <td>关闭当前连接。<br>ok：连接成功返回 1，连接失败返回 nil。<br>err：返回对应的错误信息。</td></tr> <tr><td>原生 Redis 命令如 get、set、lpush 等</td> <td>所有的 Redis 命令都有自己的方法，方法名字和命令名字相同，只是全部为小写。</td></tr></tbody></table> <h3 id="效果实现"><a href="#效果实现" class="header-anchor">#</a> 效果实现</h3> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>location <span class="token operator">/</span><span class="token function">redis</span> <span class="token punctuation">{</span>
    default_type <span class="token string">&quot;text/html&quot;</span><span class="token punctuation">;</span>
    <span class="token function">content_by_lua_block</span> <span class="token punctuation">{</span>
        <span class="token keyword">local</span> redis <span class="token operator">=</span> require <span class="token string">&quot;resty.redis&quot;</span> 	<span class="token comment">-- 引入 Redis</span>
        <span class="token keyword">local</span> redisObj <span class="token operator">=</span> redis<span class="token punctuation">:</span><span class="token function">new</span><span class="token punctuation">(</span><span class="token punctuation">)</span>  			<span class="token comment">-- 创建 Redis 对象</span>
        redisObj<span class="token punctuation">:</span><span class="token function">set_timeout</span><span class="token punctuation">(</span><span class="token number">1000</span><span class="token punctuation">)</span> 				<span class="token comment">-- 设置超时数据为 1s</span>
        <span class="token keyword">local</span> ok<span class="token punctuation">,</span>err <span class="token operator">=</span> redisObj<span class="token punctuation">:</span><span class="token function">connect</span><span class="token punctuation">(</span><span class="token string">&quot;192.168.199.27&quot;</span><span class="token punctuation">,</span><span class="token number">6379</span><span class="token punctuation">)</span> <span class="token comment">-- 设置 Redis 连接信息</span>
        <span class="token keyword">if</span> <span class="token keyword">not</span> ok <span class="token keyword">then</span> 							<span class="token comment">-- 判断是否连接成功</span>
            ngx<span class="token punctuation">.</span><span class="token function">say</span><span class="token punctuation">(</span><span class="token string">&quot;failed to connection redis&quot;</span><span class="token punctuation">,</span>err<span class="token punctuation">)</span>
            <span class="token keyword">return</span>
        <span class="token keyword">end</span>
        ok<span class="token punctuation">,</span>err <span class="token operator">=</span> redisObj<span class="token punctuation">:</span><span class="token function">set</span><span class="token punctuation">(</span><span class="token string">&quot;username&quot;</span><span class="token punctuation">,</span><span class="token string">&quot;TOM&quot;</span><span class="token punctuation">)</span>	<span class="token comment">-- 存入数据</span>
        <span class="token keyword">if</span> <span class="token keyword">not</span> ok <span class="token keyword">then</span> 							<span class="token comment">-- 判断是否存入成功</span>
            ngx<span class="token punctuation">.</span><span class="token function">say</span><span class="token punctuation">(</span><span class="token string">&quot;failed to set username&quot;</span><span class="token punctuation">,</span>err<span class="token punctuation">)</span>
            <span class="token keyword">return</span>
        <span class="token keyword">end</span>
        <span class="token keyword">local</span> res<span class="token punctuation">,</span>err <span class="token operator">=</span> redisObj<span class="token punctuation">:</span><span class="token function">get</span><span class="token punctuation">(</span><span class="token string">&quot;username&quot;</span><span class="token punctuation">)</span> <span class="token comment">-- 从 Redis 中获取数据</span>
        ngx<span class="token punctuation">.</span><span class="token function">say</span><span class="token punctuation">(</span>res<span class="token punctuation">)</span>							 <span class="token comment">-- 将数据写会消息体中</span>
        redisObj<span class="token punctuation">:</span><span class="token function">close</span><span class="token punctuation">(</span><span class="token punctuation">)</span>						 <span class="token comment">-- 关闭 Redis 连接</span>
    <span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br><span class="line-number">12</span><br><span class="line-number">13</span><br><span class="line-number">14</span><br><span class="line-number">15</span><br><span class="line-number">16</span><br><span class="line-number">17</span><br><span class="line-number">18</span><br><span class="line-number">19</span><br><span class="line-number">20</span><br><span class="line-number">21</span><br></div></div><p>运行测试效果</p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Nginx/20211130152805.png" alt="1604727475883"></p> <p><img src="https://cdn.jsdelivr.net/gh/Kele-Bingtang/static/img/Nginx/20211130152810.png" alt="1604727483869"></p> <h2 id="ngx-lua操作mysql"><a href="#ngx-lua操作mysql" class="header-anchor">#</a> ngx_lua操作Mysql</h2> <p>MySQL 是一个使用广泛的关系型数据库。在 ngx_lua 中，MySQL 有两种访问模式，分别是是：</p> <ul><li><p>用 <code>ngx_lua</code> 模块和 <code>lua-resty-mysql</code> 模块，这两个模块是安装 OpenResty 时默认安装的。</p></li> <li><p>使用 <code>drizzle_nginx_module</code>（HttpDrizzleModule）模块，需要单独安装，这个库现不在 OpenResty 中。</p></li></ul> <h3 id="lua-resty-mysql"><a href="#lua-resty-mysql" class="header-anchor">#</a> lua-resty-mysql</h3> <p>这里使用的是 <code>lua-resty-mysql</code> 模块。</p> <p><code>lua-resty-mysql</code> 是 OpenResty 开发的模块，使用灵活、功能强大，适合复杂的业务场景，同时支持存储过程的访问。</p> <h3 id="mysql环境准备"><a href="#mysql环境准备" class="header-anchor">#</a> MySQL环境准备</h3> <p>准备 MySQL，确保能正常连接</p> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code>host: <span class="token number">192.168</span>.192.27
port: <span class="token number">3306</span>
username: root
password: <span class="token number">123456</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><h3 id="api学习-2"><a href="#api学习-2" class="header-anchor">#</a> API学习</h3> <ul><li><p><code>mysql = require &quot;resty.mysql&quot;</code></p> <p>引入 MySQL 模块，类似于 Java 的 import。</p></li> <li><p><code>db,err = mysql:new()</code></p> <p>创建一个 MySQL 连接对象给 db，连接对象遇到错误时，db 为nil，err 为错误描述信息。</p></li> <li><p><code>ok,err = db:connect(Options)</code></p> <p>尝试连接到一个MySQL服务器。Options 是一个参数的 Lua 表结构，里面包含数据库连接的相关信息。</p> <p>Options 选项：</p> <div class="language-sql line-numbers-mode"><pre class="language-sql"><code>host：服务器主机名或IP地址
port：服务器监听端口，默认为<span class="token number">3306</span>
<span class="token keyword">user</span>：登录的用户名
password：登录密码
<span class="token keyword">database</span>：使用的数据库名
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br></div></div></li> <li><p><code>db:set_timeout(time)</code></p> <p>设置子请求的超时时间，单位毫秒。</p></li> <li><p><code>ok,err = db:close()</code></p> <p>关闭当前 MySQL 连接并返回状态。</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>ok：如果成功，则返回 <span class="token number">1</span>；如果出现任何错误，则将返回 <span class="token keyword">nil</span>。
err：如果出现任何错误，返回错误描述。
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div></li> <li><p><code>bytes,err=db:send_query(sql)</code></p> <p>异步向远程 MySQL 发送一个查询。</p> <p>如果成功则返回成功发送的字节数；如果错误，则返回 nil 和错误描述。</p></li> <li><p><code>res, err, errcode, sqlstate = db:read_result([rows])</code></p> <p>从 MySQL 服务器返回结果中读取一行数据。</p> <p><code>rows</code> 指定返回结果集的最大值，默认为 4，可不写。</p> <p>返回值：</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>res：操作的结果集，返回一个描述 OK 包或结果集包的 Lua 表
err：错误信息
errcode：MySQL 的错误码，比如 <span class="token number">1064</span>
sqlstate：返回由 <span class="token number">5</span> 个字符组成的标准 SQL 错误码，比如 <span class="token number">42000</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p>如果是查询，则返回一个容纳多行的数组。每行是一个数据列的key-value对，如下:</p> <div class="language-json line-numbers-mode"><pre class="language-json"><code><span class="token punctuation">{</span>
    <span class="token punctuation">{</span>id=<span class="token number">1</span><span class="token punctuation">,</span>username=<span class="token string">&quot;TOM&quot;</span><span class="token punctuation">,</span>birthday=<span class="token string">&quot;1988-11-11&quot;</span><span class="token punctuation">,</span>salary=<span class="token number">10000.0</span><span class="token punctuation">}</span><span class="token punctuation">,</span>
	<span class="token punctuation">{</span>id=<span class="token number">2</span><span class="token punctuation">,</span>username=<span class="token string">&quot;JERRY&quot;</span><span class="token punctuation">,</span>birthday=<span class="token string">&quot;1989-11-11&quot;</span><span class="token punctuation">,</span>salary=<span class="token number">20000.0</span><span class="token punctuation">}</span>
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><p>如果是增删改，则返回类上如下数据</p> <div class="language-json line-numbers-mode"><pre class="language-json"><code><span class="token punctuation">{</span>
    insert_id = <span class="token number">0</span><span class="token punctuation">,</span>
    server_status=<span class="token number">2</span><span class="token punctuation">,</span>
    warning_count=<span class="token number">1</span><span class="token punctuation">,</span>
    affected_rows=<span class="token number">2</span><span class="token punctuation">,</span>
    message=nil
<span class="token punctuation">}</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br></div></div></li></ul> <p>数据库连接四要素:</p> <div class="language-sql line-numbers-mode"><pre class="language-sql"><code>driverClass<span class="token operator">=</span>com<span class="token punctuation">.</span>mysql<span class="token punctuation">.</span>jdbc<span class="token punctuation">.</span>Driver
url<span class="token operator">=</span>jdbc:mysql:<span class="token comment">//192.168.199.27:3306/nginx_db</span>
username<span class="token operator">=</span>root
password<span class="token operator">=</span><span class="token number">123456</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br></div></div><h3 id="表创建"><a href="#表创建" class="header-anchor">#</a> 表创建</h3> <div class="language-lua line-numbers-mode"><div class="highlight-lines"><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><div class="highlighted"> </div><div class="highlighted"> </div><br><br><br><br><br><br><br><br><br></div><pre class="language-lua"><code>location <span class="token operator">=</span> <span class="token operator">/</span><span class="token function">testMysql</span><span class="token punctuation">{</span>
    <span class="token function">content_by_lua_block</span><span class="token punctuation">{</span>
        <span class="token keyword">local</span> mysql <span class="token operator">=</span> <span class="token function">require</span><span class="token punctuation">(</span><span class="token string">&quot;resty.mysql&quot;</span><span class="token punctuation">)</span>
        <span class="token keyword">local</span> db<span class="token punctuation">,</span> err <span class="token operator">=</span> mysql<span class="token punctuation">:</span><span class="token function">new</span><span class="token punctuation">(</span><span class="token punctuation">)</span>  			<span class="token comment">-- 创建实例  </span>
        <span class="token keyword">if</span> <span class="token keyword">not</span> db <span class="token keyword">then</span>  
            ngx<span class="token punctuation">.</span><span class="token function">say</span><span class="token punctuation">(</span><span class="token string">&quot;new mysql error : &quot;</span><span class="token punctuation">,</span> err<span class="token punctuation">)</span>  
            <span class="token keyword">return</span>  
        <span class="token keyword">end</span>  

        db<span class="token punctuation">:</span><span class="token function">set_timeout</span><span class="token punctuation">(</span><span class="token number">1000</span><span class="token punctuation">)</span>  					<span class="token comment">-- 设置超时时间(毫秒)  </span>

        <span class="token keyword">local</span> props <span class="token operator">=</span> <span class="token punctuation">{</span>  
            host <span class="token operator">=</span> <span class="token string">&quot;192.167.199.27&quot;</span><span class="token punctuation">,</span>

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>步骤二：调用 cjson 的 encode 方法进行类型转换</p> <div class="language-lua line-numbers-mode"><pre class="language-lua"><code>cjson<span class="token punctuation">.</span><span class="token function">encode</span><span class="token punctuation">(</span>res<span class="token punctuation">)</span> 
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>步骤三：测试</p> <div class="language-lua line-numbers-mode"><div class="highlight-lines"><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><div class="highlighted"> </div><div class="highlighted"> </div><div class="highlighted"> </div><div class="highlighted"> </div><div class="highlighted"> </div><div class="highlighted"> </div><div class="highlighted"> </div><div class="highlighted"> </div><br><br><br><br><br><br></div><pre class="language-lua"><code>location <span class="token operator">/</span><span class="token function">testMysql</span> <span class="token punctuation">{</span>
    <span class="token function">content_by_lua_block</span><span class="token punctuation">{</span>

        <span class="token keyword">local</span> mysql <span class="token operator">=</span> require <span class="token string">&quot;resty.mysql&quot;</span>
        <span class="token keyword">local</span> cjson <span class="token operator">=</span> require <span class="token string">&quot;cjson&quot;</span>

        <span class="token keyword">local</span> db <span class="token operator">=</span> mysql<span class="token punctuation">:</span><span class="token function">new</span><span class="token punctuation">(</span><span class="token punctuation">)</span>

        <span class="token keyword">local</span> ok<span class="token punctuation">,</span>err <span class="token operator">=</span> db<span class="token punctuation">:</span><span class="token function">connect</span><span class="token punctuation">{</span>
            host<span class="token operator">=</span><span class="token string">&quot;192.168.199.27&quot;</span><span class="token punctuation">,</span>
            port<span class="token operator">=</span><span class="token number">3306</span><span class="token punctuation">,</span>
            user<span class="token operator">=</span><span class="token string">&quot;root&quot;</span><span class="token punctuation">,</span>
            password<span class="token operator">=</span><span class="token string">&quot;123456&quot;</span><span class="token punctuation">,</span>
            database<span class="token operator">=</span><span class="token string">&quot;nginx_db&quot;</span>
        <span class="token punctuation">}</span>
        db<span class="token punctuation">:</span><span class="token function">set_timeout</span><span class="token punctuation">(</span><span class="token number">1000</span><span class="token punctuation">)</span>

        <span class="token comment">-- db:send_query(&quot;select * from users where id = 1&quot;)</span>
        
        db<span class="token punctuation">:</span><span class="token function">send_query</span><span class="token punctuation">(</span><span class="token string">&quot;select * from users&quot;</span><span class="token punctuation">)</span>
        <span class="token keyword">local</span> res<span class="token punctuation">,</span>err<span class="token punctuation">,</span>errcode<span class="token punctuation">,</span>sqlstate <span class="token operator">=</span> db<span class="token punctuation">:</span><span class="token function">read_result</span><span class="token punctuation">(</span><span class="token punctuation">)</span>
